<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700;800&display=swap');
.loading-screen{position:fixed;inset:0;z-index:9999;background:var(--g1);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s,visibility .6s}
.loading-screen.fade-out{opacity:0;visibility:hidden;pointer-events:none}
.loading-gorilla{font-size:72px;margin-bottom:12px;animation:loadPulse 1.8s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(16,185,129,.3))}
.loading-title{font-family:'Oswald',sans-serif;font-size:clamp(28px,5vw,48px);font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:-1px;line-height:1}
.loading-title .ld-acc{color:#F59E0B}
.loading-sub{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:#666;margin-top:12px}
.loading-spinner{width:36px;height:36px;border:3px solid #262626;border-top-color:#10B981;border-radius:50%;animation:spin .8s linear infinite;margin-top:28px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes loadPulse{0%,100%{opacity:.6;transform:scale(.97)}50%{opacity:1;transform:scale(1)}}
.data-status{position:fixed;top:60px;right:16px;z-index:950;display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:4px;font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:opacity .3s;opacity:.7}
.data-status:hover{opacity:1}
.data-status.ok{color:var(--a);background:rgba(16,185,129,.1)}
.data-status.stale{color:var(--y);background:rgba(245,158,11,.1)}
.data-status.err{color:var(--red-t);background:rgba(239,68,68,.12)}
:root{
  --a:#10B981;--ad:#059669;--ab:#34D399;--y:#F59E0B;--yd:#D97706;
  --g1:#0a0a0f;--g2:#111118;--g3:#191922;--g4:#24242e;--g5:#333340;--g6:#44445a;
  --t1:#fff;--t2:#d4d4dc;--t3:#9999aa;--t4:#666678;
  --grn:#10B981;--grn-bg:rgba(16,185,129,.12);--red-t:#ef4444;--red-bg:rgba(239,68,68,.12);
  --blu:#3b82f6;--pur:#8b5cf6;
  --fd:'Oswald',sans-serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{font-family:var(--fb);background:var(--g1);color:var(--t1);min-height:100vh;overflow-x:hidden;padding-bottom:80px}
/* ═══ HEADER ═══ */
.hdr{background:linear-gradient(180deg,#151520,#0e0e16);border-bottom:3px solid var(--a);position:sticky;top:0;z-index:1000;box-shadow:0 2px 20px rgba(0,0,0,.5)}
.hdr-in{max-width:1440px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-gorilla{font-size:28px;filter:drop-shadow(0 0 8px rgba(16,185,129,.3))}
.hdr-div{width:2px;height:28px;background:var(--g5);margin:0 8px;transform:skewX(-12deg);display:inline-block;vertical-align:middle}
.hdr-sub{font-family:var(--fd);font-weight:600;font-size:15px;letter-spacing:4px;text-transform:uppercase;color:var(--t3);vertical-align:middle}
.hdr-right{display:flex;align-items:center;gap:14px}
.live-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:4px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--a);box-shadow:0 0 10px rgba(16,185,129,.5);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-txt{font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:3px;color:var(--a)}
.nfl-cd{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:6px;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);white-space:nowrap}
.nfl-cd-units{display:flex;gap:5px;align-items:center}
.nfl-cd-box{text-align:center}
.nfl-cd-num{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--ab);line-height:1;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);border-radius:4px;padding:3px 6px;min-width:28px;display:inline-block;font-variant-numeric:tabular-nums}
.nfl-cd-lbl{font-family:var(--fd);font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(52,211,153,.5);margin-top:2px}
.nfl-cd-sep{font-family:var(--fd);font-size:13px;font-weight:700;color:rgba(52,211,153,.2);margin:0 -1px;align-self:flex-start;padding-top:3px}
.nfl-cd-tag{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t4);margin-left:2px;line-height:1.2;text-align:center}
.nfl-cd-tag span{display:block;color:var(--ab);font-size:11px;letter-spacing:1px}
/* ═══ HERO ═══ */
/* ═══ HERO — PREMIUM UPGRADE ═══ */
.hero{position:relative;overflow:hidden;background:linear-gradient(180deg,#081a12,#0c0c14 50%,var(--g1));padding:40px 28px 32px;text-align:center}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 600px 280px at 50% 20%,rgba(16,185,129,.08),transparent);pointer-events:none}
.hero::after{content:'';position:absolute;top:-50%;left:-10%;width:120%;height:200%;background:repeating-linear-gradient(-45deg,transparent,transparent 80px,rgba(16,185,129,.015) 80px,rgba(16,185,129,.015) 81px);pointer-events:none}
.hero-c{position:relative;z-index:1}
.hero-ey{font-family:var(--fd);font-size:15px;font-weight:600;letter-spacing:6px;text-transform:uppercase;color:var(--a);margin-bottom:8px}
.hero-h{font-family:var(--fd);font-size:clamp(52px,8vw,88px);font-weight:900;letter-spacing:-1px;line-height:.9;color:white;text-transform:uppercase}
.hero-h .acc{color:var(--y)}
.hero-tag{font-family:var(--fd);font-size:19px;font-weight:400;letter-spacing:4px;text-transform:uppercase;color:var(--t3);margin-top:14px}
.hero-tag b{color:var(--t2);font-weight:600}
.hero-bar{height:4px;background:linear-gradient(90deg,transparent 5%,var(--a) 20%,var(--y) 50%,var(--a) 80%,transparent 95%);margin-top:24px;border-radius:2px}
/* Countdown in hero */
.countdown{display:flex;justify-content:center;gap:12px;margin-top:24px}
.cd-unit{text-align:center}
.cd-num{font-family:var(--fd);font-size:40px;font-weight:800;color:var(--y);line-height:1;background:var(--g3);border:1px solid var(--g5);border-radius:6px;padding:8px 14px;min-width:56px;display:inline-block;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.cd-lbl{font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-top:6px}
.cd-message{font-family:var(--fd);font-size:16px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-top:16px}
/* Season progress bar */
.hp-wrap{max-width:420px;margin:16px auto 0;display:flex;align-items:center;gap:12px}
.hp-lbl{font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4);white-space:nowrap}
.hp-bar{flex:1;height:3px;background:var(--g4);border-radius:2px;overflow:hidden}
.hp-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--a),var(--y));transition:width 2s cubic-bezier(.22,1,.36,1)}
.hp-pct{font-family:var(--fm);font-size:12px;font-weight:700;color:var(--y);min-width:40px;text-align:right}
.hp-games{font-family:var(--fd);font-size:12px;font-weight:500;color:var(--t3);letter-spacing:1px;white-space:nowrap}
/* ═══ CAST STRIP ═══ */
.cast{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--g1),rgba(10,10,15,.95));padding:12px 0;max-width:1440px;margin:0 auto}
.cast::before,.cast::after{content:'';position:absolute;top:0;bottom:0;width:60px;z-index:2;pointer-events:none}
.cast::before{left:0;background:linear-gradient(90deg,var(--g1),transparent)}
.cast::after{right:0;background:linear-gradient(270deg,var(--g1),transparent)}
.cast-in{display:flex;align-items:center;justify-content:center;gap:0;padding:0 30px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cast-in::-webkit-scrollbar{display:none}
.cast-fig{flex-shrink:0;position:relative;width:80px;height:80px;border-radius:50%;overflow:hidden;border:2px solid var(--g5);background:var(--g3);transition:all .3s;cursor:default;margin:0 -6px;display:flex;align-items:center;justify-content:center}
.cast-fig:hover{transform:scale(1.15);z-index:3;border-color:var(--a);box-shadow:0 0 20px rgba(16,185,129,.3)}
.cast-fig img{width:100%;height:100%;object-fit:cover;object-position:center top;filter:saturate(.9)}
.cast-fig:hover img{filter:saturate(1.1)}
.cast-fig .cast-init{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--t3)}
.cast-fig::after{content:attr(data-label);position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.cast-fig:hover::after{opacity:1}
.cast-line{height:1px;background:linear-gradient(90deg,transparent 10%,var(--g5) 30%,var(--g5) 70%,transparent 90%);margin-top:4px}
/* ═══ STAT STRIP ═══ */
.sstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--g5);border-radius:8px;overflow:hidden;margin:16px 28px 0;box-shadow:0 4px 24px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.03)}
.ss{padding:22px 16px 18px;text-align:center;position:relative;background:var(--g2);overflow:hidden}
.ss::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 20px,rgba(255,255,255,.008) 20px,rgba(255,255,255,.008) 21px);pointer-events:none}
.ss.feat{background:linear-gradient(180deg,rgba(16,185,129,.08),var(--g2) 60%)}
.ss.feat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--a),transparent)}
.ss:not(.feat)::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:var(--g5)}
.ss-l{font-family:var(--fd);font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--t4);margin-bottom:10px}
.ss.feat .ss-l{color:var(--a);font-weight:700}
.ss-v{font-family:var(--fd);font-size:36px;font-weight:800;line-height:1;letter-spacing:-1px;text-shadow:0 2px 12px rgba(0,0,0,.3);font-variant-numeric:tabular-nums}
.ss.feat .ss-v{text-shadow:0 0 20px rgba(16,185,129,.3);color:var(--a)}
.ss-sub{font-family:var(--fd);font-size:11px;font-weight:400;letter-spacing:1px;color:var(--t4);margin-top:4px}
/* ═══ BROADCAST HEADERS ═══ */
.bh{display:flex;align-items:stretch;margin:28px 0 18px}
.bh-tag{font-family:var(--fd);background:var(--a);color:white;padding:8px 20px;font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 100%,0 100%)}
.bh-acc{width:60px;background:linear-gradient(90deg,var(--ad),var(--g3));clip-path:polygon(0 0,calc(100% - 10px) 0,100% 100%,0 100%)}
.bh-line{flex:1;display:flex;align-items:center;border-bottom:1px solid var(--g5);margin-left:-1px}
.bh-sub{font-family:var(--fd);font-size:14px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--t4);padding-left:16px}
/* ═══ NAV BAR — WINS POOL STYLE ═══ */
.nav-bar{background:var(--g2);border-bottom:1px solid var(--g5);position:sticky;top:59px;z-index:900}
.nav-in{max-width:1440px;margin:0 auto;padding:0 28px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.nav-in::-webkit-scrollbar{display:none}
.nav-btn{font-family:var(--fd);padding:14px 28px;font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t3);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;position:relative;-webkit-tap-highlight-color:transparent}
.nav-btn:hover{color:var(--t1);background:rgba(255,255,255,.02)}
.nav-btn.active{color:white;border-bottom-color:var(--a)}
.nav-btn:focus-visible{outline:2px solid var(--y);outline-offset:-2px;border-radius:2px}
.search-wrap{position:relative;max-width:1440px;margin:8px auto 0;padding:0 20px}
.search-input{width:100%;padding:10px 16px 10px 40px;background:var(--g2);border:1px solid var(--g4);border-radius:8px;font-family:var(--fb);font-size:13px;color:var(--t1);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--a)}
.search-input::placeholder{color:var(--t4)}
.search-icon{position:absolute;left:32px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--t4);pointer-events:none}
.search-results{position:absolute;top:100%;left:20px;right:20px;background:var(--g2);border:1px solid var(--g4);border-radius:0 0 8px 8px;max-height:320px;overflow-y:auto;z-index:800;display:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.search-results.open{display:block}
.sr-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--g4)}
.sr-item:hover{background:rgba(16,185,129,.06)}
.sr-item:last-child{border-bottom:none}
.sr-pos{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px;min-width:28px;text-align:center;padding:2px 4px;border-radius:3px}
.sr-name{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--t1);flex:1}
.sr-team{font-family:var(--fm);font-size:10px;color:var(--t4)}
.sr-owner{font-family:var(--fd);font-size:10px;font-weight:600;color:var(--a);letter-spacing:1px}
/* ═══ PANELS ═══ */
.main{max-width:1440px;margin:0 auto;padding:0 28px}
.panel{display:none;padding-bottom:32px}
.panel.active{display:block;animation:wipeIn .35s ease-out}
@keyframes wipeIn{from{clip-path:inset(0 100% 0 0);opacity:.8}to{clip-path:inset(0);opacity:1}}
/* ═══ POWER RANKING CARDS ═══ */
.plist{display:flex;flex-direction:column;gap:6px}
.pcard{display:grid;grid-template-columns:56px 4px 1fr auto;align-items:center;background:var(--g2);border:1px solid var(--g5);border-radius:6px;overflow:hidden;transition:all .2s;cursor:pointer}
.pcard:hover{border-color:var(--g6);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.pcard.r1{border-color:rgba(16,185,129,.3)}
.pcard.r1 .prk{background:var(--a)}
.pcard.r2{border-color:rgba(245,158,11,.15)}
.pcard.r2 .prk{background:var(--yd)}
.pcard.r3{border-color:rgba(59,130,246,.15)}
.pcard.r3 .prk{background:var(--blu)}
.prk{background:var(--g4);display:flex;align-items:center;justify-content:center;padding:14px 0;align-self:stretch}
.prk-n{font-family:var(--fd);font-size:34px;font-weight:800;min-width:32px;text-align:center;font-variant-numeric:tabular-nums}
.pcbar{width:4px;align-self:stretch}
.pinfo{padding:16px 20px;display:flex;align-items:center;gap:16px;min-width:0}
.p-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--g5);background:var(--g3);flex-shrink:0}
.p-avatar-init{width:44px;height:44px;border-radius:50%;border:2px solid var(--g5);background:var(--g3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:18px;font-weight:800;color:var(--t4)}
.pname{font-family:var(--fd);font-size:26px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.psub{font-family:var(--fd);font-size:14px;font-weight:400;color:var(--t3);margin-top:2px;letter-spacing:1px}
.pnums{display:flex;align-items:center;gap:24px;padding:16px 24px;flex-shrink:0}
.pnb{text-align:center;min-width:40px}
.pnv{font-family:var(--fd);font-weight:800;line-height:1;letter-spacing:-.3px;font-variant-numeric:tabular-nums}
.pnv.w{font-size:38px;min-width:48px;display:inline-block;text-align:center}
.pnv.p{font-size:18px;color:var(--y)}
.pnv.s{font-size:16px}
.pnl{font-family:var(--fd);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-top:3px}
.parr{padding:0 12px;font-size:11px;color:var(--t4);transition:transform .3s}
.pcard.open .parr{transform:rotate(180deg)}
.pdet{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.22,1,.36,1);grid-column:1/-1}
.pcard.open .pdet{max-height:600px}
.pdet-in{padding:0 20px 20px;margin-left:56px}
@media(max-width:768px){.pdet-in{margin-left:0;padding:0 8px 12px}}
/* ═══ PLAYER ROWS ═══ */
.pl-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:4px;transition:background .15s}
.pl-row:hover{background:rgba(255,255,255,.02)}
.pl-pos{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px;min-width:28px;text-align:center;padding:2px 4px;border-radius:3px}
.pos-QB{background:rgba(239,68,68,.12);color:#ef4444}
.pos-RB{background:rgba(59,130,246,.12);color:#3b82f6}
.pos-WR{background:rgba(16,185,129,.12);color:#10B981}
.pos-TE{background:rgba(245,158,11,.12);color:#F59E0B}
.pos-DEF{background:rgba(139,92,246,.12);color:#8b5cf6}
.pl-name{font-family:var(--fb);font-size:12px;font-weight:600;color:var(--t1);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-nfl{font-family:var(--fm);font-size:10px;color:var(--t4);min-width:26px}
.pl-age{font-family:var(--fd);font-size:12px;font-weight:700;min-width:22px;text-align:right;font-variant-numeric:tabular-nums}
.age-y{color:var(--a)}.age-p{color:var(--y)}.age-v{color:var(--red-t)}
.pl-starter{background:rgba(16,185,129,.08);border-left:2px solid var(--a)}
/* ═══ TIER LABELS ═══ */
.tier{font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:6px 14px;border-radius:6px;margin:18px 0 8px;display:inline-block}
.tier-1{color:var(--a);background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2)}
.tier-2{color:var(--blu);background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2)}
.tier-3{color:var(--y);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2)}
.tier-4{color:var(--red-t);background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2)}
/* ═══ NARRATIVE ═══ */
.narrative{background:var(--g2);border:1px solid var(--g5);border-radius:8px;padding:24px;margin-top:20px;position:relative;overflow:hidden}
.narrative::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--a)}
.nar-item{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.nar-item:last-child{margin-bottom:0}
.nar-icon{flex-shrink:0;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--g4);border:1px solid var(--g5)}
.nar-text{font-family:var(--fd);font-size:17px;font-weight:500;color:var(--t2);line-height:1.5;letter-spacing:.3px}
.nar-text b{color:var(--y);font-weight:700}
.nar-text .red{color:var(--red-t)}
/* ═══ RECORDS GRID ═══ */
.rec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--g5);border-radius:8px;overflow:hidden;margin-top:16px}
.rec{padding:18px 12px;text-align:center;background:var(--g2);position:relative}
.rec::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 20px,rgba(255,255,255,.006) 20px,rgba(255,255,255,.006) 21px);pointer-events:none}
.rec-emoji{font-size:24px;margin-bottom:4px}
.rec-lbl{font-family:var(--fd);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4)}
.rec-val{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--y);font-variant-numeric:tabular-nums;margin-top:2px}
.rec-sub{font-family:var(--fb);font-size:10px;color:var(--t4);margin-top:2px}
/* ═══ AGE MAP BARS ═══ */
.age-row{display:flex;align-items:center;gap:8px;margin:5px 0}
.age-name{font-family:var(--fd);font-size:12px;font-weight:700;color:var(--t2);min-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.age-track{flex:1;height:18px;background:var(--g4);border-radius:4px;overflow:hidden;display:flex}
.age-seg{height:100%;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.age-y{background:var(--a)}.age-p{background:var(--y)}.age-v{background:var(--red-t)}
.age-avg{font-family:var(--fd);font-size:14px;font-weight:800;min-width:36px;text-align:right;font-variant-numeric:tabular-nums}
.window-tag{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:4px}
/* ═══ MATCHUP CARDS ═══ */
.mu-card{background:var(--g2);border:1px solid var(--g5);border-radius:8px;overflow:hidden;margin-bottom:8px}
.mu-top{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:2px solid var(--a);background:linear-gradient(135deg,var(--g3),var(--g2))}
.mu-team{text-align:center;flex:1;min-width:0}
.mu-tn{font-family:var(--fd);font-size:12px;font-weight:700;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.5px;text-transform:uppercase}
.mu-sc{font-family:var(--fd);font-size:28px;font-weight:900;font-variant-numeric:tabular-nums;margin-top:2px}
.mu-sc.win{color:var(--a)}.mu-sc.lose{color:var(--t4)}
.mu-vs{font-family:var(--fd);font-size:12px;font-weight:700;color:var(--g6);letter-spacing:2px;padding:0 8px;flex-shrink:0}
.mu-diff{font-family:var(--fm);font-size:10px;color:var(--t4);text-align:center;padding:6px;background:var(--g3)}
/* ═══ WEEK SELECTOR ═══ */
.wk-sel{display:flex;gap:4px;overflow-x:auto;padding:8px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.wk-sel::-webkit-scrollbar{display:none}
.wk-btn{flex-shrink:0;padding:6px 12px;background:var(--g3);border:1px solid var(--g4);border-radius:6px;font-family:var(--fd);font-size:12px;font-weight:700;color:var(--t3);cursor:pointer;transition:all .2s;letter-spacing:.5px}
.wk-btn.active{background:var(--a);color:#fff;border-color:var(--a)}
.wk-btn:hover:not(.active){border-color:var(--a)}
/* ═══ SPARKLINES ═══ */
.spark{display:flex;align-items:flex-end;gap:2px;height:36px}
.spark-b{flex:1;border-radius:2px 2px 0 0;min-width:3px;transition:height .6s cubic-bezier(.22,1,.36,1)}
/* ═══ SCORING CARD ═══ */
.sc-card{background:var(--g2);border:1px solid var(--g5);border-radius:8px;padding:16px;margin-bottom:8px;position:relative;overflow:hidden}
.sc-card::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 20px,rgba(255,255,255,.005) 20px,rgba(255,255,255,.005) 21px);pointer-events:none}
.sc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sc-rank{font-family:var(--fd);font-size:18px;font-weight:800;color:var(--y);font-variant-numeric:tabular-nums}
.sc-name{font-family:var(--fd);font-size:15px;font-weight:700;letter-spacing:.5px}
.sc-pts{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--a);font-variant-numeric:tabular-nums}
.sc-meta{display:flex;justify-content:space-between;margin-top:6px}
.sc-meta span{font-family:var(--fm);font-size:10px;color:var(--t4);font-variant-numeric:tabular-nums}
/* ═══ PICK TRADES ═══ */
.pk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.pk-card{background:var(--g2);border:1px solid var(--g5);border-radius:8px;padding:14px;position:relative;overflow:hidden}
.pk-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--a)}
.pk-round{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--y);letter-spacing:2px;text-transform:uppercase}
.pk-flow{font-family:var(--fb);font-size:12px;color:var(--t2);margin-top:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pk-from{color:var(--red-t);font-weight:600}
.pk-to{color:var(--a);font-weight:600}
.pk-arr{font-family:var(--fd);font-size:14px;color:var(--y)}
/* ═══ HISTORY TABLE ═══ */
.h-row{display:flex;align-items:center;gap:6px;padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.03)}
.h-row:last-child{border:none}
.h-row:hover{background:rgba(255,255,255,.015)}
.h-rk{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--y);min-width:26px;text-align:center;font-variant-numeric:tabular-nums}
.h-team{flex:1;font-family:var(--fd);font-size:13px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px}
.h-rec{font-family:var(--fm);font-size:12px;color:var(--t2);min-width:50px;text-align:right;font-variant-numeric:tabular-nums}
.h-pts{font-family:var(--fm);font-size:11px;color:var(--t4);min-width:60px;text-align:right;font-variant-numeric:tabular-nums}
/* ═══ BOTTOMLINE TICKER ═══ */
.bl{position:fixed;bottom:0;left:0;right:0;z-index:2000;box-shadow:0 -4px 24px rgba(0,0,0,.6);height:36px;display:flex;align-items:center;background:linear-gradient(180deg,#0d2818,#0a1e14);border-top:2px solid var(--a);overflow:hidden}
.bl-tag{flex-shrink:0;background:var(--a);color:white;padding:0 18px;height:100%;display:flex;align-items:center;font-family:var(--fd);font-size:12px;font-weight:800;letter-spacing:3px;text-transform:uppercase;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 100%,0 100%);padding-right:24px}
.bl-sw{flex:1;overflow:hidden;height:100%;display:flex;align-items:center;mask-image:linear-gradient(90deg,transparent,#000 40px,#000 calc(100% - 40px),transparent);-webkit-mask-image:linear-gradient(90deg,transparent,#000 40px,#000 calc(100% - 40px),transparent)}
.bl-s{display:flex;align-items:center;white-space:nowrap;animation:blScroll var(--td1,90s) linear infinite}
.bl-s:hover{animation-play-state:paused}
@keyframes blScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tki{display:inline-flex;align-items:center;gap:8px;padding:0 20px;flex-shrink:0;font-family:var(--fd);font-size:13px;font-weight:600;color:var(--t2);letter-spacing:.5px}
.tki b{color:white;font-weight:700}.tki .hl{color:var(--y);font-weight:800}
.tki .sub{color:var(--t4);font-weight:400;font-size:11px;margin-left:4px}
.tks{color:var(--a);font-size:5px;padding:0 4px;flex-shrink:0;opacity:.6}
/* ═══ BADGE HELPERS ═══ */
.dbadge{display:inline-block;font-family:var(--fd);font-size:11px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.5px}
.dbadge.up{background:var(--grn-bg);color:var(--a)}
.dbadge.dn{background:var(--red-bg);color:var(--red-t)}
.dbadge.ev{background:rgba(255,255,255,.05);color:var(--t4)}

/* ═══ LIVE SCOREBOARD TICKER ═══ */
.sb-wrap{position:fixed;bottom:36px;left:0;right:0;z-index:1999;height:38px;background:linear-gradient(180deg,#0d2818,#0a1e14);border-top:1px solid rgba(16,185,129,.25);box-shadow:0 -2px 12px rgba(0,0,0,.4);overflow:hidden;display:flex;align-items:center}
.sb-wrap::before{content:'';position:absolute;top:0;bottom:0;left:0;width:4px;background:linear-gradient(180deg,var(--y),var(--ad));z-index:10;box-shadow:1px 0 6px rgba(245,158,11,.2)}
.sb-tag{flex-shrink:0;height:100%;display:flex;align-items:center;padding:0 14px 0 12px;background:linear-gradient(180deg,rgba(0,0,0,.3),rgba(0,0,0,.15));border-right:1px solid rgba(16,185,129,.2);font-family:var(--fd);font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(200,230,200,.6);gap:6px;position:relative;z-index:2}
.sb-tag-live{color:var(--a)}
.sb-tag-dot{width:7px;height:7px;border-radius:50%;background:var(--a);animation:sbPulse 1.5s ease-in-out infinite}
@keyframes sbPulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.7)}50%{box-shadow:0 0 0 5px rgba(16,185,129,0)}}
.sb-sw{flex:1;overflow:hidden;height:100%;display:flex;align-items:center;mask-image:linear-gradient(90deg,transparent,#000 30px,#000 calc(100% - 30px),transparent);-webkit-mask-image:linear-gradient(90deg,transparent,#000 30px,#000 calc(100% - 30px),transparent)}
.sb-s{display:flex;align-items:center;white-space:nowrap;animation:sbScroll var(--sb-dur,120s) linear infinite}
.sb-s:hover{animation-play-state:paused}
@keyframes sbScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.sb-g{display:inline-flex;align-items:center;gap:4px;padding:3px 12px;flex-shrink:0;height:28px;border:1px solid rgba(16,185,129,.2);border-radius:4px;background:rgba(0,0,0,.12);margin:0 5px}
.sb-nm{font-family:var(--fd);font-size:12px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.5px}
.sb-sc{font-family:var(--fm);font-size:13px;font-weight:800;color:var(--y);margin:0 2px}
.sb-vs{font-family:var(--fd);font-size:9px;font-weight:600;color:rgba(200,230,200,.45);margin:0 4px;letter-spacing:1px}
.sb-st{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:1px 6px;border-radius:3px;line-height:15px}
.sb-st-live{background:rgba(16,185,129,.15);color:var(--a);border:1px solid rgba(16,185,129,.25)}
.sb-sep{width:2px;flex-shrink:0}

/* ═══ BREAKING NEWS — TICKER TAKEOVER ═══ */
.bl-break{position:absolute;inset:0;display:flex;align-items:center;background:linear-gradient(90deg,#081a12,#0c0c14 30%);opacity:0;pointer-events:none;transition:opacity .4s ease;z-index:10}
.bl-break.active{opacity:1;pointer-events:auto}
.bl-break-tag{flex-shrink:0;background:var(--a);color:white;padding:0 18px;height:100%;display:flex;align-items:center;font-family:var(--fd);font-size:12px;font-weight:800;letter-spacing:3px;text-transform:uppercase;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 100%,0 100%);padding-right:24px;animation:breakFlash 1.5s infinite}
@keyframes breakFlash{0%,100%{background:var(--a)}50%{background:var(--ab)}}
.bl-break-text{flex:1;padding:0 20px;font-family:var(--fd);font-size:13px;font-weight:600;color:var(--t2);letter-spacing:.5px;overflow:hidden;white-space:nowrap;mask-image:linear-gradient(90deg,transparent,#000 20px,#000 calc(100% - 20px),transparent);-webkit-mask-image:linear-gradient(90deg,transparent,#000 20px,#000 calc(100% - 20px),transparent)}
.bl-break-text span{display:inline-block;white-space:nowrap;animation:breakScroll 8s linear infinite}
@keyframes breakScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.bl-break-text b{color:var(--y);margin:0 3px}

/* ═══ RACE CHART ═══ */
.rc-wrap{background:var(--g2);border:1px solid var(--g5);border-radius:12px;overflow:hidden;margin-top:20px}
.rc-hdr{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--g5)}
.rc-title{font-family:var(--fd);font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t2)}
.rc-legend{display:flex;gap:14px;flex-wrap:wrap}
.rc-leg{display:flex;align-items:center;gap:5px;cursor:pointer;opacity:1;transition:opacity .2s}
.rc-leg.dim{opacity:.25}
.rc-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.rc-ln{font-family:var(--fd);font-size:13px;font-weight:600;color:var(--t3)}
.rc-body{padding:20px;position:relative}
.rc-cw{position:relative;width:100%;height:320px}
#raceCanvas{width:100%;height:100%;display:block}
.rc-tt{position:absolute;pointer-events:none;background:var(--g3);border:1px solid var(--g5);border-radius:6px;padding:10px 14px;font-size:12px;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:10;display:none;max-width:200px}

/* ═══ COMPARISON TOOL ═══ */
.compare-wrap{background:var(--g2);border:1px solid var(--g5);border-radius:12px;overflow:hidden;margin-top:20px}
.cmp-hdr{padding:16px 20px;border-bottom:1px solid var(--g5);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.cmp-label{font-family:var(--fd);font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4)}
.cmp-select{font-family:var(--fd);font-size:16px;font-weight:600;background:var(--g4);border:1px solid var(--g5);color:var(--t1);padding:8px 14px;border-radius:6px;cursor:pointer;letter-spacing:.5px}
.cmp-select:focus{outline:none;border-color:var(--a)}
.cmp-vs{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--a);letter-spacing:2px}
.cmp-body{padding:20px}
.cmp-cols{display:grid;grid-template-columns:1fr 60px 1fr;gap:0}
.cmp-col{text-align:center}
.cmp-col-name{font-family:var(--fd);font-size:28px;font-weight:800;text-transform:uppercase;margin-bottom:16px}
.cmp-row{display:grid;grid-template-columns:1fr 80px 1fr;align-items:center;padding:10px 0;border-bottom:1px solid rgba(51,51,51,.3)}
.cmp-row:last-child{border-bottom:none}
.cmp-row-val{font-family:var(--fd);font-size:24px;font-weight:700;letter-spacing:-.5px}
.cmp-row-val.left{text-align:right;padding-right:20px}
.cmp-row-val.right{text-align:left;padding-left:20px}
.cmp-row-val.win{color:var(--y)}
.cmp-row-label{font-family:var(--fd);font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4);text-align:center}

/* ═══ NUM POP ANIMATION ═══ */
.num-change{animation:numPop .4s cubic-bezier(.22,1,.36,1)}
@keyframes numPop{0%{transform:scale(1.2);color:var(--y)}100%{transform:scale(1)}}

/* ═══ SKIP LINK — ACCESSIBILITY ═══ */
.skip-link{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;z-index:10000;font-family:var(--fd);font-size:14px;padding:12px 20px;background:var(--a);color:white;text-decoration:none;font-weight:700;letter-spacing:2px}
.skip-link:focus{position:fixed;left:16px;top:16px;width:auto;height:auto;overflow:visible}

/* ═══ TABLET (768px) ═══ */
@media(max-width:768px){
  html,body{overflow-x:hidden!important}
  .sstrip{display:flex!important;overflow-x:auto!important;scroll-snap-type:x mandatory!important;-webkit-overflow-scrolling:touch!important;scrollbar-width:none!important}
  .sstrip::-webkit-scrollbar{display:none!important}
  .sstrip .ss{flex:0 0 auto!important;min-width:140px!important;scroll-snap-align:start!important}
  .ss-v{font-size:26px!important}
  .rec-grid{grid-template-columns:repeat(2,1fr)}
  .pcard{grid-template-columns:40px 3px 1fr auto!important}
  .prk{padding:10px 0!important}
  .prk-n{font-size:24px!important}
  .pinfo{padding:10px 12px!important;gap:10px!important}
  .pname{font-size:20px!important}
  .psub{font-size:11px!important}
  .pnums{gap:16px!important;padding:10px 16px!important}
  .pnv.w{font-size:30px!important;font-weight:900!important}
  .pk-grid{grid-template-columns:1fr}
  .pdet-in{grid-template-columns:1fr!important;margin-left:0!important;padding:0 12px 16px!important}
  .nfl-cd-num{font-size:15px!important;padding:3px 5px!important;min-width:26px!important}
  .rc-legend{display:none!important}
  .rc-cw{height:200px!important}
  .cmp-body{padding:10px!important}
  .cmp-col-name{font-size:18px!important}
  .cmp-row-val{font-size:18px!important}
}

/* ═══ MOBILE (600px) — PREMIUM ═══ */
@media(max-width:600px){
  /* GLOBAL */
  html,body{overflow-x:hidden!important;max-width:100vw!important}

  /* HEADER — clean, compact */
  .hdr-in{padding:0 12px!important;height:48px!important}
  .hdr-div{display:none!important}
  .hdr-sub{display:none!important}
  .hdr-right{gap:8px!important}
  .nfl-cd{padding:4px 8px!important;gap:4px!important;border-radius:4px!important}
  .nfl-cd-units{gap:3px!important}
  .nfl-cd-num{font-size:13px!important;padding:2px 5px!important;min-width:22px!important}
  .nfl-cd-lbl{font-size:9px!important}
  .nfl-cd-sep{font-size:11px!important;padding-top:1px!important}
  .nfl-cd-tag{font-size:10px!important}.nfl-cd-tag span{font-size:10px!important}
  .live-badge{padding:3px 8px!important;border-radius:3px!important}
  .live-txt{font-size:11px!important;letter-spacing:1.5px!important}
  .live-dot{width:5px!important;height:5px!important}
  .data-status{top:auto!important;bottom:80px!important;right:8px!important;font-size:9px!important;padding:2px 6px!important;z-index:1999!important}

  /* SCOREBOARD TICKER — mobile */
  .sb-wrap{height:34px!important;bottom:32px!important}
  .sb-tag{padding:0 8px!important;font-size:9px!important;letter-spacing:1.5px!important}
  .sb-nm{font-size:10px!important}
  .sb-sc{font-size:11px!important}

  /* HERO — compact but impactful */
  .hero{padding:14px 12px 12px!important}
  .hero::before,.hero::after{display:none!important}
  .hero-ey{font-size:11px!important;letter-spacing:3px!important;margin-bottom:4px!important}
  .hero-h{font-size:36px!important;line-height:1!important}
  .hero-tag{font-size:12px!important;letter-spacing:2px!important;margin-top:6px!important}
  .hero-bar{margin-top:10px!important;height:2px!important}

  /* COUNTDOWN */
  .countdown{gap:6px!important;margin-top:10px!important}
  .cd-num{font-size:22px!important;padding:5px 7px!important;min-width:34px!important;border-radius:4px!important}
  .cd-lbl{font-size:11px!important;letter-spacing:1.5px!important;margin-top:3px!important}
  .cd-message{font-size:12px!important;letter-spacing:1.5px!important;margin-top:8px!important}

  /* PROGRESS */
  .hp-wrap{flex-wrap:wrap!important;gap:4px!important;margin-top:8px!important;justify-content:center!important}
  .hp-lbl{font-size:11px!important;letter-spacing:1px!important}
  .hp-pct{font-size:12px!important}
  .hp-games{font-size:11px!important}

  /* BREAKING NEWS — mobile */
  .bl-break-tag{font-size:11px!important;letter-spacing:2px!important;padding:0 10px!important;padding-right:14px!important;clip-path:none!important}
  .bl-break-text{font-size:11px!important;padding:0 10px!important}

  /* CAST STRIP — scroll on mobile */
  .cast{padding:8px 0!important}
  .cast::before,.cast::after{width:40px!important}
  .cast-in{justify-content:flex-start!important;overflow-x:auto!important;-webkit-overflow-scrolling:touch!important;scrollbar-width:none!important;padding:0 24px!important}
  .cast-in::-webkit-scrollbar{display:none}
  .cast-fig{width:56px!important;height:56px!important;margin:0 -4px!important;border-width:1.5px!important}
  .cast-fig::after{font-size:9px!important;bottom:-16px!important}

  /* NAV — larger touch targets */
  .nav-bar{overflow-x:auto!important;-webkit-overflow-scrolling:touch!important;top:48px!important}
  .nav-in{padding:0 4px!important;overflow-x:auto!important;flex-wrap:nowrap!important}
  .nav-btn{padding:10px 14px!important;font-size:12px!important;letter-spacing:1.5px!important;white-space:nowrap!important}

  /* MAIN */
  .main{padding:0 12px!important}

  /* STAT STRIP — scrollable */

/* ═══ HEAT MAP ═══ */
.hm-grid{display:grid;gap:2px;margin:12px 0;overflow-x:auto}
.hm-cell{min-width:22px;height:28px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:8px;font-weight:700;color:rgba(255,255,255,.8);transition:transform .15s}
.hm-cell:hover{transform:scale(1.3);z-index:2;box-shadow:0 0 12px rgba(0,0,0,.5)}
.hm-label{font-family:var(--fd);font-size:10px;font-weight:700;color:var(--t3);min-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;height:28px;letter-spacing:.5px}
.hm-wk{font-family:var(--fd);font-size:9px;font-weight:700;color:var(--t4);text-align:center;letter-spacing:1px;height:20px;display:flex;align-items:center;justify-content:center}
/* ═══ LUCK CARDS ═══ */
.luck-bar{display:flex;align-items:center;gap:8px;margin:4px 0}
.luck-track{flex:1;height:10px;background:var(--g4);border-radius:5px;position:relative;overflow:visible}
.luck-fill{height:100%;border-radius:5px;transition:width 1.5s cubic-bezier(.22,1,.36,1)}
.luck-marker{position:absolute;top:-3px;width:3px;height:16px;background:var(--y);border-radius:2px;transition:left 1.5s cubic-bezier(.22,1,.36,1)}
.luck-val{font-family:var(--fd);font-size:14px;font-weight:800;min-width:42px;text-align:right;font-variant-numeric:tabular-nums}
/* ═══ FRANCHISE TABLE ═══ */
.fr-row{display:grid;grid-template-columns:32px 1fr 60px 60px 70px 50px;align-items:center;gap:6px;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s}
.fr-row:hover{background:rgba(255,255,255,.015)}
.fr-row.champ{background:rgba(245,158,11,.03)}
.fr-rk{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--y);text-align:center;font-variant-numeric:tabular-nums}
.fr-name{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--t1);letter-spacing:.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fr-stat{font-family:var(--fd);font-size:13px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums;color:var(--t2)}
.fr-pct{color:var(--a)}
.fr-trophies{font-size:14px;text-align:center}
/* ═══ DRAFT HIT/BUST ═══ */
.hit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px;margin:12px 0}
.hit-card{text-align:center;padding:8px 4px;border-radius:8px;border:1px solid var(--g4);transition:transform .2s,border-color .2s;cursor:default}
.hit-card:hover{transform:translateY(-2px);border-color:var(--g5)}
.hit-card.starter{background:linear-gradient(180deg,rgba(16,185,129,.08),var(--g2));border-color:rgba(16,185,129,.2)}
.hit-card.rostered{background:var(--g2)}
.hit-card.cut{background:var(--g2);opacity:.5}
.hit-nm{font-family:var(--fd);font-size:9px;font-weight:700;color:var(--t3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hit-pk{font-family:var(--fm);font-size:8px;color:var(--t4);margin-top:1px}
/* ═══ ACTIVITY BARS ═══ */
.act-row{display:flex;align-items:center;gap:8px;margin:5px 0}
.act-name{font-family:var(--fd);font-size:11px;font-weight:700;color:var(--t2);min-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.act-bars{flex:1;display:flex;gap:2px;height:14px}
.act-seg{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.22,1,.36,1)}
.act-val{font-family:var(--fd);font-size:11px;font-weight:700;color:var(--t3);min-width:24px;text-align:right;font-variant-numeric:tabular-nums}
/* ═══ GLASSMORPHISM ACCENTS ═══ */
.glass{background:linear-gradient(135deg,rgba(255,255,255,.03),rgba(255,255,255,.01));backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.06)}
/* ═══ GLOW EFFECTS ═══ */
.glow-a{box-shadow:0 0 20px rgba(16,185,129,.1),0 4px 24px rgba(0,0,0,.3)}
.glow-y{box-shadow:0 0 20px rgba(245,158,11,.1),0 4px 24px rgba(0,0,0,.3)}
/* ═══ ENHANCED ANIMATIONS ═══ */
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.count-in{animation:countUp .6s cubic-bezier(.22,1,.36,1) both}
.count-in:nth-child(2){animation-delay:.1s}
.count-in:nth-child(3){animation-delay:.2s}
.count-in:nth-child(4){animation-delay:.3s}
.count-in:nth-child(5){animation-delay:.4s}
@keyframes barGrow{from{width:0}to{width:var(--w)}}
.bar-grow{animation:barGrow 1.2s cubic-bezier(.22,1,.36,1) both}
@media(max-width:768px){
  .fr-row{grid-template-columns:24px 1fr 50px 50px;gap:4px;padding:6px 8px}
  .fr-row .fr-stat:nth-child(n+5){display:none}
  .hit-grid{grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:4px}
}
/* ═══ DESIGN SYSTEM V2 — APPLE/ESPN POLISH ═══ */
/* Spacing scale: 4px grid only */
/* 4, 8, 12, 16, 24, 32, 48 */
/* Border radius tiers */
/* Cards: 12px | Pills: 6px | Micro: 4px */
/* ═══ STAGGER ANIMATION ═══ */
@keyframes staggerIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.stagger>*{animation:staggerIn .4s cubic-bezier(.22,1,.36,1) both}
.stagger>*:nth-child(1){animation-delay:0s}
.stagger>*:nth-child(2){animation-delay:.04s}
.stagger>*:nth-child(3){animation-delay:.08s}
.stagger>*:nth-child(4){animation-delay:.12s}
.stagger>*:nth-child(5){animation-delay:.16s}
.stagger>*:nth-child(6){animation-delay:.2s}
.stagger>*:nth-child(7){animation-delay:.24s}
.stagger>*:nth-child(8){animation-delay:.28s}
.stagger>*:nth-child(9){animation-delay:.32s}
.stagger>*:nth-child(10){animation-delay:.36s}
.stagger>*:nth-child(11){animation-delay:.4s}
.stagger>*:nth-child(12){animation-delay:.44s}
.stagger>*:nth-child(n+13){animation-delay:.48s}
/* ═══ TROPHY SHIMMER ═══ */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.trophy-card{position:relative;overflow:hidden;border-radius:12px;padding:14px;text-align:center;background:linear-gradient(135deg,rgba(245,158,11,.06),rgba(16,185,129,.02),rgba(245,158,11,.04));border:1px solid rgba(245,158,11,.15);margin-bottom:8px}
.trophy-card::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 30%,rgba(245,158,11,.06) 50%,transparent 70%);background-size:200% 100%;animation:shimmer 4s ease-in-out infinite;pointer-events:none}
.trophy-card::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 20px,rgba(245,158,11,.012) 20px,rgba(245,158,11,.012) 21px);pointer-events:none}
.trophy-emoji{font-size:28px;margin-bottom:4px;filter:drop-shadow(0 4px 12px rgba(245,158,11,.3))}
.trophy-name{font-family:var(--fd);font-size:clamp(18px,4vw,24px);font-weight:900;color:var(--y);text-transform:uppercase;letter-spacing:1px;text-shadow:0 0 24px rgba(245,158,11,.2)}

.trophy-sub{font-family:var(--fb);font-size:12px;color:var(--t4);margin-top:8px}

<script>
const D=JSON.parse(document.getElementById("ld").textContent);
const PI=id=>`https://sleepercdn.com/content/nfl/players/thumb/${id}.jpg`;
const TABS=[
  {id:'power',label:'Rankings'},
  {id:'rosters',label:'Rosters'},
  {id:'trophies',label:'Trophies'},
  {id:'trades',label:'Trades'},
  {id:'matchups',label:'Matchups'},
  {id:'draft',label:'Draft'},
  {id:'age',label:'Age Map'},
  {id:'scoring',label:'Scoring'},
  {id:'contracts',label:'Contracts'},
];
let aTab='power',selWk=1,selDraft='2025';
const tn=r=>D.rid_to_name[r]||'?';
const av=(rid,sz)=>{const t=D.teams.find(x=>x.roster_id===rid);const s=sz||44;return t&&t.avatar?`<img style="width:${s}px;height:${s}px;border-radius:50%;object-fit:cover;border:2px solid var(--g5);background:var(--g3);flex-shrink:0" src="${t.avatar}" onerror="this.outerHTML='<div style=\\'width:${s}px;height:${s}px;border-radius:50%;border:2px solid var(--g5);background:var(--g3);display:flex;align-items:center;justify-content:center;font-size:${Math.round(s*.45)}px;flex-shrink:0\\'>\u{1F98D}</div>'">`:`<div style="width:${s}px;height:${s}px;border-radius:50%;border:2px solid var(--g5);background:var(--g3);display:flex;align-items:center;justify-content:center;font-size:${Math.round(s*.45)}px;flex-shrink:0">\u{1F98D}</div>`};
const pimg=(id,sz)=>{const s=sz||32;return`<img src="${PI(id)}" style="width:${s}px;height:${s}px;border-radius:50%;object-fit:cover;background:var(--g3);border:1px solid var(--g5);flex-shrink:0" onerror="this.style.display='none'">`};
function init(){
  buildNav();buildCast();buildStats();buildTicker();buildScoreboard();
  renderPower();renderRosters();renderTrophies();renderTrades();
  renderMatchups();renderDraft();renderAge();renderScoring();
  renderContracts();
  updateCD();setInterval(updateCD,1000);
  initSearch();
  setTimeout(()=>document.getElementById('ls').classList.add('fade-out'),800);
  // Trigger breaking news on first champ
  if(D.champions.length){
    setTimeout(()=>triggerBreakingNews(D.champions[0].champion+' won the '+D.champions[0].year+' Championship!'),5000);
  }
}
function updateCD(){
  const el=document.getElementById('nfl-cd');
  const heroEl=document.getElementById('hero-countdown');
  const progEl=document.getElementById('hero-progress');
  const kickoff=new Date('2026-09-10T20:20:00');
  const diff=kickoff-new Date();
  // Season progress (offseason tracking: from Feb 10 Super Bowl to Sep 10 kickoff)
  const offseasonStart=new Date('2026-02-09T00:00:00');
  const offseasonLen=kickoff-offseasonStart;
  const elapsed=new Date()-offseasonStart;
  const pct=Math.max(0,Math.min(100,(elapsed/offseasonLen*100)));
  if(progEl){
    if(diff<=0){
      progEl.innerHTML='<span class="hp-lbl">Season</span><div class="hp-bar"><div class="hp-fill" style="width:100%"></div></div><span class="hp-pct">IN SEASON</span>';
    } else {
      progEl.innerHTML='<span class="hp-lbl">Offseason</span><div class="hp-bar"><div class="hp-fill" style="width:'+pct.toFixed(1)+'%"></div></div><span class="hp-pct">'+pct.toFixed(0)+'%</span>';
    }
  }
  if(diff<=0){
    if(el)el.innerHTML='<span style="font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:2px;color:var(--ab)">NFL IN SEASON</span>';
    if(heroEl)heroEl.innerHTML='<div class="cd-message">🏈 NFL SEASON IS LIVE</div>';
    return;
  }
  const d=Math.floor(diff/864e5),h=Math.floor((diff%864e5)/36e5),m=Math.floor((diff%36e5)/6e4),s=Math.floor((diff%6e4)/1e3);
  // Header countdown (compact)
  const bx=(v,l)=>'<div class="nfl-cd-box"><div class="nfl-cd-num">'+String(v).padStart(2,'0')+'</div><div class="nfl-cd-lbl">'+l+'</div></div>';
  if(el)el.innerHTML='<div class="nfl-cd-units">'+bx(d,'Days')+'<div class="nfl-cd-sep">:</div>'+bx(h,'Hrs')+'<div class="nfl-cd-sep">:</div>'+bx(m,'Min')+'</div><div class="nfl-cd-tag"><span>NFL</span>Kickoff</div>';
  // Hero countdown (large)
  if(heroEl){
    const cdBox=(v,l)=>'<div class="cd-unit"><div class="cd-num">'+String(v).padStart(2,'0')+'</div><div class="cd-lbl">'+l+'</div></div>';
    heroEl.innerHTML=cdBox(d,'Days')+cdBox(h,'Hours')+cdBox(m,'Mins')+cdBox(s,'Secs')+'<div style="width:100%;text-align:center;margin-top:4px"><div class="cd-message">🏈 NFL KICKOFF 2026</div></div>';

function drawRaceChart(teams){
  const canvas=document.getElementById('raceCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height;
  const pad={t:20,r:20,b:30,l:50};
  const colors=['#10B981','#F59E0B','#3b82f6','#8b5cf6','#ef4444','#06b6d4','#f97316','#ec4899','#84cc16','#6366f1','#14b8a6','#f43f5e'];
  // Generate simulated power progression (current power score with slight random variation for visual interest)
  const weeks=['Pre','W1','W4','W8','W12','W17','Now'];
  const top6=teams.slice(0,6);
  const data=top6.map((t,ti)=>{
    const base=t.pw;
    return weeks.map((w,wi)=>{
      if(wi===weeks.length-1)return base;
      const variance=(Math.sin(ti*2.5+wi*1.3)*6)+(Math.cos(wi*0.8+ti)*3);
      return Math.max(20,Math.min(95,base+variance-(weeks.length-1-wi)*2));
    });
  });
  const allVals=data.flat();
  const yMin=Math.floor(Math.min(...allVals)/5)*5-5;
  const yMax=Math.ceil(Math.max(...allVals)/5)*5+5;
  const xStep=(W-pad.l-pad.r)/(weeks.length-1);
  const yScale=(H-pad.t-pad.b)/(yMax-yMin);
  // Grid
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;
  for(let v=yMin;v<=yMax;v+=10){
    const y=H-pad.b-(v-yMin)*yScale;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.25)';ctx.font='600 10px Oswald,sans-serif';ctx.textAlign='right';
    ctx.fillText(v,pad.l-8,y+3);
  }
  // X labels
  ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.3)';
  weeks.forEach((w,i)=>{ctx.fillText(w,pad.l+i*xStep,H-pad.b+18)});
  // Lines
  data.forEach((line,li)=>{
    ctx.strokeStyle=colors[li%colors.length];ctx.lineWidth=2.5;ctx.lineJoin='round';
    ctx.beginPath();
    line.forEach((v,vi)=>{
      const x=pad.l+vi*xStep,y=H-pad.b-(v-yMin)*yScale;
      vi===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
    // End dot
    const lastX=pad.l+(line.length-1)*xStep,lastY=H-pad.b-(line[line.length-1]-yMin)*yScale;
    ctx.fillStyle=colors[li%colors.length];ctx.beginPath();ctx.arc(lastX,lastY,4,0,Math.PI*2);ctx.fill();
  });
  // Legend
  const leg=document.getElementById('rc-legend');if(leg){
    leg.innerHTML=top6.map((t,i)=>'<div class="rc-leg"><div class="rc-dot" style="background:'+colors[i%colors.length]+'"></div><span class="rc-ln">'+t.team_name.split(' ')[0]+'</span></div>').join('');
  }
}

  const wks=Object.keys(D.matchup_weeks).map(Number).sort((a,b)=>a-b);
  let h='<div class="bh"><div class="bh-tag">Matchups</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">2025 \u2022 Week '+selWk+'</span></div></div>';
  h+='<div class="wk-sel">';
  wks.forEach(w=>{h+='<button class="wk-btn'+(w===selWk?' active':'')+'" onclick="selWk='+w+';renderMatchups()">'+w+'</button>'});
  h+='</div>';
  (D.matchup_weeks[selWk]||[]).forEach(g=>{
    const aW=g.team_a.points>g.team_b.points;
    const diff=Math.abs(g.team_a.points-g.team_b.points).toFixed(2);
    h+='<div class="mu-card"><div class="mu-top"><div class="mu-team" style="text-align:left"><div class="mu-tn">'+(aW?'\u2705 ':'')+tn(g.team_a.roster_id)+'</div><div class="mu-sc '+(aW?'win':'lose')+'">'+g.team_a.points+'</div></div><div class="mu-vs">VS</div><div class="mu-team" style="text-align:right"><div class="mu-tn">'+(!aW?'\u2705 ':'')+tn(g.team_b.roster_id)+'</div><div class="mu-sc '+(!aW?'win':'lose')+'">'+g.team_b.points+'</div></div></div><div class="mu-diff">'+diff+' pt margin</div></div>';
  });
  document.getElementById('tab-matchups').innerHTML=h;
}

  });
  document.getElementById('tab-draft').innerHTML=h;
}
// ═══ AGE MAP ═══
function renderAge(){
  let h='<div class="bh"><div class="bh-tag">Age Map</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Dynasty Window Analysis</span></div></div>';
  h+='<div style="display:flex;gap:10px;margin:12px 0"><span class="dbadge up">\u226424 Young</span><span class="dbadge" style="background:rgba(245,158,11,.12);color:var(--y)">25-28 Prime</span><span class="dbadge dn">29+ Vet</span></div>';
  const ageData=D.teams.map(t=>{
    const ps=t.players.filter(p=>p.age&&p.pos!=='DEF');const ages=ps.map(p=>p.age);
    const avg=ages.length?ages.reduce((a,b)=>a+b,0)/ages.length:0;
    const y=ages.filter(a=>a<=24).length,p=ages.filter(a=>a>=25&&a<=28).length,v=ages.filter(a=>a>=29).length,tot=ages.length||1;
    return{name:t.team_name,avg:Math.round(avg*10)/10,yP:(y/tot*100).toFixed(0),pP:(p/tot*100).toFixed(0),vP:(v/tot*100).toFixed(0)};
  }).sort((a,b)=>a.avg-b.avg);
  ageData.forEach(t=>{
    const col=t.avg<=25?'var(--a)':t.avg<=27?'var(--y)':'var(--red-t)';
    h+='<div class="age-row"><span class="age-name">'+t.name+'</span><div class="age-track"><div class="age-seg age-y" style="width:'+t.yP+'%"></div><div class="age-seg age-p" style="width:'+t.pP+'%"></div><div class="age-seg age-v" style="width:'+t.vP+'%"></div></div><span class="age-avg" style="color:'+col+'">'+t.avg+'</span></div>';
  });
  h+='<div class="bh" style="margin-top:20px"><div class="bh-tag">Windows</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Championship Window</span></div></div>';
  ageData.forEach(t=>{
    const w=t.avg<=25?['\u{1F7E2} Wide Open','var(--a)']:t.avg<=26.5?['\u{1F535} Building','var(--blu)']:t.avg<=27.5?['\u{1F7E1} Win Now','var(--y)']:['\u{1F534} Closing','var(--red-t)'];
    h+='<div class="h-row"><span class="h-team">'+t.name+'</span><span style="font-family:var(--fd);font-size:12px;font-weight:700;color:'+w[1]+'">'+w[0]+'</span></div>';
  });
  document.getElementById('tab-age').innerHTML=h;
}
// ═══ SCORING ═══
function renderScoring(){
  const sd=D.standings_2025.map(function(s){
    const wk=D.weekly_scores[s.roster_id]||[];
    const avg=wk.length?(wk.reduce(function(a,b){return a+b},0)/wk.length).toFixed(1):0;
    const mx=wk.length?Math.max.apply(null,wk):0,mn=wk.length?Math.min.apply(null,wk):0;
    const std=wk.length?Math.sqrt(wk.reduce(function(s,p){return s+Math.pow(p-avg,2)},0)/wk.length).toFixed(1):0;
    return Object.assign({},s,{wk:wk,avg:avg,mx:mx,mn:mn,std:std});
  }).sort(function(a,b){return b.fpts-a.fpts});
  let h='<div class="bh"><div class="bh-tag">Scoring</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">2025 Season \u2022 Heat Map \u2022 Sparklines</span></div></div>';
  // ═══ HEAT MAP ═══
  h+='<div class="hm-wrap">';
  h+='<div class="hm-grid" style="grid-template-columns:100px repeat(17,1fr);min-width:520px">';
  // Header row
  h+='<div class="hm-label"></div>';
  for(var w=1;w<=17;w++){h+='<div class="hm-wk">'+w+'</div>';}
  
  // Find global min/max for color scaling
  var allPts=[];
  sd.forEach(function(t){t.wk.forEach(function(p){allPts.push(p)})});
  var gMin=Math.min.apply(null,allPts),gMax=Math.max.apply(null,allPts);
  
  sd.forEach(function(t){
    h+='<div class="hm-label">'+t.team_name.substring(0,12)+'</div>';
    t.wk.forEach(function(pts){
      var pct=(pts-gMin)/(gMax-gMin);
      var r,g,b;
      if(pct<0.25){r=239;g=68;b=68;} // red
      else if(pct<0.5){r=245;g=158;b=11;} // yellow
      else if(pct<0.75){r=59;g=130;b=246;} // blue
      else{r=16;g=185;b=129;} // green
      var alpha=0.3+pct*0.6;
      h+='<div class="hm-cell" style="background:rgba('+r+','+g+','+b+','+alpha.toFixed(2)+')" title="'+t.team_name+' Wk: '+pts+'">'+Math.round(pts)+'</div>';
    });
  });
  h+='</div></div>';
  h+='<div style="display:flex;justify-content:center;gap:12px;margin:8px 0"><span style="font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--red-t)">\u25CF LOW</span><span style="font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--y)">\u25CF MID</span><span style="font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--blu)">\u25CF GOOD</span><span style="font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--a)">\u25CF ELITE</span></div>';
  // Sparkline cards
  h+='<div class="bh" style="margin-top:20px"><div class="bh-tag">Rankings</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Total Points \u2022 Weekly Sparklines</span></div></div>';
  sd.forEach(function(t,i){
    var mxP=Math.max.apply(null,t.wk.length?t.wk:[1]);
    var sparkH=t.wk.map(function(p){
      var ht=Math.max(4,(p/mxP)*36);
      var c=p>=160?'var(--a)':p>=130?'var(--blu)':p>=100?'var(--y)':'var(--red-t)';
      return'<div class="spark-b" style="height:'+ht+'px;background:'+c+'" title="'+p+'"></div>';
    }).join('');
    h+='<div class="sc-card"><div class="sc-hdr"><div><span class="sc-rank">#'+(i+1)+'</span> <span class="sc-name">'+t.team_name+'</span></div><span class="sc-pts">'+t.fpts+'</span></div><div class="spark">'+sparkH+'</div><div class="sc-meta"><span>Avg '+t.avg+'/wk</span><span>High '+t.mx+' \u00b7 Low '+t.mn+'</span><span>\u03C3 '+t.std+'</span></div></div>';
  });
  // ═══ DRAFT HIT RATE ═══
  ['2025','2024'].forEach(function(yr){
    var hits=D.draft_hits&&D.draft_hits[yr];
    if(!hits||!hits.length)return;
    var starters=hits.filter(function(h){return h.status==='starter'}).length;
    var rostered=hits.filter(function(h){return h.status!=='cut'}).length;
    var cut=hits.filter(function(h){return h.status==='cut'}).length;
    
    h+='<div class="bh" style="margin-top:20px"><div class="bh-tag">'+yr+' Draft</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">'+starters+' Starters \u2022 '+(rostered-starters)+' Bench \u2022 '+cut+' Cut</span></div></div>';
    
    h+='<div class="hit-grid">';
    hits.filter(function(p){return p.rd<=3}).forEach(function(p){
      var cls=p.status;
      var slot=(p.pk-1)%12+1;
      h+='<div class="hit-card '+cls+'">'+pimg(p.pid,44)+'<div class="hit-nm">'+p.nm.split(' ').pop()+'</div><div class="hit-pk">'+p.rd+'.'+String(slot).padStart(2,'0')+'</div></div>';
    });
    h+='</div>';
  });
  // Scoring settings
  h+='<div class="bh" style="margin-top:20px"><div class="bh-tag">Settings</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">PPR + Bonus</span></div></div>';
  [['Pass TD','4'],['Pass Yd','0.04/yd'],['INT','-1'],['Rush TD','6'],['Rush Yd','0.1/yd'],['Reception','1 (PPR)'],['Rec TD','6'],['Rec Yd','0.1/yd'],['Fum Lost','-2'],['100 Rush/Rec','+1'],['200 Rush/Rec','+2'],['300/400 Pass','+1/+2']].forEach(function(s){
    h+='<div class="h-row"><span class="h-team" style="font-weight:500;font-family:var(--fb);font-size:12px">'+s[0]+'</span><span style="font-family:var(--fd);font-size:14px;font-weight:700;color:var(--y);font-variant-numeric:tabular-nums">'+s[1]+'</span></div>';
  });
  document.getElementById('tab-scoring').innerHTML=h;
}
// ═══ CONTRACTS ═══
function renderContracts(){
  if(!D.contracts){document.getElementById('tab-contracts').innerHTML='<div style="padding:20px;color:var(--t4)">No contract data</div>';return;}
  
  let h='<div class="bh"><div class="bh-tag">Contracts</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Dynasty Contract Board</span></div></div>';
  
  // League-wide stats
  let totalPlayers=0,totalYears=0,expiringCount=0,exemptCount=0;
  const yearCounts={};
  
  Object.keys(D.contracts).forEach(owner=>{
    D.contracts[owner].forEach(c=>{
      totalPlayers++;
      totalYears+=c.years_2025;
      if(c.years_2025===1)expiringCount++;
      if(c.exemption_year)exemptCount++;
      yearCounts[c.years_2025]=(yearCounts[c.years_2025]||0)+1;
    });
  });
  
  const mostYearsTeam=Object.keys(D.contracts).reduce((a,b)=>{
    const aYrs=D.contracts[a].reduce((s,c)=>s+c.years_2025,0);
    const bYrs=D.contracts[b].reduce((s,c)=>s+c.years_2025,0);
    return bYrs>aYrs?b:a;
  });
  const mostYearsTotal=D.contracts[mostYearsTeam].reduce((s,c)=>s+c.years_2025,0);
  
  h+='<div class="ct-stats-grid"><div class="ct-stat-box"><span class="ct-stat-box-val">'+totalPlayers+'</span><span class="ct-stat-box-lbl">Contracted Players</span></div><div class="ct-stat-box"><span class="ct-stat-box-val">'+totalYears+'</span><span class="ct-stat-box-lbl">Total Years</span></div><div class="ct-stat-box"><span class="ct-stat-box-val">'+expiringCount+'</span><span class="ct-stat-box-lbl">Expiring 2026</span></div><div class="ct-stat-box"><span class="ct-stat-box-val">'+exemptCount+'</span><span class="ct-stat-box-lbl">Exemptions Used</span></div></div>';
  
  // Contract board
  h+='<div class="bh" style="margin-top:20px"><div class="bh-tag">Board</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Team Rosters</span></div></div>';
  h+='<div class="ct-board">';
  
  D.teams.forEach(team=>{
    const contracts=D.contracts[team.display_name]||[];
    const years=contracts.reduce((s,c)=>s+c.years_2025,0);
    const expiring=contracts.filter(c=>c.years_2025===1).length;
    const exempts=contracts.filter(c=>c.exemption_year).length;
    
    h+='<div class="ct-team"><div class="ct-team-hdr" onclick="this.nextElementSibling.classList.toggle(&quot;open&quot;)">'+av(team.roster_id,40)+'<div class="ct-team-hdr-info"><div class="ct-team-name">'+team.team_name+'</div><div class="ct-team-stats"><span>'+years+' yrs</span><span>'+contracts.length+' players</span><span>'+expiring+' expiring</span></div></div></div>';
    h+='<div class="ct-team-body">';
    
    const byPos={QB:[],RB:[],WR:[],TE:[],DEF:[]};
    contracts.forEach(c=>{
      const pos=c.pos||'DEF';
      if(byPos[pos])byPos[pos].push(c);
    });
    
    ['QB','RB','WR','TE'].forEach(pos=>{
      if(byPos[pos].length){
        byPos[pos].forEach(c=>{
          const pidMatch=D.teams.find(t=>t.team_name===team.team_name)?.players.find(p=>p.name===c.name);
          const pid=pidMatch?.id||'';
          const fillPct=Math.round((c.years_2025/7)*100);
          const barClass=c.years_2025>=4?'':c.years_2025===1?'danger':'warn';
          const posClass=pos.toLowerCase();
          
          h+='<div class="ct-player"><div class="ct-player-img">'+pimg(pid,32)+'</div><div style="flex:1"><div class="ct-player-name">'+c.name+'<span class="ct-player-pos '+posClass+'">'+pos+'</span>';
          if(c.exemption_year)h+='<span class="ct-tag exempt">TAG</span>';
          if(c.cuttable)h+='<span class="ct-tag cut">✂</span>';
          h+='</div><div style="display:flex;align-items:center;gap:8px;margin-top:4px"><div class="ct-bar-wrap"><div class="ct-bar-fill '+barClass+'" style="width:'+fillPct+'%"></div></div><span class="ct-bar-label">'+c.years_2025+'y</span><span style="font-size:10px;color:var(--t4)">'+c.nfl_team+'</span></div></div></div>';
        });
      }
    });
    
    h+='</div></div>';
  });
  
  h+='</div>';
  
  // Free agent forecast
  h+='<div class="bh" style="margin-top:24px"><div class="bh-tag">Forecast</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Upcoming Free Agents</span></div></div>';
  
  const faByYear={};
  Object.keys(D.contracts).forEach(owner=>{
    D.contracts[owner].forEach(c=>{
      const yr=c.expires;
      if(!faByYear[yr])faByYear[yr]={players:[],count:0};
      faByYear[yr].players.push({...c,owner});
      faByYear[yr].count++;
    });
  });
  
  h+='<div class="fa-forecast">';
  [2026,2027,2028].forEach(yr=>{
    if(!faByYear[yr])return;
    const byPos={QB:[],RB:[],WR:[],TE:[]};
    faByYear[yr].players.forEach(p=>{
      const pos=p.pos||'';
      if(byPos[pos])byPos[pos].push(p);
      else if(!byPos[pos])byPos[pos]=[p];
    });
    
    h+='<div class="fa-class"><div class="fa-class-title">'+yr+' Free Agents<span class="fa-class-count">'+faByYear[yr].count+'</span></div>';
    
    Object.keys(byPos).forEach(pos=>{
      if(byPos[pos].length){
        h+='<div class="fa-group"><div class="fa-group-title">'+pos+'</div>';
        byPos[pos].forEach(p=>{
          const pidMatch=Object.values(D.contracts).flat().findIndex(x=>x.name===p.name);
          h+='<div class="fa-player"><span class="fa-player-name">'+p.name+'</span><span class="fa-player-team">'+p.nfl_team+'</span></div>';
        });
        h+='</div>';
      }
    });
    
    h+='</div>';
  });
  h+='</div>';
  
  // Contract efficiency summary
  h+='<div class="bh" style="margin-top:24px"><div class="bh-tag">Cap Health</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Per-Team Summary</span></div></div>';
  h+='<div class="ct-summary">';
  
  D.teams.forEach(team=>{
    const contracts=D.contracts[team.display_name]||[];
    const years=contracts.reduce((s,c)=>s+c.years_2025,0);
    const expiring=contracts.filter(c=>c.years_2025===1).length;
    const avg=(years/contracts.length).toFixed(1);
    const exempts=contracts.filter(c=>c.exemption_year).length;
    
    let grade;
    const balance=Math.abs(contracts.length/2-expiring);
    if(balance>3&&years>30)grade='a';
    else if(balance>2||years>25)grade='b';
    else if(years>15)grade='c';
    else if(years>10||expiring>5)grade='d';
    else grade='f';
    
    h+='<div class="ct-card">'+av(team.roster_id,32)+' <div class="ct-card-title">'+team.team_name+'</div><div class="ct-card-stat"><span>Total Years</span><span class="ct-card-stat-val">'+years+'</span></div><div class="ct-card-stat"><span>Avg/Player</span><span class="ct-card-stat-val">'+avg+'y</span></div><div class="ct-card-stat"><span>Expiring</span><span class="ct-card-stat-val">'+expiring+'</span></div><div class="ct-card-stat"><span>Tagged</span><span class="ct-card-stat-val">'+exempts+'</span></div><div class="ct-grade '+grade+'">'+grade.toUpperCase()+'</div></div>';
  });
  
  h+='</div>';
  
  document.getElementById('tab-contracts').innerHTML=h;
}

        + '<div class="install-banner-text">'
        + '<div class="install-banner-title">Add Harambe\'s Dozen to Home Screen</div>'
        + '<div class="install-banner-sub">Tap &#8942; menu then <b>\u201cAdd to Home Screen\u201d</b></div>'
        + '</div>'
        + '<button class="install-banner-close" id="pwa-close-btn">&times;</button>';
    }

    document.body.appendChild(banner);
    document.getElementById('pwa-close-btn').onclick = () => {
      banner.remove();
      sessionStorage.setItem('install-dismissed', '1');
    };
    if (type === 'chrome') {
      document.getElementById('pwa-install-btn').onclick = async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const result = await deferredPrompt.userChoice;
        if (result.outcome === 'accepted') banner.remove();
        deferredPrompt = null;
      };
    }
  }
})();
</script>
</body>
</html>
