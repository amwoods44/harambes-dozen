<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700;800&display=swap');
.loading-screen{position:fixed;inset:0;z-index:9999;background:var(--g1);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s,visibility .6s}
.loading-screen.fade-out{opacity:0;visibility:hidden;pointer-events:none}
.loading-gorilla{font-size:72px;margin-bottom:12px;animation:loadPulse 1.8s ease-in-out infinite}
.loading-title{font-family:'Oswald',sans-serif;font-size:clamp(28px,5vw,48px);font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:-1px;line-height:1}
.loading-title .ld-acc{color:#ffcc00}
.loading-sub{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:#666;margin-top:12px}
.loading-spinner{width:36px;height:36px;border:3px solid #262626;border-top-color:#cc0000;border-radius:50%;animation:spin .8s linear infinite;margin-top:28px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes loadPulse{0%,100%{opacity:.6;transform:scale(.97)}50%{opacity:1;transform:scale(1)}}
.data-status{position:fixed;top:60px;right:16px;z-index:950;display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:4px;font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:opacity .3s;opacity:.7}
.data-status:hover{opacity:1}
.data-status.ok{color:var(--grn);background:var(--grn-bg)}
.data-status.fade-away{opacity:0;transform:translateY(-4px);pointer-events:none;transition:opacity .6s ease-out,transform .6s ease-out}
.data-status.fade-away:hover{opacity:.7;pointer-events:auto;transform:translateY(0);transition:opacity .2s ease-in,transform .2s ease-in}
:root{
  /* === PALETTE === */
  --a:#cc0000;--ad:#990000;--ab:#e60000;--y:#ffcc00;--yd:#d4a017;
  --g1:#120e0c;--g2:#1a1410;--g3:#231a16;--g4:#2e2420;--g5:#3d3028;--g6:#504038;
  --t1:#fff;--t2:#d4cfc8;--t3:#9a9188;--t4:#6b6158;
  --grn:#17b169;--grn-bg:rgba(23,177,105,.12);--red-t:#ff4444;--red-bg:rgba(255,68,68,.12);
  --blu:#3b82f6;--pur:#8b5cf6;
  --fd:'Oswald',sans-serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
  /* === TYPE SCALE (1.25 ratio off 14px) === */
  --text-2xs:10px;--text-xs:11px;--text-sm:12px;--text-base:14px;--text-md:16px;
  --text-lg:20px;--text-xl:26px;--text-2xl:34px;--text-3xl:44px;--text-4xl:56px;
  /* === SPACING (4px base) === */
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;--sp-7:32px;--sp-8:40px;--sp-9:48px;--sp-10:64px;
  /* === BORDER RADIUS === */
  --radius-sm:4px;--radius-md:8px;--radius-lg:12px;--radius-xl:16px;--radius-full:50%;
  /* === ELEVATION === */
  --shadow-sm:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shadow-md:0 4px 16px rgba(0,0,0,.4),0 2px 4px rgba(0,0,0,.2);
  --shadow-lg:0 8px 30px rgba(0,0,0,.5),0 4px 8px rgba(0,0,0,.3);
  --shadow-glow-gold:0 0 20px rgba(255,204,0,.15);
  --shadow-glow-red:0 0 20px rgba(204,0,0,.15);
  /* === SURFACES === */
  --surface-1:var(--g2);
  --surface-2:linear-gradient(180deg,var(--g3),var(--g2));
  --surface-3:linear-gradient(180deg,var(--g4),var(--g3));
  /* === TRANSITIONS === */
  --ease-out:cubic-bezier(.16,1,.3,1);
  --transition-fast:150ms var(--ease-out);
  --transition-base:250ms var(--ease-out);
  /* === TEAM COLORS === */
  --team-CP:#FFCB05;--team-AW:#BF5700;--team-PB:#C5050C;--team-SL:#003594;
  --team-MA:#512888;--team-TM:#0076B6;--team-HF:#003594;--team-EC:#A5ACAF;
  --team-AM:#203731;--team-DN:#311D00;--team-CH:#7A0019;--team-TP:#241773;
}
*{margin:0;padding:0;box-sizing:border-box;transition:background var(--transition-fast),border-color var(--transition-fast),box-shadow var(--transition-fast),opacity var(--transition-fast)}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{font-family:var(--fb);background:var(--g1);color:var(--t1);min-height:100vh;overflow-x:hidden;padding-bottom:48px;line-height:1.4}
h1,h2,h3,h4{margin:0;font-size:inherit;font-weight:inherit;line-height:inherit}
.skip-nav{position:absolute;top:-40px;left:0;background:var(--a);color:#fff;padding:8px 16px;font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:1px;z-index:9999;border-radius:0 0 6px 0;text-decoration:none;transition:top .2s}
.skip-nav:focus{top:0}
button{min-height:36px}
/* ═══ HEADER ═══ */
.hdr{background:linear-gradient(180deg,#1e1510,#14100c);border-bottom:3px solid var(--a);position:sticky;top:0;z-index:1000;box-shadow:0 2px 20px rgba(0,0,0,.5)}
.hdr-in{max-width:1440px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-gorilla{font-size:28px;filter:drop-shadow(0 0 8px rgba(204,0,0,.3))}
.hdr-div{width:2px;height:28px;background:var(--g5);margin:0 8px;transform:skewX(-12deg);display:inline-block;vertical-align:middle}
.hdr-sub{font-family:var(--fd);font-weight:600;font-size:15px;letter-spacing:4px;text-transform:uppercase;color:var(--t3);vertical-align:middle}
.hdr-right{display:flex;align-items:center;gap:14px}
.live-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:4px;background:rgba(204,0,0,.1);border:1px solid rgba(204,0,0,.25)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--a);box-shadow:0 0 10px rgba(204,0,0,.5);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-txt{font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:3px;color:var(--a)}
.nfl-cd{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:6px;background:rgba(0,53,148,.1);border:1px solid rgba(0,53,148,.25);white-space:nowrap}
.nfl-cd-units{display:flex;gap:5px;align-items:center}
.nfl-cd-box{text-align:center}
.nfl-cd-num{font-family:var(--fd);font-size:18px;font-weight:800;color:#6ba3e8;line-height:1;background:rgba(0,53,148,.2);border:1px solid rgba(0,53,148,.35);border-radius:4px;padding:4px 7px;min-width:30px;display:inline-block}
.nfl-cd-lbl{font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(107,163,232,.7);margin-top:2px}
.nfl-cd-sep{font-family:var(--fd);font-size:14px;font-weight:700;color:rgba(107,163,232,.3);margin:0 -2px;align-self:flex-start;padding-top:4px}
.nfl-cd-tag{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t4);margin-left:2px;line-height:1.2;text-align:center}
.nfl-cd-tag span{display:block;color:#6ba3e8;font-size:12px;letter-spacing:1px}
/* ═══ HERO ═══ */
.hero{position:relative;overflow:hidden;background:linear-gradient(180deg,#1a0a0a,#0f0f0f 40%,var(--g1));padding:40px 28px 36px;text-align:center}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 600px 250px at 50% 20%,rgba(204,0,0,.06),transparent);pointer-events:none}
.hero::after{content:'';position:absolute;top:-50%;left:-10%;width:120%;height:200%;background:repeating-linear-gradient(-45deg,transparent,transparent 80px,rgba(204,0,0,.015) 80px,rgba(204,0,0,.015) 81px);pointer-events:none}
.hero-c{position:relative;z-index:1}
.hero-ey{font-family:var(--fd);font-size:15px;font-weight:600;letter-spacing:6px;text-transform:uppercase;color:var(--a);margin-bottom:8px}
.hero-h{font-family:var(--fd);font-size:clamp(52px,8vw,88px);font-weight:800;letter-spacing:-1px;line-height:.9;color:white;text-transform:uppercase}
.hero-h .acc{color:var(--y)}
.hero-tag{font-family:var(--fd);font-size:19px;font-weight:400;letter-spacing:4px;text-transform:uppercase;color:var(--t3);margin-top:14px}
.hero-tag b{color:var(--t2);font-weight:600}
.hero-bar{height:4px;background:linear-gradient(90deg,transparent 5%,var(--a) 20%,var(--a) 80%,transparent 95%);margin-top:28px}
/* ═══ CAST STRIP ═══ */
.cast{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--g1),rgba(12,10,8,.95));padding:8px 0;max-width:1440px;margin:0 auto}
.cast::before,.cast::after{content:'';position:absolute;top:0;bottom:0;width:60px;z-index:2;pointer-events:none}
.cast::before{left:0;background:linear-gradient(90deg,var(--g1),transparent)}
.cast::after{right:0;background:linear-gradient(270deg,var(--g1),transparent)}
.cast-in{display:flex;align-items:center;justify-content:center;gap:0;padding:0 30px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cast-in::-webkit-scrollbar{display:none}
.cast-fig{flex-shrink:0;position:relative;width:96px;height:96px;border-radius:50%;overflow:hidden;border:2px solid var(--g5);background:var(--g3);transition:all .3s cubic-bezier(.22,1,.36,1);cursor:pointer;margin:0 -8px;display:flex;align-items:center;justify-content:center}
.cast-fig:hover{transform:scale(1.2);z-index:10;border-color:var(--a);box-shadow:0 0 28px rgba(204,0,0,.45)}
.cast-fig img{width:100%;height:100%;object-fit:cover;object-position:center top;filter:saturate(.9)}
.cast-fig:hover img{filter:saturate(1.1)}
.cast-fig .cast-init{font-family:var(--fd);font-size:28px;font-weight:800;color:var(--t3)}
.cast-fig::after{content:attr(data-label);position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.cast-fig:hover::after{opacity:1}
.cast-line{height:1px;background:linear-gradient(90deg,transparent 10%,var(--g5) 30%,var(--g5) 70%,transparent 90%);margin-top:6px}
.tl-img{width:20px;height:20px;object-fit:contain;flex-shrink:0;vertical-align:middle;opacity:.9}
.pl-nfl-cell{display:inline-flex;align-items:center;gap:4px;min-width:38px}
.hero-hist{padding:16px 20px 0;text-align:center;min-height:32px}
.hero-hist-inner{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid var(--g5)}
.hero-hist-lbl{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--a);flex-shrink:0}
.hero-hist-txt{font-family:var(--fb);font-size:13px;color:var(--t2);transition:opacity .4s}
.hero-hist-txt.fade{opacity:0}
/* ═══ STAT STRIP ═══ */
.sstrip{display:flex;background:var(--g2);border-top:1px solid var(--g5);border-bottom:1px solid var(--g5);max-width:100%;margin:0;padding:0}
.ss{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 10px;border-right:1px solid var(--g5);gap:3px;min-width:0;position:relative;overflow:hidden}
.ss:last-child{border-right:none}
.ss-l{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t4)}
.ss-v{font-family:var(--fd);font-size:clamp(18px,2.2vw,28px);font-weight:800;line-height:1;letter-spacing:-.5px;color:var(--t1);font-variant-numeric:tabular-nums}
.ss.champ{background:rgba(245,158,11,.04)}
.ss.champ::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#F59E0B,transparent)}
.ss.champ .ss-l{color:rgba(251,191,36,.6)}
.ss.champ .ss-v{color:#F59E0B;font-size:clamp(13px,1.6vw,18px);letter-spacing:0}
.ss.feat .ss-v{color:var(--a)}
@keyframes champReveal{0%{opacity:.5;filter:brightness(1.5) saturate(1.5)}100%{opacity:1;filter:brightness(1) saturate(1)}}
.ss-sub{font-family:var(--fd);font-size:13px;font-weight:400;letter-spacing:1px;color:var(--t4);margin-top:8px}
/* ═══ BROADCAST HEADERS ═══ */
.bh{display:flex;align-items:stretch;margin:var(--sp-7) 0 var(--sp-4)}
.bh-tag{font-family:var(--fd);background:var(--a);color:white;padding:var(--sp-2) var(--sp-5);font-size:var(--text-md);font-weight:800;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 100%,0 100%)}
.bh-acc{width:60px;background:linear-gradient(90deg,var(--ad),var(--g3));clip-path:polygon(0 0,calc(100% - 10px) 0,100% 100%,0 100%)}
.bh-line{flex:1;display:flex;align-items:center;border-bottom:1px solid var(--g4);margin-left:-1px}
.bh-sub{font-family:var(--fd);font-size:var(--text-xs);font-weight:400;letter-spacing:1px;text-transform:uppercase;color:var(--t4);padding-left:var(--sp-4)}
/* ═══ NAV BAR — WINS POOL STYLE ═══ */
.nav-bar{background:rgba(26,20,16,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--g3);position:sticky;top:59px;z-index:900}
.nav-bar::after{content:'';position:absolute;top:0;right:0;bottom:0;width:32px;background:linear-gradient(270deg,rgba(26,20,16,.95),transparent);pointer-events:none;z-index:1}
.nav-in{max-width:1440px;margin:0 auto;padding:0 12px;display:flex;gap:0;flex-wrap:nowrap;min-width:max-content;overflow-x:auto;scrollbar-width:none}
.nav-in::-webkit-scrollbar{display:none}
.nav-btn{font-family:var(--fd);padding:14px 28px;font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t3);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;position:relative}
.nav-btn:hover{color:var(--t1);background:rgba(255,255,255,.02)}
.nav-btn.active{color:white;border-bottom-color:var(--a)}
.nav-btn.active::after{display:none}
.nav-btn:focus-visible{outline:2px solid var(--y);outline-offset:-2px;border-radius:2px}
/* ═══ PANELS ═══ */
.main{max-width:1440px;margin:0 auto;padding:0 28px}
.panel{padding-bottom:32px}
@keyframes wipeIn{from{clip-path:inset(0 100% 0 0);opacity:.8}to{clip-path:inset(0);opacity:1}}
/* ═══ POWER RANKING CARDS ═══ */
.plist{display:flex;flex-direction:column;gap:var(--sp-3)}
.pcard{display:grid;grid-template-columns:auto 5px 1fr auto auto;align-items:center;background:var(--g2);border:1px solid var(--g4);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;box-shadow:var(--shadow-md)}
.pcard:hover{border-color:var(--g5);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.pcard:active{transform:translateY(0);box-shadow:var(--shadow-sm)}
.pcard.r1{border-color:rgba(204,0,0,.45);background:linear-gradient(135deg,var(--g2) 55%,rgba(204,0,0,.07))}
.pcard.r1 .prk{background:linear-gradient(135deg,rgba(255,204,0,.15),rgba(255,204,0,.05));border:1px solid rgba(255,204,0,.2)}
.pcard.r1 .prk-n{color:var(--y)}
.pcard.r2{border-color:rgba(212,160,23,.35);background:linear-gradient(135deg,var(--g2) 55%,rgba(212,160,23,.05))}
.pcard.r2 .prk{background:linear-gradient(135deg,rgba(255,204,0,.12),rgba(255,204,0,.04));border:1px solid rgba(255,204,0,.15)}
.pcard.r2 .prk-n{color:var(--y)}
.pcard.r3{border-color:rgba(59,130,246,.3);background:linear-gradient(135deg,var(--g2) 55%,rgba(59,130,246,.05))}
.pcard.r3 .prk{background:var(--g3);border:1px solid var(--g4)}
.pcard.r3 .prk-n{color:var(--t2)}
.prk{width:52px;height:52px;border-radius:var(--radius-md);display:grid;place-items:center;margin:var(--sp-3);background:var(--g3);border:1px solid var(--g4)}
.prk.rank-low{background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.15)}
.prk.rank-low .prk-n{color:var(--red-t)}
.prk-n{font-family:var(--fd);font-size:var(--text-xl);font-weight:800;text-align:center;font-variant-numeric:tabular-nums}
.pcbar{width:5px;align-self:stretch}
.pinfo{padding:var(--sp-4) var(--sp-5);display:flex;align-items:center;gap:var(--sp-4);min-width:0}
.p-avatar{width:56px;height:56px;border-radius:var(--radius-full);object-fit:cover;border:2px solid var(--g5);background:var(--g3);flex-shrink:0}
.p-avatar-init{width:56px;height:56px;border-radius:var(--radius-full);border:2px solid var(--g5);background:var(--g3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:22px;font-weight:800;color:var(--t4)}
.pname{font-family:var(--fd);font-size:var(--text-lg);font-weight:800;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.psub{font-family:var(--fd);font-size:var(--text-xs);font-weight:400;color:var(--t4);margin-top:var(--sp-1);letter-spacing:1px}
.pnums{display:flex;align-items:center;gap:var(--sp-6);padding:var(--sp-4) var(--sp-6);flex-shrink:0}
.pnb{text-align:center;min-width:40px}
.pnv{font-family:var(--fd);font-weight:800;line-height:1;letter-spacing:-.3px;font-variant-numeric:tabular-nums}
.pnv.w{font-size:var(--text-2xl);min-width:52px;display:inline-block;text-align:center;letter-spacing:-1px}
.pnv.p{font-size:var(--text-lg);color:var(--y)}
.pnv.s{font-size:var(--text-md)}
.pnl{font-family:var(--fd);font-size:var(--text-2xs);font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t4);margin-top:5px}
.parr{width:32px;height:32px;border-radius:var(--radius-sm);display:grid;place-items:center;background:var(--g3);border:1px solid var(--g4);color:var(--t3);font-size:var(--text-sm);margin-right:var(--sp-3)}
.pcard:hover .parr{background:var(--g4);color:var(--t1)}
.pcard.open .parr{transform:rotate(180deg)}
.pdet{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.22,1,.36,1);grid-column:1/-1}
.pcard.open .pdet{max-height:600px}
.pdet-in{padding:0 var(--sp-4) var(--sp-4);margin-left:52px}
@media(max-width:768px){.pdet-in{margin-left:0;padding:0 var(--sp-2) var(--sp-3)}}
/* ═══ PLAYER ROWS ═══ */
.pl-row{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) var(--sp-4);border-radius:var(--radius-sm);border-bottom:1px solid var(--g3);cursor:pointer}
.pl-row:nth-child(even){background:rgba(255,255,255,.02)}
.pl-row:hover{background:rgba(255,255,255,.02)}
.pl-pos{font-family:var(--fd);font-size:var(--text-xs);font-weight:700;letter-spacing:.5px;min-width:28px;height:22px;text-align:center;padding:2px 4px;border-radius:var(--radius-sm);display:grid;place-items:center}
.pos-QB{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.25)}
.pos-RB{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.25)}
.pos-WR{background:rgba(59,130,246,.15);color:#3b82f6;border:1px solid rgba(59,130,246,.25)}
.pos-TE{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.25)}
.pos-DEF{background:rgba(139,92,246,.15);color:#8b5cf6;border:1px solid rgba(139,92,246,.25)}
.pl-name{font-family:var(--fb);font-size:var(--text-base);font-weight:600;color:var(--t1);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-nfl{font-family:var(--fb);font-size:var(--text-xs);font-weight:600;color:var(--t3);min-width:26px}
.pl-age{font-family:var(--fd);font-size:var(--text-sm);font-weight:700;min-width:22px;text-align:right;font-variant-numeric:tabular-nums}
.age-y{color:var(--grn)}.age-p{color:var(--y)}.age-v{color:var(--red-t)}
.pl-starter{background:rgba(23,177,105,.06);border-left:3px solid rgba(23,177,105,.6)}
/* ═══ TIER LABELS ═══ */
.tier{display:flex;align-items:center;gap:var(--sp-3);font-family:var(--fd);font-size:var(--text-2xs);font-weight:700;letter-spacing:4px;text-transform:uppercase;margin:var(--sp-7) 0 var(--sp-4);white-space:nowrap;padding:var(--sp-2) var(--sp-5)}
.tier::after{content:'';flex:1;height:1px}
.tier-1{color:var(--y);border-left:3px solid var(--y)}
.tier-1::after{background:linear-gradient(90deg,rgba(255,204,0,.3),transparent)}
.tier-2{color:var(--t2);border-left:3px solid var(--t3)}
.tier-2::after{background:linear-gradient(90deg,rgba(154,145,136,.3),transparent)}
.tier-3{color:var(--y);border-left:3px solid var(--y)}
.tier-3::after{background:linear-gradient(90deg,rgba(255,204,0,.2),transparent)}
.tier-4{color:var(--red-t);border-left:3px solid var(--red-t)}
.tier-4::after{background:linear-gradient(90deg,rgba(239,68,68,.3),transparent)}
/* ═══ NARRATIVE ═══ */
.narrative{background:var(--g2);border:1px solid var(--g5);border-radius:8px;padding:20px;margin-top:16px;position:relative;overflow:hidden}
.narrative::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--a)}
.nar-item{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.nar-item:last-child{margin-bottom:0}
.nar-icon{flex-shrink:0;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--g4);border:1px solid var(--g5)}
.nar-text{font-family:var(--fd);font-size:17px;font-weight:500;color:var(--t2);line-height:1.5;letter-spacing:.3px}
.nar-text b{color:var(--y);font-weight:700}
.nar-text .red{color:var(--red-t)}
/* ═══ RECORDS GRID ═══ */
.rec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--g5);border-radius:8px;overflow:hidden;margin-top:16px}
.rec{padding:18px 12px;text-align:center;background:var(--g2);position:relative}
.rec::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 20px,rgba(255,255,255,.006) 20px,rgba(255,255,255,.006) 21px);pointer-events:none}
.rec-emoji{font-size:24px;margin-bottom:4px}
.rec-lbl{font-family:var(--fd);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4)}
.rec-val{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--y);font-variant-numeric:tabular-nums;margin-top:2px}
.rec-sub{font-family:var(--fb);font-size:10px;color:var(--t4);margin-top:2px}
/* ═══ AGE MAP BARS ═══ */
.age-row{display:flex;align-items:center;gap:10px;margin:8px 0}
.age-name{font-family:var(--fd);font-size:12px;font-weight:700;color:var(--t2);min-width:148px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.age-track{flex:1;height:24px;background:var(--g4);border-radius:4px;overflow:hidden;display:flex}
.age-seg{height:100%;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.age-y{background:var(--grn)}.age-p{background:var(--y)}.age-v{background:var(--red-t)}
.age-avg{font-family:var(--fd);font-size:14px;font-weight:800;min-width:36px;text-align:right;font-variant-numeric:tabular-nums}
.window-tag{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:4px}
/* ═══ MATCHUP CARDS ═══ */
.mu-card{background:var(--g2);border:1px solid var(--g4);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:var(--sp-4);box-shadow:var(--shadow-md)}
.mu-card:hover{box-shadow:var(--shadow-lg);border-color:var(--g5);transform:translateY(-1px)}
.mu-accent{height:3px;width:100%}
.mu-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:var(--sp-5) var(--sp-6);min-height:120px}
.mu-team{min-width:0}
.mu-team.left{text-align:left}
.mu-team.right{text-align:right}
.mu-team-inner{display:flex;align-items:center;gap:var(--sp-3)}
.mu-team.right .mu-team-inner{flex-direction:row-reverse}
.mu-tn{font-family:var(--fd);font-size:var(--text-base);font-weight:700;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:1px;text-transform:uppercase}
.mu-sc{font-family:var(--fd);font-weight:900;font-variant-numeric:tabular-nums;line-height:1;margin-top:var(--sp-1)}
.mu-sc.win{font-size:var(--text-2xl);color:var(--t1)}
.mu-sc.lose{font-size:var(--text-xl);color:var(--t3);opacity:.7}
.mu-win-wash{border-radius:var(--radius-md);padding:var(--sp-2)}
.mu-divider{width:1px;height:60px;background:linear-gradient(180deg,transparent,var(--g5),transparent);margin:0 var(--sp-3)}
.mu-w-badge{width:20px;height:20px;border-radius:var(--radius-full);background:var(--grn);display:grid;place-items:center;font:700 var(--text-2xs)/1 var(--fd);color:#fff;flex-shrink:0}
.mu-footer{padding:var(--sp-2) var(--sp-5);border-top:1px solid var(--g4);display:flex;justify-content:space-between;align-items:center}
.mu-margin{font:400 var(--text-xs)/1 var(--fb);color:var(--t4)}
.mu-diff{font-family:var(--fm);font-size:10px;color:var(--t4);text-align:center;padding:6px;background:var(--g3)}
/* ═══ WEEK SELECTOR ═══ */
.wk-sel{display:flex;gap:var(--sp-1);overflow-x:auto;padding:var(--sp-2) 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.wk-sel::-webkit-scrollbar{display:none}
.wk-btn{flex-shrink:0;padding:var(--sp-2) var(--sp-3);background:var(--g3);border:1px solid var(--g4);border-radius:var(--radius-md);font-family:var(--fd);font-size:var(--text-sm);font-weight:700;color:var(--t3);cursor:pointer;letter-spacing:.5px;min-height:44px;min-width:44px;display:grid;place-items:center}
.wk-btn.active{background:var(--a);color:#fff;border-color:var(--a);box-shadow:var(--shadow-glow-red)}
.wk-btn:hover:not(.active){border-color:var(--a);color:var(--t1)}
/* ═══ SPARKLINES ═══ */
.spark{display:flex;align-items:flex-end;gap:2px;height:36px}
.spark-b{flex:1;border-radius:2px 2px 0 0;min-width:3px;transition:height .6s cubic-bezier(.22,1,.36,1)}
/* ═══ SCORING CARD ═══ */
.sc-card{background:var(--g2);border:1px solid var(--g5);border-radius:8px;padding:16px;margin-bottom:8px;position:relative;overflow:hidden}
.sc-card::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 20px,rgba(255,255,255,.005) 20px,rgba(255,255,255,.005) 21px);pointer-events:none}
.sc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sc-rank{font-family:var(--fd);font-size:18px;font-weight:800;color:var(--y);font-variant-numeric:tabular-nums}
.sc-name{font-family:var(--fd);font-size:15px;font-weight:700;letter-spacing:.5px}
.sc-pts{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--a);font-variant-numeric:tabular-nums}
.sc-meta{display:flex;justify-content:space-between;margin-top:6px}
.sc-meta span{font-family:var(--fm);font-size:10px;color:var(--t4);font-variant-numeric:tabular-nums}
/* ═══ PICK TRADES ═══ */
.pk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.pk-card{background:var(--g2);border:1px solid var(--g5);border-radius:8px;padding:14px;position:relative;overflow:hidden}
.pk-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--a)}
.pk-round{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--y);letter-spacing:2px;text-transform:uppercase}
.pk-flow{font-family:var(--fb);font-size:12px;color:var(--t2);margin-top:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pk-from{color:var(--red-t);font-weight:600}
.pk-to{color:var(--grn);font-weight:600}
.pk-arr{font-family:var(--fd);font-size:14px;color:var(--y)}
/* ═══ HISTORY TABLE ═══ */
.h-row{display:flex;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.03)}
.h-row:last-child{border:none}
.h-row:nth-child(even){background:rgba(255,255,255,.02)}
.h-row:hover{background:rgba(204,0,0,.04)}
.h-rk{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--y);min-width:26px;text-align:center;font-variant-numeric:tabular-nums}
.h-team{flex:1;font-family:var(--fd);font-size:13px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px}
.h-rec{font-family:var(--fm);font-size:12px;color:var(--t2);min-width:50px;text-align:right;font-variant-numeric:tabular-nums}
.h-pts{font-family:var(--fm);font-size:11px;color:var(--t4);min-width:60px;text-align:right;font-variant-numeric:tabular-nums}
/* ═══ BOTTOMLINE TICKER ═══ */
.bl{position:fixed;bottom:0;left:0;right:0;z-index:999;height:36px;background:linear-gradient(180deg,var(--g2),var(--g1));border-top:1px solid var(--g4);box-shadow:0 -2px 12px rgba(0,0,0,.3);overflow:hidden;display:flex;align-items:center}
.bl-tag{flex-shrink:0;background:var(--a);color:white;padding:0 14px;height:100%;display:flex;align-items:center;font-family:var(--fd);font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 100%,0 100%);padding-right:20px}
.bl-sw{flex:1;overflow:hidden;height:100%;display:flex;align-items:center;mask-image:linear-gradient(90deg,transparent,#000 20px,#000 calc(100% - 20px),transparent);-webkit-mask-image:linear-gradient(90deg,transparent,#000 20px,#000 calc(100% - 20px),transparent)}
.bl-s{display:flex;align-items:center;white-space:nowrap;animation:blScroll var(--td1,90s) linear infinite}
.bl-s:hover{animation-play-state:paused}
@keyframes blScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tki{display:inline-flex;align-items:center;gap:6px;padding:0 var(--sp-4);font-family:var(--fd);font-size:var(--text-xs);font-weight:600;color:var(--t2);letter-spacing:.5px}
.tki b{color:var(--y);font-weight:700;margin-right:4px}
.tki .hl{color:var(--a);font-weight:800;margin:0 2px}
.tks{color:var(--g5);margin:0 4px;font-size:10px}
/* ═══ BADGE HELPERS ═══ */
.dbadge{display:inline-block;font-family:var(--fd);font-size:11px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.5px}
.dbadge.up{background:var(--grn-bg);color:var(--grn)}
.dbadge.dn{background:var(--red-bg);color:var(--red-t)}
.dbadge.ev{background:rgba(255,255,255,.05);color:var(--t4)}
/* ═══ NAV DROPDOWN GROUPS ═══ */
.nav-group{position:relative;display:inline-flex;align-items:stretch}
.nav-group-btn{font-family:var(--fd);padding:14px 20px;font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t3);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.nav-group-btn:hover{color:var(--t1);background:rgba(255,255,255,.02)}
.nav-group-btn.active{color:var(--t1);border-bottom-color:var(--a)}
.nav-group-btn::after{content:'▾';font-size:10px;opacity:.6;transition:transform .2s}
.nav-group.open .nav-group-btn::after{transform:rotate(180deg)}
.nav-dropdown{position:fixed;top:0;left:0;background:var(--g2);border:1px solid var(--g5);border-top:2px solid var(--a);min-width:180px;z-index:9999;display:none;flex-direction:column;box-shadow:0 16px 40px rgba(0,0,0,.6)}
.nav-group.open .nav-dropdown{display:flex}
.nav-drop-item{font-family:var(--fd);padding:11px 20px;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);cursor:pointer;border:none;background:none;text-align:left;transition:all .15s;border-left:2px solid transparent}
.nav-drop-item:hover{color:var(--t1);background:rgba(255,255,255,.04);border-left-color:var(--g6)}
.nav-drop-item.active{color:var(--a);border-left-color:var(--a);background:rgba(204,0,0,.05)}
/* ═══ THE RAFTERS ═══ */
/* ═══ RAFTERS — Iron Mount Cloth Banners ═══ */
.rafters-scene{background:linear-gradient(180deg,#060608,#0c0c12 40%,#0f0f16);border-radius:16px;padding:40px 24px 48px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.04)}
.rafters-scene::before{content:'';position:absolute;top:0;left:0;right:0;height:12px;background:linear-gradient(180deg,rgba(255,255,255,.03),transparent)}
.rafters-beam{width:100%;height:12px;background:linear-gradient(180deg,#4a4a4a,#2a2a2a,#3a3a3a);border-radius:3px;box-shadow:0 8px 28px rgba(0,0,0,.9),0 1px 0 rgba(255,255,255,.06),inset 0 1px 0 rgba(255,255,255,.08)}
.rafters-row{display:flex;gap:24px;padding:0;justify-content:center;flex-wrap:wrap;align-items:flex-start}
.rafter-banner{display:flex;flex-direction:column;align-items:center;transition:transform .3s}
.rafter-banner:hover{transform:translateY(-3px)}
.banner-mount{width:136px;height:8px;background:linear-gradient(180deg,#4a4a4a,#2a2a2a,#3a3a3a);border-radius:2px;box-shadow:0 4px 14px rgba(0,0,0,.8),0 1px 0 rgba(255,255,255,.06);position:relative;z-index:1;margin-top:6px}
.banner-rivet{position:absolute;top:-2px;width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#777,#333);border:1px solid #555;box-shadow:0 2px 6px rgba(0,0,0,.6)}
.banner-rivet-l{left:6px}
.banner-rivet-r{right:6px}
.banner-cloth{width:124px;overflow:hidden;box-shadow:0 16px 45px rgba(0,0,0,.7);margin-top:-1px;height:210px;display:flex;flex-direction:column}
.banner-top{padding:14px 10px 10px;text-align:center;position:relative;overflow:hidden}
.banner-fold-l{position:absolute;top:0;left:0;width:10px;height:100%;background:linear-gradient(90deg,rgba(0,0,0,.15),transparent);pointer-events:none}
.banner-fold-r{position:absolute;top:0;right:0;width:10px;height:100%;background:linear-gradient(-90deg,rgba(0,0,0,.15),transparent);pointer-events:none}
.banner-felt{position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 1px,rgba(0,0,0,.015) 1px,rgba(0,0,0,.015) 2px);pointer-events:none}
.banner-dynasty{font-family:var(--fd);font-size:8px;font-weight:700;letter-spacing:3px;text-transform:uppercase;position:relative}
.banner-year{font-family:var(--fd);font-size:42px;font-weight:800;line-height:1;position:relative}
.banner-champ{font-family:var(--fd);font-size:8px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-top:2px;position:relative}
.banner-seam{height:1px}
.banner-bottom{padding:10px 8px 14px;text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.banner-av{width:28px;height:28px;border-radius:50%;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:10px;font-weight:800;box-shadow:0 3px 8px rgba(0,0,0,.3)}
.banner-name{font-family:var(--fd);font-size:9px;font-weight:700;text-align:center;letter-spacing:.5px;text-transform:uppercase;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:108px}
.banner-sub{font-family:var(--fb);font-size:7px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:108px}
.banner-fringe{width:124px;height:10px;clip-path:polygon(0 0,7% 100%,14% 0,21% 100%,28% 0,35% 100%,42% 0,49% 100%,56% 0,63% 100%,70% 0,77% 100%,84% 0,91% 100%,98% 0,100% 0)}
.rafter-latest-glow{position:absolute;top:-16px;left:50%;transform:translateX(-50%);width:160px;height:340px;background:radial-gradient(ellipse at top,rgba(255,204,0,.05),transparent 50%);pointer-events:none}
/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .sstrip .ss:nth-child(n+4){display:none}
  .rec-grid{grid-template-columns:repeat(2,1fr)}
  .pcard{grid-template-columns:50px 4px 1fr auto}
  .prk-n{font-size:22px}
  .pnums{gap:10px;padding:12px 12px}
  .pnv.w{font-size:26px}
  .pk-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .hdr-in{padding:0 12px}
  .nfl-cd{display:none}
  .mu-sc{font-size:22px}
  .pname{font-size:14px}
  .main{padding:0 10px}
}
/* ═══ HEAT MAP ═══ */
.hm-grid{display:grid;gap:2px;margin:12px 0;overflow-x:auto}
.hm-cell{min-width:22px;height:28px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:10px;font-weight:700;color:rgba(255,255,255,.8);transition:transform .15s}
.hm-cell:hover{transform:scale(1.3);z-index:2;box-shadow:0 0 12px rgba(0,0,0,.5)}
.hm-label{font-family:var(--fd);font-size:10px;font-weight:700;color:var(--t3);min-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;height:28px;letter-spacing:.5px}
.hm-wk{font-family:var(--fd);font-size:10px;font-weight:700;color:var(--t4);text-align:center;letter-spacing:1px;height:20px;display:flex;align-items:center;justify-content:center}
/* ═══ LUCK CARDS ═══ */
.luck-bar{display:flex;align-items:center;gap:8px;margin:4px 0}
.luck-track{flex:1;height:10px;background:var(--g4);border-radius:5px;position:relative;overflow:visible}
.luck-fill{height:100%;border-radius:5px;transition:width 1.5s cubic-bezier(.22,1,.36,1)}
.luck-marker{position:absolute;top:-3px;width:3px;height:16px;background:var(--y);border-radius:2px;transition:left 1.5s cubic-bezier(.22,1,.36,1)}
.luck-val{font-family:var(--fd);font-size:14px;font-weight:800;min-width:42px;text-align:right;font-variant-numeric:tabular-nums}
/* ═══ FRANCHISE TABLE ═══ */
.fr-row{display:grid;grid-template-columns:32px 1fr 60px 60px 70px 50px;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s;font-variant-numeric:tabular-nums}
.fr-row:nth-child(even){background:rgba(255,255,255,.02)}
.fr-row:hover{background:rgba(204,0,0,.04)}
.fr-row.champ{background:rgba(245,158,11,.03)}
.fr-rk{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--y);text-align:center;font-variant-numeric:tabular-nums}
.fr-name{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--t1);letter-spacing:.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fr-stat{font-family:var(--fd);font-size:13px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums;color:var(--t2)}
.fr-pct{color:var(--a)}
.fr-trophies{font-size:14px;text-align:center}
/* ═══ DRAFT HIT/BUST ═══ */
.hit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px;margin:12px 0}
.hit-card{text-align:center;padding:8px 4px;border-radius:8px;border:1px solid var(--g4);transition:transform .2s,border-color .2s;cursor:default}
.hit-card:hover{transform:translateY(-2px);border-color:var(--g5)}
.hit-card.starter{background:linear-gradient(180deg,rgba(23,177,105,.08),var(--g2));border-color:rgba(23,177,105,.2)}
.hit-card.rostered{background:var(--g2)}
.hit-card.cut{background:var(--g2);opacity:.5}
.hit-nm{font-family:var(--fd);font-size:10px;font-weight:700;color:var(--t3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hit-pk{font-family:var(--fm);font-size:10px;color:var(--t4);margin-top:1px}
/* ═══ ACTIVITY BARS ═══ */
.act-row{display:flex;align-items:center;gap:8px;margin:5px 0}
.act-name{font-family:var(--fd);font-size:11px;font-weight:700;color:var(--t2);min-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.act-bars{flex:1;display:flex;gap:2px;height:14px}
.act-seg{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.22,1,.36,1)}
.act-val{font-family:var(--fd);font-size:11px;font-weight:700;color:var(--t3);min-width:24px;text-align:right;font-variant-numeric:tabular-nums}
/* ═══ GLASSMORPHISM ACCENTS ═══ */
.glass{background:linear-gradient(135deg,rgba(255,255,255,.03),rgba(255,255,255,.01));backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.06)}
/* ═══ GLOW EFFECTS ═══ */
.glow-a{box-shadow:0 0 20px rgba(204,0,0,.1),0 4px 24px rgba(0,0,0,.3)}
.glow-y{box-shadow:0 0 20px rgba(245,158,11,.1),0 4px 24px rgba(0,0,0,.3)}
/* ═══ ENHANCED ANIMATIONS ═══ */
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.count-in{animation:countUp .6s cubic-bezier(.22,1,.36,1) both}
.count-in:nth-child(2){animation-delay:.1s}
.count-in:nth-child(3){animation-delay:.2s}
.count-in:nth-child(4){animation-delay:.3s}
.count-in:nth-child(5){animation-delay:.4s}
@keyframes barGrow{from{width:0}to{width:var(--w)}}
.bar-grow{animation:barGrow 1.2s cubic-bezier(.22,1,.36,1) both}
@media(max-width:768px){

  .hit-grid{grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:4px}
}
/* ═══ DESIGN SYSTEM V2 — APPLE/ESPN POLISH ═══ */
/* Spacing scale: 4px grid only */
/* 4, 8, 12, 16, 24, 32, 48 */
/* Border radius tiers */
/* Cards: 12px | Pills: 6px | Micro: 4px */
/* ═══ STAGGER ANIMATION ═══ */
@keyframes staggerIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.stagger>*{animation:staggerIn .4s cubic-bezier(.22,1,.36,1) both}
.stagger>*:nth-child(1){animation-delay:0s}
.stagger>*:nth-child(2){animation-delay:.04s}
.stagger>*:nth-child(3){animation-delay:.08s}
.stagger>*:nth-child(4){animation-delay:.12s}
.stagger>*:nth-child(5){animation-delay:.16s}
.stagger>*:nth-child(6){animation-delay:.2s}
.stagger>*:nth-child(7){animation-delay:.24s}
.stagger>*:nth-child(8){animation-delay:.28s}
.stagger>*:nth-child(9){animation-delay:.32s}
.stagger>*:nth-child(10){animation-delay:.36s}
.stagger>*:nth-child(11){animation-delay:.4s}
.stagger>*:nth-child(12){animation-delay:.44s}
.stagger>*:nth-child(n+13){animation-delay:.48s}
/* ═══ TROPHY SHIMMER ═══ */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.trophy-card{position:relative;overflow:hidden;border-radius:var(--radius-xl);padding:var(--sp-7) var(--sp-6);text-align:center;background:linear-gradient(180deg,var(--g3),var(--g2));border:2px solid var(--yd);margin-bottom:var(--sp-3);box-shadow:var(--shadow-lg),var(--shadow-glow-gold)}
.trophy-card::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 30%,rgba(245,158,11,.06) 50%,transparent 70%);background-size:200% 100%;animation:shimmer 4s ease-in-out infinite;pointer-events:none}
.trophy-card::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 20px,rgba(245,158,11,.012) 20px,rgba(245,158,11,.012) 21px);pointer-events:none}
.trophy-emoji{font-size:48px;margin-bottom:var(--sp-2);filter:drop-shadow(0 4px 12px rgba(245,158,11,.3))}
.trophy-name{font-family:var(--fd);font-size:clamp(24px,5vw,32px);font-weight:900;color:var(--y);text-transform:uppercase;letter-spacing:1px;text-shadow:0 0 30px rgba(245,158,11,.2)}
.trophy-year{font-family:var(--fd);font-size:var(--text-2xs);font-weight:700;letter-spacing:3px;color:var(--yd);margin-top:var(--sp-1)}
.trophy-sub{font-family:var(--fb);font-size:var(--text-xs);color:var(--t4);margin-top:var(--sp-2)}
/* ═══ TRADE CARD V2 ═══ */
.trade-card{background:var(--g2);border:1px solid var(--g4);border-radius:var(--radius-lg);margin-bottom:var(--sp-3);overflow:hidden;box-shadow:var(--shadow-md)}
.trade-card:hover{border-color:var(--g5);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.trade-hdr{padding:var(--sp-2) var(--sp-5);border-bottom:1px solid var(--g4);display:flex;justify-content:space-between;align-items:center;background:var(--g3)}
.trade-hdr-yr{font-family:var(--fd);font-size:var(--text-xs);font-weight:700;letter-spacing:2px;color:var(--a);text-transform:uppercase}
.trade-hdr-num{font-family:var(--fb);font-size:var(--text-xs);color:var(--t4);letter-spacing:1px}
.trade-body{display:grid;grid-template-columns:1fr 1fr;min-height:60px}
.trade-side{padding:var(--sp-4) var(--sp-5);border-right:1px solid var(--g4)}
.trade-side:last-child{border-right:none}
.trade-team{font-family:var(--fd);font-size:var(--text-base);font-weight:700;color:var(--t1);margin-bottom:var(--sp-2);letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
.trade-label{font-family:var(--fd);font-size:var(--text-2xs);font-weight:700;letter-spacing:2px;color:var(--a);text-transform:uppercase;margin-bottom:var(--sp-2)}
.trade-divider{display:none}
.trade-player{display:flex;align-items:center;gap:var(--sp-2);margin-bottom:var(--sp-2);padding:var(--sp-2);border-radius:var(--radius-md);background:rgba(255,255,255,.02)}
.trade-player-name{font-family:var(--fb);font-size:var(--text-sm);font-weight:600;color:var(--t1)}
.trade-pick{display:inline-flex;align-items:center;gap:var(--sp-1);margin-bottom:var(--sp-2);padding:var(--sp-1) var(--sp-3);border-radius:var(--radius-md);background:var(--g3);border:1px dashed var(--g5)}
.trade-pick-icon{font-size:12px}
.trade-pick-text{font-family:var(--fb);font-size:var(--text-xs);font-weight:600}
.trade-pick-resolved{color:var(--y)}
.trade-pick-future{color:var(--t3)}
/* ═══ LUCK CARD V2 ═══ */
.luck-card{background:var(--g2);border:1px solid var(--g5);border-radius:12px;padding:12px 16px;margin-bottom:8px;transition:border-color .2s,box-shadow .2s}
.luck-card:hover{border-color:var(--g6);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.luck-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.luck-name{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--t1)}
.luck-score{font-family:var(--fd);font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
.luck-row{display:flex;align-items:center;gap:8px;margin:4px 0}
.luck-row-label{font-family:var(--fm);font-size:10px;color:var(--t4);min-width:56px}
.luck-row-val{font-family:var(--fd);font-size:14px;font-weight:800;min-width:42px;text-align:right;font-variant-numeric:tabular-nums}
/* ═══ FRANCHISE ROW GLOW ═══ */
.fr-row.champ{background:linear-gradient(90deg,rgba(245,158,11,.04),transparent);border-left:3px solid var(--y)}
.fr-hdr{display:grid;grid-template-columns:32px 1fr 60px 60px 70px 50px;gap:8px;padding:10px 14px;border-bottom:2px solid var(--g5);background:var(--g3);position:sticky;top:0;z-index:2}
.fr-hdr span{font-family:var(--fd);font-size:10px;font-weight:700;color:var(--t4);letter-spacing:1px}
.fr-hdr span.r{text-align:right}
.fr-hdr span.c{text-align:center}
/* ═══ ACTIVITY BAR V2 ═══ */
.act-card{padding:8px 0}
.act-legend{display:flex;gap:12px;margin:8px 0 12px}
.act-legend span{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:4px}
.act-legend .dot{width:8px;height:8px;border-radius:2px}
/* ═══ HEAT MAP V2 ═══ */
.hm-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:16px 0;border-radius:12px;border:1px solid var(--g4);background:var(--g2);padding:12px}
.hm-grid{gap:3px}
.hm-cell{min-width:28px;height:32px;border-radius:4px;font-size:10px;font-weight:700;cursor:crosshair;position:relative}
.hm-cell:hover{transform:scale(1.25);z-index:5;box-shadow:0 0 16px rgba(0,0,0,.6)}
.hm-label{min-width:185px;font-size:11px;height:32px}
.hm-wk{height:24px;font-size:10px}
.hm-legend{display:flex;justify-content:center;gap:16px;margin:12px 0}
.hm-legend span{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:4px}
.hm-legend .swatch{width:12px;height:12px;border-radius:3px}
/* ═══ DRAFT HIT CARD V2 ═══ */
.hit-grid{gap:8px}
.hit-card{padding:8px;border-radius:8px;border:1px solid var(--g4);position:relative;overflow:hidden}
.hit-card.starter::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--a)}
.hit-card.cut{opacity:.35}
.hit-nm{font-size:10px;margin-top:4px;letter-spacing:.3px}
.hit-pk{font-size:10px;margin-top:2px}
/* ═══ MICRO-INTERACTIONS ═══ */
.pcard{transition:all .25s cubic-bezier(.22,1,.36,1)}
.pcard:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.pcard:active{transform:translateY(0);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.cast-fig{transition:all .3s cubic-bezier(.22,1,.36,1)}
.mu-card{transition:border-color .2s,transform .2s;border-radius:12px}
.mu-card:hover{border-color:var(--g5);transform:translateY(-1px)}
.sc-card{border-radius:12px;transition:border-color .2s,transform .2s}
.sc-card:hover{border-color:var(--g5);transform:translateY(-1px)}
.wk-btn{transition:all .2s cubic-bezier(.22,1,.36,1)}
.wk-btn:active{transform:scale(.94)}
/* ═══ FOCUS STATES ═══ */
.pcard:focus-visible,.nav-btn:focus-visible,.wk-btn:focus-visible{outline:2px solid var(--y);outline-offset:2px;border-radius:8px}
/* ═══ SKELETON PULSE ═══ */
@keyframes skeletonPulse{0%{opacity:.06}50%{opacity:.12}100%{opacity:.06}}
.skeleton{background:var(--g3);border-radius:8px;animation:skeletonPulse 1.5s ease-in-out infinite}
/* ═══ CONSISTENT CARD RADIUS ═══ */
.trade-card,.luck-card,.mu-card,.sc-card,.narrative,.pcard,.pk-card,.rec,.trophy-card,.hm-wrap{border-radius:12px}
.pl-pos,.dbadge,.wk-btn,.hm-cell,.tag{border-radius:4px}
