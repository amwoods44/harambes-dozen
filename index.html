<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Harambe's Dozen — Dynasty HQ</title>
<meta name="description" content="Dynasty league headquarters for Harambe's Dozen. 12 teams, 3 seasons, full broadcast-quality dashboard.">
<meta name="theme-color" content="#cc0000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dynasty HQ">
<link rel="manifest" href="/manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700;800&display=swap');
.loading-screen{position:fixed;inset:0;z-index:9999;background:var(--g1);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s,visibility .6s}
.loading-screen.fade-out{opacity:0;visibility:hidden;pointer-events:none}
.loading-gorilla{font-size:72px;margin-bottom:12px;animation:loadPulse 1.8s ease-in-out infinite}
.loading-title{font-family:'Oswald',sans-serif;font-size:clamp(28px,5vw,48px);font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:-1px;line-height:1}
.loading-title .ld-acc{color:#ffcc00}
.loading-sub{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:#666;margin-top:12px}
.loading-spinner{width:36px;height:36px;border:3px solid #262626;border-top-color:#cc0000;border-radius:50%;animation:spin .8s linear infinite;margin-top:28px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes loadPulse{0%,100%{opacity:.6;transform:scale(.97)}50%{opacity:1;transform:scale(1)}}
.data-status{position:fixed;top:60px;right:16px;z-index:950;display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:4px;font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:opacity .3s;opacity:.7}
.data-status:hover{opacity:1}
.data-status.ok{color:var(--grn);background:var(--grn-bg)}
.data-status.fade-away{opacity:0;transform:translateY(-4px);pointer-events:none;transition:opacity .6s ease-out,transform .6s ease-out}
.data-status.fade-away:hover{opacity:.7;pointer-events:auto;transform:translateY(0);transition:opacity .2s ease-in,transform .2s ease-in}
:root{
  --a:#cc0000;--ad:#990000;--ab:#e60000;--y:#ffcc00;--yd:#d4a017;
  --g1:#0c0c0c;--g2:#141414;--g3:#1c1c1c;--g4:#262626;--g5:#333;--g6:#444;
  --t1:#fff;--t2:#d4d4d4;--t3:#999;--t4:#666;
  --grn:#17b169;--grn-bg:rgba(23,177,105,.12);--red-t:#ff4444;--red-bg:rgba(255,68,68,.12);
  --blu:#3b82f6;--pur:#8b5cf6;
  --fd:'Oswald',sans-serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{font-family:var(--fb);background:var(--g1);color:var(--t1);min-height:100vh;overflow-x:hidden;padding-bottom:48px}
/* ═══ HEADER ═══ */
.hdr{background:linear-gradient(180deg,#1a1a1a,#111);border-bottom:3px solid var(--a);position:sticky;top:0;z-index:1000;box-shadow:0 2px 20px rgba(0,0,0,.5)}
.hdr-in{max-width:1440px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-gorilla{font-size:28px;filter:drop-shadow(0 0 8px rgba(204,0,0,.3))}
.hdr-div{width:2px;height:28px;background:var(--g5);margin:0 8px;transform:skewX(-12deg);display:inline-block;vertical-align:middle}
.hdr-sub{font-family:var(--fd);font-weight:600;font-size:15px;letter-spacing:4px;text-transform:uppercase;color:var(--t3);vertical-align:middle}
.hdr-right{display:flex;align-items:center;gap:14px}
.live-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:4px;background:rgba(204,0,0,.1);border:1px solid rgba(204,0,0,.25)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--a);box-shadow:0 0 10px rgba(204,0,0,.5);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-txt{font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:3px;color:var(--a)}
.nfl-cd{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:6px;background:rgba(0,53,148,.1);border:1px solid rgba(0,53,148,.25);white-space:nowrap}
.nfl-cd-units{display:flex;gap:5px;align-items:center}
.nfl-cd-box{text-align:center}
.nfl-cd-num{font-family:var(--fd);font-size:18px;font-weight:800;color:#6ba3e8;line-height:1;background:rgba(0,53,148,.2);border:1px solid rgba(0,53,148,.35);border-radius:4px;padding:4px 7px;min-width:30px;display:inline-block}
.nfl-cd-lbl{font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(107,163,232,.7);margin-top:2px}
.nfl-cd-sep{font-family:var(--fd);font-size:14px;font-weight:700;color:rgba(107,163,232,.3);margin:0 -2px;align-self:flex-start;padding-top:4px}
.nfl-cd-tag{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t4);margin-left:2px;line-height:1.2;text-align:center}
.nfl-cd-tag span{display:block;color:#6ba3e8;font-size:12px;letter-spacing:1px}
/* ═══ HERO ═══ */
.hero{position:relative;overflow:hidden;background:linear-gradient(180deg,#1a0a0a,#0f0f0f 40%,var(--g1));padding:40px 28px 36px;text-align:center}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 600px 250px at 50% 20%,rgba(204,0,0,.06),transparent);pointer-events:none}
.hero::after{content:'';position:absolute;top:-50%;left:-10%;width:120%;height:200%;background:repeating-linear-gradient(-45deg,transparent,transparent 80px,rgba(204,0,0,.015) 80px,rgba(204,0,0,.015) 81px);pointer-events:none}
.hero-c{position:relative;z-index:1}
.hero-ey{font-family:var(--fd);font-size:15px;font-weight:600;letter-spacing:6px;text-transform:uppercase;color:var(--a);margin-bottom:8px}
.hero-h{font-family:var(--fd);font-size:clamp(52px,8vw,88px);font-weight:800;letter-spacing:-1px;line-height:.9;color:white;text-transform:uppercase}
.hero-h .acc{color:var(--y)}
.hero-tag{font-family:var(--fd);font-size:19px;font-weight:400;letter-spacing:4px;text-transform:uppercase;color:var(--t3);margin-top:14px}
.hero-tag b{color:var(--t2);font-weight:600}
.hero-bar{height:4px;background:linear-gradient(90deg,transparent 5%,var(--a) 20%,var(--a) 80%,transparent 95%);margin-top:28px}
/* ═══ CAST STRIP ═══ */
.cast{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--g1),rgba(10,10,15,.95));padding:8px 0;max-width:1440px;margin:0 auto}
.cast::before,.cast::after{content:'';position:absolute;top:0;bottom:0;width:60px;z-index:2;pointer-events:none}
.cast::before{left:0;background:linear-gradient(90deg,var(--g1),transparent)}
.cast::after{right:0;background:linear-gradient(270deg,var(--g1),transparent)}
.cast-in{display:flex;align-items:center;justify-content:center;gap:0;padding:0 30px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cast-in::-webkit-scrollbar{display:none}
.cast-fig{flex-shrink:0;position:relative;width:80px;height:80px;border-radius:50%;overflow:hidden;border:2px solid var(--g5);background:var(--g3);transition:all .3s;cursor:default;margin:0 -6px;display:flex;align-items:center;justify-content:center}
.cast-fig:hover{transform:scale(1.15);z-index:3;border-color:var(--a);box-shadow:0 0 20px rgba(204,0,0,.3)}
.cast-fig img{width:100%;height:100%;object-fit:cover;object-position:center top;filter:saturate(.9)}
.cast-fig:hover img{filter:saturate(1.1)}
.cast-fig .cast-init{font-family:var(--fd);font-size:24px;font-weight:800;color:var(--t3)}
.cast-fig::after{content:attr(data-label);position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.cast-fig:hover::after{opacity:1}
.cast-line{height:1px;background:linear-gradient(90deg,transparent 10%,var(--g5) 30%,var(--g5) 70%,transparent 90%);margin-top:6px}
/* ═══ STAT STRIP ═══ */
.sstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--g5);border-radius:8px;overflow:hidden;margin:0 28px 28px;box-shadow:0 4px 24px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.03)}
.ss{padding:22px 16px 18px;text-align:center;position:relative;background:var(--g2);overflow:hidden}
.ss::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 20px,rgba(255,255,255,.008) 20px,rgba(255,255,255,.008) 21px);pointer-events:none}
.ss.feat{background:linear-gradient(180deg,rgba(204,0,0,.08),var(--g2) 60%)}
.ss.feat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--a),transparent)}
.ss:not(.feat)::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:var(--g5)}
.ss-l{font-family:var(--fd);font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.ss.feat .ss-l{color:var(--a);font-weight:700}
.ss-v{font-family:var(--fd);font-size:36px;font-weight:800;line-height:1;letter-spacing:-1px;text-shadow:0 2px 12px rgba(0,0,0,.3);font-variant-numeric:tabular-nums}
.ss.feat .ss-v{text-shadow:0 0 20px rgba(204,0,0,.3);color:var(--a)}
.ss.champ{background:linear-gradient(180deg,rgba(245,158,11,.10),rgba(251,191,36,.04) 40%,var(--g2) 80%);border-left:2px solid rgba(245,158,11,.25);border-right:2px solid rgba(245,158,11,.25);position:relative;overflow:hidden;box-shadow:inset 0 0 30px rgba(245,158,11,.03),0 0 20px rgba(245,158,11,.05);animation:champReveal 1.2s cubic-bezier(.22,1,.36,1) .5s both}
.ss.champ::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#F59E0B 30%,#FBBF24 50%,#F59E0B 70%,transparent)}
.ss.champ::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 25%,rgba(251,191,36,.06) 45%,rgba(245,158,11,.08) 50%,rgba(251,191,36,.06) 55%,transparent 75%);background-size:200% 100%;animation:shimmer 4s ease-in-out infinite;pointer-events:none}
.ss.champ .ss-l{color:#FBBF24;font-weight:700}
.ss.champ .ss-v{background:linear-gradient(135deg,#F59E0B,#FBBF24,#F59E0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 8px rgba(245,158,11,.25))}
.ss.champ .ss-sub{color:rgba(251,191,36,.5)}
@keyframes champReveal{0%{opacity:.5;filter:brightness(1.5) saturate(1.5)}100%{opacity:1;filter:brightness(1) saturate(1)}}
.ss-sub{font-family:var(--fd);font-size:12px;font-weight:400;letter-spacing:1px;color:var(--t4);margin-top:6px}
/* ═══ BROADCAST HEADERS ═══ */
.bh{display:flex;align-items:stretch;margin:32px 0 16px}
.bh-tag{font-family:var(--fd);background:var(--a);color:white;padding:8px 20px;font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 100%,0 100%)}
.bh-acc{width:60px;background:linear-gradient(90deg,var(--ad),var(--g3));clip-path:polygon(0 0,calc(100% - 10px) 0,100% 100%,0 100%)}
.bh-line{flex:1;display:flex;align-items:center;border-bottom:1px solid var(--g5);margin-left:-1px}
.bh-sub{font-family:var(--fd);font-size:14px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--t4);padding-left:16px}
/* ═══ NAV BAR — WINS POOL STYLE ═══ */
.nav-bar{background:var(--g2);border-bottom:1px solid var(--g5);position:sticky;top:59px;z-index:900;overflow-x:auto;scrollbar-width:none}
.nav-bar::-webkit-scrollbar{display:none}
.nav-bar::after{content:'';position:absolute;top:0;right:0;bottom:0;width:32px;background:linear-gradient(270deg,var(--g2),transparent);pointer-events:none;z-index:1}
.nav-in{max-width:1440px;margin:0 auto;padding:0 12px;display:flex;gap:0;flex-wrap:nowrap;min-width:max-content}
.nav-btn{font-family:var(--fd);padding:14px 28px;font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t3);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;position:relative}
.nav-btn:hover{color:var(--t1);background:rgba(255,255,255,.02)}
.nav-btn.active{color:white;border-bottom-color:var(--a)}
.nav-btn.active::after{display:none}
.nav-btn:focus-visible{outline:2px solid var(--y);outline-offset:-2px;border-radius:2px}
/* ═══ PANELS ═══ */
.main{max-width:1440px;margin:0 auto;padding:0 28px}
.panel{padding-bottom:32px}
@keyframes wipeIn{from{clip-path:inset(0 100% 0 0);opacity:.8}to{clip-path:inset(0);opacity:1}}
/* ═══ POWER RANKING CARDS ═══ */
.plist{display:flex;flex-direction:column;gap:8px}
.pcard{display:grid;grid-template-columns:64px 5px 1fr auto;align-items:center;background:var(--g2);border:1px solid var(--g5);border-radius:6px;overflow:hidden;transition:all .2s;cursor:pointer}
.pcard:hover{border-color:var(--g6);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.pcard.r1{border-color:rgba(204,0,0,.45);background:linear-gradient(135deg,var(--g2) 55%,rgba(204,0,0,.07))}
.pcard.r1 .prk{background:linear-gradient(180deg,#cc0000,#880000)}
.pcard.r2{border-color:rgba(212,160,23,.35);background:linear-gradient(135deg,var(--g2) 55%,rgba(212,160,23,.05))}
.pcard.r2 .prk{background:linear-gradient(180deg,#d4a017,#9a7212)}
.pcard.r3{border-color:rgba(59,130,246,.3);background:linear-gradient(135deg,var(--g2) 55%,rgba(59,130,246,.05))}
.pcard.r3 .prk{background:linear-gradient(180deg,#3b82f6,#1e4db0)}
.prk{background:var(--g4);display:flex;align-items:center;justify-content:center;padding:14px 0;align-self:stretch}
.prk-n{font-family:var(--fd);font-size:34px;font-weight:800;min-width:32px;text-align:center;font-variant-numeric:tabular-nums}
.pcbar{width:5px;align-self:stretch}
.pinfo{padding:18px 20px;display:flex;align-items:center;gap:16px;min-width:0}
.p-avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--g5);background:var(--g3);flex-shrink:0}
.p-avatar-init{width:56px;height:56px;border-radius:50%;border:2px solid var(--g5);background:var(--g3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:22px;font-weight:800;color:var(--t4)}
.pname{font-family:var(--fd);font-size:26px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.psub{font-family:var(--fd);font-size:12px;font-weight:400;color:var(--t3);margin-top:2px;letter-spacing:1px}
.pnums{display:flex;align-items:center;gap:24px;padding:18px 28px;flex-shrink:0}
.pnb{text-align:center;min-width:40px}
.pnv{font-family:var(--fd);font-weight:800;line-height:1;letter-spacing:-.3px;font-variant-numeric:tabular-nums}
.pnv.w{font-size:42px;min-width:52px;display:inline-block;text-align:center;letter-spacing:-1px}
.pnv.p{font-size:20px;color:var(--y)}
.pnv.s{font-size:16px}
.pnl{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t4);margin-top:5px}
.parr{padding:0 12px;font-size:11px;color:var(--t4);transition:transform .3s}
.pcard.open .parr{transform:rotate(180deg)}
.pdet{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.22,1,.36,1);grid-column:1/-1}
.pcard.open .pdet{max-height:600px}
.pdet-in{padding:0 16px 16px;margin-left:52px}
@media(max-width:768px){.pdet-in{margin-left:0;padding:0 8px 12px}}
/* ═══ PLAYER ROWS ═══ */
.pl-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:4px;transition:background .15s,box-shadow .15s}
.pl-row:nth-child(even){background:rgba(255,255,255,.02)}
.pl-row:hover{background:rgba(204,0,0,.04);box-shadow:inset 3px 0 0 var(--a)}
.pl-pos{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px;min-width:28px;text-align:center;padding:2px 4px;border-radius:3px}
.pos-QB{background:rgba(239,68,68,.12);color:#ef4444}
.pos-RB{background:rgba(59,130,246,.12);color:#3b82f6}
.pos-WR{background:rgba(16,185,129,.12);color:#10B981}
.pos-TE{background:rgba(245,158,11,.12);color:#F59E0B}
.pos-DEF{background:rgba(139,92,246,.12);color:#8b5cf6}
.pl-name{font-family:var(--fb);font-size:13px;font-weight:600;color:var(--t1);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-nfl{font-family:var(--fm);font-size:10px;color:var(--t4);min-width:26px}
.pl-age{font-family:var(--fd);font-size:12px;font-weight:700;min-width:22px;text-align:right;font-variant-numeric:tabular-nums}
.age-y{color:var(--grn)}.age-p{color:var(--y)}.age-v{color:var(--red-t)}
.pl-starter{background:rgba(23,177,105,.06);border-left:3px solid rgba(23,177,105,.6)}
/* ═══ TIER LABELS ═══ */
.tier{display:flex;align-items:center;gap:14px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;margin:28px 0 10px;white-space:nowrap}
.tier::before,.tier::after{content:'';flex:1;height:1px}
.tier-1{color:var(--a)}
.tier-1::before{background:linear-gradient(90deg,transparent,rgba(204,0,0,.5))}
.tier-1::after{background:linear-gradient(90deg,rgba(204,0,0,.5),transparent)}
.tier-2{color:var(--blu)}
.tier-2::before{background:linear-gradient(90deg,transparent,rgba(59,130,246,.4))}
.tier-2::after{background:linear-gradient(90deg,rgba(59,130,246,.4),transparent)}
.tier-3{color:var(--y)}
.tier-3::before{background:linear-gradient(90deg,transparent,rgba(245,158,11,.4))}
.tier-3::after{background:linear-gradient(90deg,rgba(245,158,11,.4),transparent)}
.tier-4{color:var(--red-t)}
.tier-4::before{background:linear-gradient(90deg,transparent,rgba(239,68,68,.4))}
.tier-4::after{background:linear-gradient(90deg,rgba(239,68,68,.4),transparent)}
/* ═══ NARRATIVE ═══ */
.narrative{background:var(--g2);border:1px solid var(--g5);border-radius:8px;padding:20px;margin-top:16px;position:relative;overflow:hidden}
.narrative::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--a)}
.nar-item{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.nar-item:last-child{margin-bottom:0}
.nar-icon{flex-shrink:0;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--g4);border:1px solid var(--g5)}
.nar-text{font-family:var(--fd);font-size:17px;font-weight:500;color:var(--t2);line-height:1.5;letter-spacing:.3px}
.nar-text b{color:var(--y);font-weight:700}
.nar-text .red{color:var(--red-t)}
/* ═══ RECORDS GRID ═══ */
.rec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--g5);border-radius:8px;overflow:hidden;margin-top:16px}
.rec{padding:18px 12px;text-align:center;background:var(--g2);position:relative}
.rec::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 20px,rgba(255,255,255,.006) 20px,rgba(255,255,255,.006) 21px);pointer-events:none}
.rec-emoji{font-size:24px;margin-bottom:4px}
.rec-lbl{font-family:var(--fd);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4)}
.rec-val{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--y);font-variant-numeric:tabular-nums;margin-top:2px}
.rec-sub{font-family:var(--fb);font-size:10px;color:var(--t4);margin-top:2px}
/* ═══ AGE MAP BARS ═══ */
.age-row{display:flex;align-items:center;gap:10px;margin:8px 0}
.age-name{font-family:var(--fd);font-size:12px;font-weight:700;color:var(--t2);min-width:148px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.age-track{flex:1;height:24px;background:var(--g4);border-radius:4px;overflow:hidden;display:flex}
.age-seg{height:100%;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.age-y{background:var(--grn)}.age-p{background:var(--y)}.age-v{background:var(--red-t)}
.age-avg{font-family:var(--fd);font-size:14px;font-weight:800;min-width:36px;text-align:right;font-variant-numeric:tabular-nums}
.window-tag{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:4px}
/* ═══ MATCHUP CARDS ═══ */
.mu-card{background:var(--g2);border:1px solid var(--g5);border-radius:8px;overflow:hidden;margin-bottom:8px}
.mu-top{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:2px solid var(--a);background:linear-gradient(135deg,var(--g3),var(--g2))}
.mu-team{text-align:center;flex:1;min-width:0}
.mu-tn{font-family:var(--fd);font-size:12px;font-weight:700;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.5px;text-transform:uppercase}
.mu-sc{font-family:var(--fd);font-size:28px;font-weight:900;font-variant-numeric:tabular-nums;margin-top:2px}
.mu-sc.win{color:var(--grn)}.mu-sc.lose{color:var(--t4)}
.mu-vs{font-family:var(--fd);font-size:12px;font-weight:700;color:var(--g6);letter-spacing:2px;padding:0 8px;flex-shrink:0}
.mu-diff{font-family:var(--fm);font-size:10px;color:var(--t4);text-align:center;padding:6px;background:var(--g3)}
/* ═══ WEEK SELECTOR ═══ */
.wk-sel{display:flex;gap:4px;overflow-x:auto;padding:8px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.wk-sel::-webkit-scrollbar{display:none}
.wk-btn{flex-shrink:0;padding:8px 16px;background:var(--g3);border:1px solid var(--g4);border-radius:6px;font-family:var(--fd);font-size:12px;font-weight:700;color:var(--t3);cursor:pointer;transition:all .2s;letter-spacing:.5px;min-height:36px}
.wk-btn.active{background:var(--a);color:#fff;border-color:var(--a)}
.wk-btn:hover:not(.active){border-color:var(--a)}
/* ═══ SPARKLINES ═══ */
.spark{display:flex;align-items:flex-end;gap:2px;height:36px}
.spark-b{flex:1;border-radius:2px 2px 0 0;min-width:3px;transition:height .6s cubic-bezier(.22,1,.36,1)}
/* ═══ SCORING CARD ═══ */
.sc-card{background:var(--g2);border:1px solid var(--g5);border-radius:8px;padding:16px;margin-bottom:8px;position:relative;overflow:hidden}
.sc-card::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 20px,rgba(255,255,255,.005) 20px,rgba(255,255,255,.005) 21px);pointer-events:none}
.sc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sc-rank{font-family:var(--fd);font-size:18px;font-weight:800;color:var(--y);font-variant-numeric:tabular-nums}
.sc-name{font-family:var(--fd);font-size:15px;font-weight:700;letter-spacing:.5px}
.sc-pts{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--a);font-variant-numeric:tabular-nums}
.sc-meta{display:flex;justify-content:space-between;margin-top:6px}
.sc-meta span{font-family:var(--fm);font-size:10px;color:var(--t4);font-variant-numeric:tabular-nums}
/* ═══ PICK TRADES ═══ */
.pk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.pk-card{background:var(--g2);border:1px solid var(--g5);border-radius:8px;padding:14px;position:relative;overflow:hidden}
.pk-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--a)}
.pk-round{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--y);letter-spacing:2px;text-transform:uppercase}
.pk-flow{font-family:var(--fb);font-size:12px;color:var(--t2);margin-top:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pk-from{color:var(--red-t);font-weight:600}
.pk-to{color:var(--grn);font-weight:600}
.pk-arr{font-family:var(--fd);font-size:14px;color:var(--y)}
/* ═══ HISTORY TABLE ═══ */
.h-row{display:flex;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.03)}
.h-row:last-child{border:none}
.h-row:nth-child(even){background:rgba(255,255,255,.02)}
.h-row:hover{background:rgba(204,0,0,.04)}
.h-rk{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--y);min-width:26px;text-align:center;font-variant-numeric:tabular-nums}
.h-team{flex:1;font-family:var(--fd);font-size:13px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px}
.h-rec{font-family:var(--fm);font-size:12px;color:var(--t2);min-width:50px;text-align:right;font-variant-numeric:tabular-nums}
.h-pts{font-family:var(--fm);font-size:11px;color:var(--t4);min-width:60px;text-align:right;font-variant-numeric:tabular-nums}
/* ═══ BOTTOMLINE TICKER ═══ */
.bl{position:fixed;bottom:0;left:0;right:0;z-index:999;height:36px;background:linear-gradient(180deg,#1a1a1a,#111);border-top:1px solid var(--g5);box-shadow:0 -2px 12px rgba(0,0,0,.3);overflow:hidden;display:flex;align-items:center}
.bl-tag{flex-shrink:0;background:var(--a);color:white;padding:0 14px;height:100%;display:flex;align-items:center;font-family:var(--fd);font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 100%,0 100%);padding-right:20px}
.bl-sw{flex:1;overflow:hidden;height:100%;display:flex;align-items:center;mask-image:linear-gradient(90deg,transparent,#000 20px,#000 calc(100% - 20px),transparent);-webkit-mask-image:linear-gradient(90deg,transparent,#000 20px,#000 calc(100% - 20px),transparent)}
.bl-s{display:flex;align-items:center;white-space:nowrap;animation:blScroll var(--td1,90s) linear infinite}
.bl-s:hover{animation-play-state:paused}
@keyframes blScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tki{display:inline-flex;align-items:center;gap:6px;padding:0 14px;font-family:var(--fd);font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.5px}
.tki b{color:var(--y);font-weight:700;margin-right:4px}
.tki .hl{color:var(--a);font-weight:800;margin:0 2px}
.tks{color:var(--g5);margin:0 4px;font-size:8px}
/* ═══ BADGE HELPERS ═══ */
.dbadge{display:inline-block;font-family:var(--fd);font-size:11px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.5px}
.dbadge.up{background:var(--grn-bg);color:var(--grn)}
.dbadge.dn{background:var(--red-bg);color:var(--red-t)}
.dbadge.ev{background:rgba(255,255,255,.05);color:var(--t4)}
/* ═══ NAV DROPDOWN GROUPS ═══ */
.nav-group{position:relative;display:inline-flex;align-items:stretch}
.nav-group-btn{font-family:var(--fd);padding:14px 20px;font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t3);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.nav-group-btn:hover{color:var(--t1);background:rgba(255,255,255,.02)}
.nav-group-btn.active{color:var(--t1);border-bottom-color:var(--a)}
.nav-group-btn::after{content:'▾';font-size:10px;opacity:.6;transition:transform .2s}
.nav-group.open .nav-group-btn::after{transform:rotate(180deg)}
.nav-dropdown{position:absolute;top:calc(100% + 1px);left:0;background:var(--g2);border:1px solid var(--g5);border-top:2px solid var(--a);min-width:180px;z-index:999;display:none;flex-direction:column;box-shadow:0 16px 40px rgba(0,0,0,.6)}
.nav-group.open .nav-dropdown{display:flex}
.nav-drop-item{font-family:var(--fd);padding:11px 20px;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);cursor:pointer;border:none;background:none;text-align:left;transition:all .15s;border-left:2px solid transparent}
.nav-drop-item:hover{color:var(--t1);background:rgba(255,255,255,.04);border-left-color:var(--g6)}
.nav-drop-item.active{color:var(--a);border-left-color:var(--a);background:rgba(204,0,0,.05)}
/* ═══ THE RAFTERS ═══ */
.rafters-ceiling{height:6px;background:linear-gradient(90deg,var(--g3),var(--g5) 30%,var(--g4) 70%,var(--g5));border-radius:3px 3px 0 0;margin:20px 0 0}
.rafters-row{display:flex;gap:20px;padding:0 4px 28px;justify-content:center;flex-wrap:wrap;align-items:flex-start}
.rafter-banner{display:flex;flex-direction:column;align-items:center}
.banner-cord{width:2px;height:28px;background:linear-gradient(180deg,var(--g5),transparent)}
.banner-body{width:140px;border:1px solid rgba(255,255,255,.1);border-radius:0 0 6px 6px;padding:16px 14px 22px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px}
.rafter-banner.rafter-latest .banner-body{width:164px;box-shadow:0 12px 40px rgba(0,0,0,.5);border-width:1px}
.banner-year{font-family:var(--fd);font-size:46px;font-weight:800;color:rgba(255,255,255,.88);line-height:1;letter-spacing:-2px}
.rafter-banner.rafter-latest .banner-year{font-size:54px}
.banner-label{font-family:var(--fd);font-size:8px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.45);text-transform:uppercase;margin:2px 0}
.banner-avatar{margin:8px 0 2px}
.banner-name{font-family:var(--fd);font-size:11px;font-weight:700;color:rgba(255,255,255,.9);text-align:center;line-height:1.25;letter-spacing:.5px;text-transform:uppercase}
.rafter-banner.rafter-latest .banner-name{font-size:13px}
.banner-sub{font-family:var(--fb);font-size:9px;color:rgba(255,255,255,.38);margin-top:4px}
/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .sstrip{grid-template-columns:repeat(3,1fr)}
  .sstrip .ss:nth-child(n+4){display:none}
  .rec-grid{grid-template-columns:repeat(2,1fr)}
  .pcard{grid-template-columns:50px 4px 1fr auto}
  .prk-n{font-size:22px}
  .pnums{gap:10px;padding:12px 12px}
  .pnv.w{font-size:26px}
  .pk-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .hdr-in{padding:0 12px}
  .nfl-cd{display:none}
  .mu-sc{font-size:22px}
  .pname{font-size:14px}
  .main{padding:0 10px}
}
/* ═══ HEAT MAP ═══ */
.hm-grid{display:grid;gap:2px;margin:12px 0;overflow-x:auto}
.hm-cell{min-width:22px;height:28px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:8px;font-weight:700;color:rgba(255,255,255,.8);transition:transform .15s}
.hm-cell:hover{transform:scale(1.3);z-index:2;box-shadow:0 0 12px rgba(0,0,0,.5)}
.hm-label{font-family:var(--fd);font-size:10px;font-weight:700;color:var(--t3);min-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;height:28px;letter-spacing:.5px}
.hm-wk{font-family:var(--fd);font-size:9px;font-weight:700;color:var(--t4);text-align:center;letter-spacing:1px;height:20px;display:flex;align-items:center;justify-content:center}
/* ═══ LUCK CARDS ═══ */
.luck-bar{display:flex;align-items:center;gap:8px;margin:4px 0}
.luck-track{flex:1;height:10px;background:var(--g4);border-radius:5px;position:relative;overflow:visible}
.luck-fill{height:100%;border-radius:5px;transition:width 1.5s cubic-bezier(.22,1,.36,1)}
.luck-marker{position:absolute;top:-3px;width:3px;height:16px;background:var(--y);border-radius:2px;transition:left 1.5s cubic-bezier(.22,1,.36,1)}
.luck-val{font-family:var(--fd);font-size:14px;font-weight:800;min-width:42px;text-align:right;font-variant-numeric:tabular-nums}
/* ═══ FRANCHISE TABLE ═══ */
.fr-row{display:grid;grid-template-columns:32px 1fr 60px 60px 70px 50px;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s;font-variant-numeric:tabular-nums}
.fr-row:nth-child(even){background:rgba(255,255,255,.02)}
.fr-row:hover{background:rgba(204,0,0,.04)}
.fr-row.champ{background:rgba(245,158,11,.03)}
.fr-rk{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--y);text-align:center;font-variant-numeric:tabular-nums}
.fr-name{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--t1);letter-spacing:.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fr-stat{font-family:var(--fd);font-size:13px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums;color:var(--t2)}
.fr-pct{color:var(--a)}
.fr-trophies{font-size:14px;text-align:center}
/* ═══ DRAFT HIT/BUST ═══ */
.hit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px;margin:12px 0}
.hit-card{text-align:center;padding:8px 4px;border-radius:8px;border:1px solid var(--g4);transition:transform .2s,border-color .2s;cursor:default}
.hit-card:hover{transform:translateY(-2px);border-color:var(--g5)}
.hit-card.starter{background:linear-gradient(180deg,rgba(23,177,105,.08),var(--g2));border-color:rgba(23,177,105,.2)}
.hit-card.rostered{background:var(--g2)}
.hit-card.cut{background:var(--g2);opacity:.5}
.hit-nm{font-family:var(--fd);font-size:9px;font-weight:700;color:var(--t3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hit-pk{font-family:var(--fm);font-size:8px;color:var(--t4);margin-top:1px}
/* ═══ ACTIVITY BARS ═══ */
.act-row{display:flex;align-items:center;gap:8px;margin:5px 0}
.act-name{font-family:var(--fd);font-size:11px;font-weight:700;color:var(--t2);min-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.act-bars{flex:1;display:flex;gap:2px;height:14px}
.act-seg{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.22,1,.36,1)}
.act-val{font-family:var(--fd);font-size:11px;font-weight:700;color:var(--t3);min-width:24px;text-align:right;font-variant-numeric:tabular-nums}
/* ═══ GLASSMORPHISM ACCENTS ═══ */
.glass{background:linear-gradient(135deg,rgba(255,255,255,.03),rgba(255,255,255,.01));backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.06)}
/* ═══ GLOW EFFECTS ═══ */
.glow-a{box-shadow:0 0 20px rgba(204,0,0,.1),0 4px 24px rgba(0,0,0,.3)}
.glow-y{box-shadow:0 0 20px rgba(245,158,11,.1),0 4px 24px rgba(0,0,0,.3)}
/* ═══ ENHANCED ANIMATIONS ═══ */
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.count-in{animation:countUp .6s cubic-bezier(.22,1,.36,1) both}
.count-in:nth-child(2){animation-delay:.1s}
.count-in:nth-child(3){animation-delay:.2s}
.count-in:nth-child(4){animation-delay:.3s}
.count-in:nth-child(5){animation-delay:.4s}
@keyframes barGrow{from{width:0}to{width:var(--w)}}
.bar-grow{animation:barGrow 1.2s cubic-bezier(.22,1,.36,1) both}
@media(max-width:768px){
  .fr-row{grid-template-columns:24px 1fr 50px 50px;gap:4px;padding:6px 8px}
  .fr-row .fr-stat:nth-child(n+5){display:none}
  .hit-grid{grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:4px}
}
/* ═══ DESIGN SYSTEM V2 — APPLE/ESPN POLISH ═══ */
/* Spacing scale: 4px grid only */
/* 4, 8, 12, 16, 24, 32, 48 */
/* Border radius tiers */
/* Cards: 12px | Pills: 6px | Micro: 4px */
/* ═══ STAGGER ANIMATION ═══ */
@keyframes staggerIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.stagger>*{animation:staggerIn .4s cubic-bezier(.22,1,.36,1) both}
.stagger>*:nth-child(1){animation-delay:0s}
.stagger>*:nth-child(2){animation-delay:.04s}
.stagger>*:nth-child(3){animation-delay:.08s}
.stagger>*:nth-child(4){animation-delay:.12s}
.stagger>*:nth-child(5){animation-delay:.16s}
.stagger>*:nth-child(6){animation-delay:.2s}
.stagger>*:nth-child(7){animation-delay:.24s}
.stagger>*:nth-child(8){animation-delay:.28s}
.stagger>*:nth-child(9){animation-delay:.32s}
.stagger>*:nth-child(10){animation-delay:.36s}
.stagger>*:nth-child(11){animation-delay:.4s}
.stagger>*:nth-child(12){animation-delay:.44s}
.stagger>*:nth-child(n+13){animation-delay:.48s}
/* ═══ TROPHY SHIMMER ═══ */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.trophy-card{position:relative;overflow:hidden;border-radius:12px;padding:24px;text-align:center;background:linear-gradient(135deg,rgba(245,158,11,.06),rgba(204,0,0,.02),rgba(245,158,11,.04));border:1px solid rgba(245,158,11,.15);margin-bottom:12px}
.trophy-card::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 30%,rgba(245,158,11,.06) 50%,transparent 70%);background-size:200% 100%;animation:shimmer 4s ease-in-out infinite;pointer-events:none}
.trophy-card::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 20px,rgba(245,158,11,.012) 20px,rgba(245,158,11,.012) 21px);pointer-events:none}
.trophy-emoji{font-size:48px;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(245,158,11,.3))}
.trophy-name{font-family:var(--fd);font-size:clamp(24px,5vw,32px);font-weight:900;color:var(--y);text-transform:uppercase;letter-spacing:1px;text-shadow:0 0 24px rgba(245,158,11,.2)}
.trophy-year{font-family:var(--fd);font-size:14px;font-weight:600;letter-spacing:4px;color:var(--t3);margin-top:4px}
.trophy-sub{font-family:var(--fb);font-size:12px;color:var(--t4);margin-top:8px}
/* ═══ TRADE CARD V2 ═══ */
.trade-card{background:var(--g2);border:1px solid var(--g5);border-radius:12px;margin-bottom:12px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.trade-card:hover{border-color:var(--g6);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.trade-hdr{padding:12px 16px;border-bottom:2px solid var(--a);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,var(--g3),var(--g2))}
.trade-hdr-yr{font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:2px;color:var(--a);text-transform:uppercase}
.trade-hdr-num{font-family:var(--fd);font-size:10px;color:var(--t4);letter-spacing:1px}
.trade-body{display:grid;grid-template-columns:1fr auto 1fr;min-height:60px}
.trade-side{padding:12px 16px}
.trade-team{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--t1);margin-bottom:8px;letter-spacing:.5px}
.trade-label{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:2px;color:var(--a);text-transform:uppercase;margin-bottom:8px}
.trade-divider{display:flex;align-items:center;justify-content:center;padding:0 8px;border-left:1px solid var(--g4);border-right:1px solid var(--g4)}
.trade-divider-icon{font-size:16px;opacity:.4}
.trade-player{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.trade-player-name{font-family:var(--fb);font-size:12px;font-weight:600;color:var(--t1)}
.trade-pick{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.trade-pick-icon{font-size:12px}
.trade-pick-text{font-family:var(--fm);font-size:11px;font-weight:600}
.trade-pick-resolved{color:var(--y)}
.trade-pick-future{color:var(--t3)}
/* ═══ LUCK CARD V2 ═══ */
.luck-card{background:var(--g2);border:1px solid var(--g5);border-radius:12px;padding:12px 16px;margin-bottom:8px;transition:border-color .2s,box-shadow .2s}
.luck-card:hover{border-color:var(--g6);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.luck-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.luck-name{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--t1)}
.luck-score{font-family:var(--fd);font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
.luck-row{display:flex;align-items:center;gap:8px;margin:4px 0}
.luck-row-label{font-family:var(--fm);font-size:10px;color:var(--t4);min-width:56px}
.luck-row-val{font-family:var(--fd);font-size:14px;font-weight:800;min-width:42px;text-align:right;font-variant-numeric:tabular-nums}
/* ═══ FRANCHISE ROW GLOW ═══ */
.fr-row.champ{background:linear-gradient(90deg,rgba(245,158,11,.04),transparent);border-left:3px solid var(--y)}
.fr-hdr{display:grid;grid-template-columns:32px 1fr 60px 60px 70px 50px;gap:8px;padding:10px 14px;border-bottom:2px solid var(--g5);background:var(--g3);position:sticky;top:0;z-index:2}
.fr-hdr span{font-family:var(--fd);font-size:9px;font-weight:700;color:var(--t4);letter-spacing:1px}
.fr-hdr span.r{text-align:right}
.fr-hdr span.c{text-align:center}
/* ═══ ACTIVITY BAR V2 ═══ */
.act-card{padding:8px 0}
.act-legend{display:flex;gap:12px;margin:8px 0 12px}
.act-legend span{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:4px}
.act-legend .dot{width:8px;height:8px;border-radius:2px}
/* ═══ HEAT MAP V2 ═══ */
.hm-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:16px 0;border-radius:12px;border:1px solid var(--g4);background:var(--g2);padding:12px}
.hm-grid{gap:3px}
.hm-cell{min-width:28px;height:32px;border-radius:4px;font-size:9px;font-weight:700;cursor:crosshair;position:relative}
.hm-cell:hover{transform:scale(1.25);z-index:5;box-shadow:0 0 16px rgba(0,0,0,.6)}
.hm-label{min-width:185px;font-size:11px;height:32px}
.hm-wk{height:24px;font-size:10px}
.hm-legend{display:flex;justify-content:center;gap:16px;margin:12px 0}
.hm-legend span{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:4px}
.hm-legend .swatch{width:12px;height:12px;border-radius:3px}
/* ═══ DRAFT HIT CARD V2 ═══ */
.hit-grid{gap:8px}
.hit-card{padding:8px;border-radius:8px;border:1px solid var(--g4);position:relative;overflow:hidden}
.hit-card.starter::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--a)}
.hit-card.cut{opacity:.35}
.hit-nm{font-size:10px;margin-top:4px;letter-spacing:.3px}
.hit-pk{font-size:9px;margin-top:2px}
/* ═══ MICRO-INTERACTIONS ═══ */
.pcard{transition:all .25s cubic-bezier(.22,1,.36,1)}
.pcard:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.pcard:active{transform:translateY(0);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.cast-fig{transition:all .3s cubic-bezier(.22,1,.36,1)}
.mu-card{transition:border-color .2s,transform .2s;border-radius:12px}
.mu-card:hover{border-color:var(--g5);transform:translateY(-1px)}
.sc-card{border-radius:12px;transition:border-color .2s,transform .2s}
.sc-card:hover{border-color:var(--g5);transform:translateY(-1px)}
.wk-btn{transition:all .2s cubic-bezier(.22,1,.36,1)}
.wk-btn:active{transform:scale(.94)}
/* ═══ FOCUS STATES ═══ */
.pcard:focus-visible,.nav-btn:focus-visible,.wk-btn:focus-visible{outline:2px solid var(--y);outline-offset:2px;border-radius:8px}
/* ═══ SKELETON PULSE ═══ */
@keyframes skeletonPulse{0%{opacity:.06}50%{opacity:.12}100%{opacity:.06}}
.skeleton{background:var(--g3);border-radius:8px;animation:skeletonPulse 1.5s ease-in-out infinite}
/* ═══ CONSISTENT CARD RADIUS ═══ */
.trade-card,.luck-card,.mu-card,.sc-card,.narrative,.pcard,.pk-card,.rec,.trophy-card,.hm-wrap{border-radius:12px}
.pl-pos,.dbadge,.wk-btn,.hm-cell,.tag{border-radius:4px}
/* ═══ RESPONSIVE V2 ═══ */
@media(max-width:600px){
  .sstrip{grid-template-columns:repeat(3,1fr)}
  .sstrip .ss:nth-child(n+4){border-top:1px solid var(--g5)}
  .trade-body{grid-template-columns:1fr;gap:0}
  .trade-divider{border-left:none;border-right:none;border-top:1px solid var(--g4);border-bottom:1px solid var(--g4);padding:8px;writing-mode:initial}
  .trade-divider-icon{writing-mode:initial}
  .fr-hdr,.fr-row{grid-template-columns:24px 1fr 50px 50px}
  .fr-hdr span:nth-child(n+5),.fr-row span:nth-child(n+5),.fr-row .fr-trophies:last-child{display:none}
  .fr-row .fr-trophies{display:none}
  .hm-cell{min-width:24px;height:28px;font-size:8px}
  .hm-label{min-width:70px;font-size:9px}
  .hit-grid{grid-template-columns:repeat(auto-fill,minmax(60px,1fr))}
  .hero-h{font-size:clamp(36px,8vw,60px)}
}
@media(max-width:380px){
  .hdr-sub{font-size:12px;letter-spacing:2px}
  .hero-ey{font-size:11px;letter-spacing:4px}
  .bh-tag{font-size:11px;letter-spacing:2px;padding:6px 12px}
  .pname{font-size:13px}
  .prk-n{font-size:20px}
}
/* ═══ SAFE AREA TICKER FIX ═══ */
body{padding-bottom:48px}

/* ═══ PWA INSTALL BANNER ═══ */
.install-banner {
  position: fixed;
  bottom: 80px;
  left: 12px;
  right: 12px;
  z-index: 2000;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 1px solid rgba(204,0,0,.4);
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,.6);
  animation: slideUp .4s ease-out;
  -webkit-font-smoothing: antialiased;
}
.install-banner-icon { width:44px; height:44px; border-radius:10px; flex-shrink:0; object-fit:cover }
.install-banner-text { flex:1; min-width:0 }
.install-banner-title { font-family:var(--fd); font-size:14px; font-weight:700; color:#fff; letter-spacing:.5px }
.install-banner-sub { font-family:var(--fb); font-size:12px; color:var(--t3); margin-top:3px; line-height:1.4 }
.install-banner-btn {
  font-family: var(--fd);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #fff;
  background: var(--a);
  border: none;
  border-radius: 6px;
  padding: 8px 14px;
  cursor: pointer;
}
.install-banner-close { position:absolute; top:6px; right:10px; background:none; border:none; color:var(--t4); font-size:18px; cursor:pointer }
.share-icon-inline { width:18px; height:18px; color:#4fc3f7; vertical-align:middle; display:inline-block; margin:0 2px -3px }
.share-arrow-container { position:fixed; top:0; right:44px; z-index:2001; pointer-events:none; width:40px; height:80px; animation:fadeInArrow .6s .5s ease-out both }
.share-arrow-svg { width:40px; height:80px; filter:drop-shadow(0 0 6px rgba(204,0,0,.5)) }
.share-arrow-pulse { position:absolute; top:6px; left:50%; transform:translateX(-50%); width:16px; height:16px; background:rgba(204,0,0,.3); border-radius:50%; animation:arrowPulse 1.5s ease-in-out infinite }
@keyframes slideUp { from{transform:translateY(100px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes fadeInArrow { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes arrowPulse { 0%,100%{transform:translateX(-50%) scale(1);opacity:.3} 50%{transform:translateX(-50%) scale(2);opacity:.6} }
/* ═══ AWARDS TAB ═══ */
.award-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin:16px 0}
.award-card{background:var(--g2);border:1px solid var(--g5);border-radius:12px;padding:20px;text-align:center;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative;overflow:hidden}
.award-card:hover{transform:translateY(-2px);border-color:var(--g6);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.award-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--a)}
.award-card.gold::before{background:linear-gradient(90deg,#F59E0B,#FBBF24,#F59E0B)}
.award-card.silver::before{background:linear-gradient(90deg,#94a3b8,#cbd5e1,#94a3b8)}
.award-card.red::before{background:var(--red-t)}
.award-card.blue::before{background:var(--blu)}
.award-card.purple::before{background:var(--pur)}
.award-emoji{font-size:48px;margin-bottom:8px}
.award-title{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.award-winner{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--t1);line-height:1.1}
.award-stat{font-family:var(--fm);font-size:14px;font-weight:700;color:var(--a);margin-top:6px}
.award-desc{font-family:var(--fb);font-size:12px;color:var(--t4);margin-top:6px;line-height:1.4}
/* ═══ ANALYTICS TAB ═══ */
.h2h-matrix{overflow-x:auto;margin:16px 0}
.h2h-grid{display:grid;gap:1px;background:var(--g4);border-radius:8px;overflow:hidden;min-width:600px}
.h2h-cell{display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:12px;font-weight:700;padding:7px 2px;min-height:40px;transition:filter .15s}
.h2h-cell:hover{filter:brightness(1.3)}
.h2h-hdr{background:var(--g3);color:var(--t3);font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:6px 6px}
.h2h-self{background:var(--g3);color:var(--t4)}
.h2h-win{background:rgba(23,177,105,.15);color:var(--grn)}
.h2h-lose{background:rgba(239,68,68,.12);color:var(--red-t)}
.h2h-even{background:var(--g2);color:var(--t3)}
.ap-table{width:100%;border-collapse:collapse;margin:16px 0;font-family:var(--fb);font-size:13px}
.ap-table th{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t4);padding:10px 14px;text-align:left;border-bottom:2px solid var(--g4);background:var(--g3);position:sticky;top:0;z-index:2}
.ap-table td{padding:10px 14px;border-bottom:1px solid var(--g3);color:var(--t2);font-variant-numeric:tabular-nums}
.ap-table td:not(:first-child){text-align:right}
.ap-table tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.ap-table tr:hover td{background:rgba(204,0,0,.04)}
.ap-luck-pos{color:var(--grn);font-weight:700;font-family:var(--fm)}
.ap-luck-neg{color:var(--red-t);font-weight:700;font-family:var(--fm)}
.consistency-chart{position:relative;width:100%;height:360px;margin:16px 0;background:var(--g2);border-radius:8px;border:1px solid var(--g4);overflow:hidden}
/* ═══ MOVES TAB ═══ */
.move-feed{display:flex;flex-direction:column;gap:8px;margin:16px 0}
.move-card{display:flex;align-items:center;gap:12px;background:var(--g2);border:1px solid var(--g5);border-radius:8px;padding:12px 16px;transition:border-color .2s,box-shadow .2s}
.move-card:hover{border-color:var(--g6);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.move-wk{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--t4);text-transform:uppercase;min-width:48px}
.move-body{flex:1;min-width:0}
.move-team{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--t1)}
.move-detail{display:flex;gap:16px;margin-top:4px;flex-wrap:wrap}
.move-add{font-family:var(--fb);font-size:12px;color:var(--grn)}
.move-drop{font-family:var(--fb);font-size:12px;color:var(--red-t)}
.move-type{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:2px;padding:2px 8px;border-radius:3px;text-transform:uppercase}
.move-type.waiver{background:rgba(245,158,11,.12);color:var(--y)}
.move-type.free_agent{background:rgba(59,130,246,.12);color:var(--blu)}
.move-type.commissioner{background:rgba(139,92,246,.12);color:var(--pur)}
/* ═══ GM DASHBOARD ═══ */
.gm-select{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.gm-btn{font-family:var(--fd);font-size:12px;font-weight:700;padding:8px 14px;border-radius:6px;border:1px solid var(--g4);background:var(--g2);color:var(--t3);cursor:pointer;transition:all .2s}
.gm-btn:hover,.gm-btn.active{background:var(--a);color:#000;border-color:var(--a)}
.gm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin:16px 0}
.gm-card{background:var(--g2);border:1px solid var(--g5);border-radius:10px;padding:16px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.gm-card:hover{border-color:var(--g6);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.gm-card-title{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--a);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.gm-stat-row{display:flex;justify-content:space-between;padding:6px 8px;border-bottom:1px solid var(--g3);transition:background .15s,box-shadow .15s;border-radius:3px}
.gm-stat-row:last-child{border-bottom:none}
.gm-stat-row:nth-child(even){background:rgba(255,255,255,.02)}
.gm-stat-row:hover{background:rgba(204,0,0,.04);box-shadow:inset 3px 0 0 var(--a)}
.gm-stat-label{font-family:var(--fb);font-size:12px;color:var(--t3)}
.gm-stat-val{font-family:var(--fm);font-size:13px;font-weight:700;color:var(--t1)}
/* ═══ RIVALS TAB ═══ */
.rival-card{background:var(--g2);border:1px solid var(--g5);border-radius:10px;padding:16px;margin-bottom:12px;transition:border-color .2s,box-shadow .2s}
.rival-card:hover{border-color:var(--g6);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.rival-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rival-vs{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--t1)}
.rival-total{font-family:var(--fm);font-size:12px;color:var(--t4)}
.rival-bar-track{height:28px;background:var(--g3);border-radius:6px;overflow:hidden;display:flex;position:relative}
.rival-bar-a{height:100%;display:flex;align-items:center;justify-content:flex-start;padding-left:8px;font-family:var(--fd);font-size:12px;font-weight:700;color:#fff;transition:width .6s}
.rival-bar-b{height:100%;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-family:var(--fd);font-size:12px;font-weight:700;color:#fff;flex:1}
.rival-badge{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:2px 8px;border-radius:3px}
/* ═══ PLAYOFF BRACKET ═══ */
.bracket-wrap{margin:16px 0}
.bracket-yr-sel{display:flex;gap:4px;margin-bottom:12px}
.bracket-yr-btn{font-family:var(--fd);font-size:12px;font-weight:700;padding:6px 16px;border-radius:4px;border:1px solid var(--g4);background:var(--g2);color:var(--t3);cursor:pointer;transition:all .2s}
.bracket-yr-btn:hover,.bracket-yr-btn.active{background:var(--a);color:#000;border-color:var(--a)}
/* ═══ SUB-TAB BUTTONS ═══ */
.tab-sub{display:flex;gap:6px;flex-wrap:wrap}
.tab-sub-btn{font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:1px;padding:8px 18px;border-radius:6px;border:1px solid var(--g4);background:var(--g2);color:var(--t3);cursor:pointer;transition:all .2s cubic-bezier(.22,1,.36,1);text-transform:uppercase}
.tab-sub-btn:hover:not(.active){border-color:var(--a);color:var(--t1)}
.tab-sub-btn.active{background:var(--a);color:#000;border-color:var(--a);box-shadow:0 0 12px rgba(204,0,0,.25)}
.tab-sub-btn:active{transform:scale(.94)}
.bracket-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:12px 0}
.bracket-slot{background:var(--g2);border:1px solid var(--g4);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.bracket-slot.winner{border-color:var(--y);background:rgba(245,158,11,.06)}
.bracket-slot .b-seed{font-family:var(--fm);font-size:10px;color:var(--t4);min-width:20px}
.bracket-slot .b-name{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--t1);flex:1}
.bracket-slot .b-pts{font-family:var(--fm);font-size:12px;font-weight:700;color:var(--y)}
.bracket-round{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t4);text-align:center;margin-bottom:6px}
/* ═══ RACE CHART ═══ */
.race-canvas{width:100%;height:280px;background:var(--g2);border-radius:8px;border:1px solid var(--g4);margin:16px 0}
/* ═══ COMPARISON TOOL ═══ */
.cmp-wrap{margin:16px 0}
.cmp-selects{display:flex;gap:12px;margin-bottom:16px;align-items:center}
.cmp-sel{font-family:var(--fd);font-size:13px;font-weight:700;padding:8px 12px;border-radius:6px;border:1px solid var(--g4);background:var(--g2);color:var(--t1);cursor:pointer;flex:1;max-width:260px}
.cmp-vs{font-family:var(--fd);font-size:14px;font-weight:800;color:var(--t4);padding:0 4px}
.cmp-grid{display:grid;grid-template-columns:1fr 60px 1fr;gap:8px}
.cmp-row{display:contents}
.cmp-val{font-family:var(--fm);font-size:14px;font-weight:700;padding:8px;border-radius:6px}
.cmp-val.left{text-align:right;background:var(--g2)}
.cmp-val.right{text-align:left;background:var(--g2)}
.cmp-val.better{color:var(--a)}
.cmp-label{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t4);display:flex;align-items:center;justify-content:center;padding:8px 4px}
/* ═══ RADAR CHART ═══ */
.radar-canvas{width:100%;max-width:400px;height:300px;margin:16px auto}
/* ═══ DRAFT BOARD GRID ═══ */
.draft-board{overflow-x:auto;margin:16px 0}
.db-grid{display:grid;gap:3px;min-width:780px}
.db-cell{padding:9px 5px;font-family:var(--fb);font-size:10px;text-align:center;border-radius:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.db-cell.hdr{background:var(--g3);font-family:var(--fd);font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);font-size:10px}
.db-cell .db-name{font-weight:700;color:var(--t1);font-size:13px}
.db-cell .db-pos{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:1px}
/* ═══ MANAGER BADGES ═══ */
.badge-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.mgr-badge{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;white-space:nowrap}
/* ═══ NEW TAB RESPONSIVE ═══ */
@media(max-width:768px){
  .award-grid{grid-template-columns:1fr}
  .gm-grid{grid-template-columns:1fr}
  .bracket-grid{grid-template-columns:1fr}
  .cmp-selects{flex-direction:column}
  .cmp-sel{max-width:100%}
  .cmp-grid{grid-template-columns:1fr 50px 1fr}
  .h2h-grid{font-size:9px}
  .h2h-hdr{font-size:8px;padding:4px 2px}
  .h2h-cell{font-size:9px;padding:4px 1px;min-height:28px}
}
@media(max-width:480px){
  .award-emoji{font-size:36px}
  .award-winner{font-size:18px}
  .move-card{padding:10px 12px}
  .gm-btn{font-size:10px;padding:6px 10px}
  .rival-vs{font-size:14px}
}
/* ═══ ANIMATIONS & TRANSITIONS ═══ */
.panel{display:none;padding-bottom:32px}
.panel.active{display:block}
.panel.wipe-in{animation:wipeIn .4s ease-out}
.stagger>*{opacity:0;transform:translateY(10px);animation:staggerIn .4s ease forwards}
@keyframes staggerIn{to{opacity:1;transform:translateY(0)}}
.stagger>*:nth-child(1){animation-delay:.03s}.stagger>*:nth-child(2){animation-delay:.06s}.stagger>*:nth-child(3){animation-delay:.09s}.stagger>*:nth-child(4){animation-delay:.12s}.stagger>*:nth-child(5){animation-delay:.15s}.stagger>*:nth-child(6){animation-delay:.18s}.stagger>*:nth-child(7){animation-delay:.21s}.stagger>*:nth-child(8){animation-delay:.24s}.stagger>*:nth-child(9){animation-delay:.27s}.stagger>*:nth-child(10){animation-delay:.3s}.stagger>*:nth-child(11){animation-delay:.33s}.stagger>*:nth-child(12){animation-delay:.36s}
.count-up{display:inline-block}
.tilt-card{transition:transform .2s ease;transform-style:preserve-3d}
.tilt-card:hover{transform:perspective(800px) rotateX(2deg) rotateY(-2deg) scale(1.01)}
.hero-parallax{transition:transform .3s ease}
/* ═══ CONSTITUTION ═══ */
.const-section{margin:20px 0;padding:20px;background:var(--g2);border:1px solid var(--g4);border-radius:12px;border-left:3px solid var(--a)}
.const-num{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--a);margin-bottom:8px}
.const-title{font-family:var(--fd);font-size:18px;font-weight:800;color:var(--t1);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.const-body{font-family:var(--fb);font-size:13px;color:var(--t2);line-height:1.7}
.const-body b{color:var(--t1)}
.const-body .const-highlight{color:var(--a);font-weight:700}
.const-list{list-style:none;padding:0;margin:8px 0}
.const-list li{padding:6px 10px;border-bottom:1px solid var(--g3);display:flex;justify-content:space-between;transition:background .15s,box-shadow .15s;border-radius:3px}
.const-list li:last-child{border-bottom:none}
.const-list li:nth-child(even){background:rgba(255,255,255,.02)}
.const-list li:hover{background:rgba(204,0,0,.04);box-shadow:inset 3px 0 0 var(--a)}
.const-list .cl-label{color:var(--t3);font-size:12px}
.const-list .cl-value{font-family:var(--fm);font-weight:700;color:var(--t1);font-size:13px}
/* ═══ WAR ROOM ═══ */
.wr-countdown{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin:16px 0}
.wr-timer{background:var(--g2);border:1px solid var(--g4);border-radius:12px;padding:20px;text-align:center;position:relative;overflow:hidden}
.wr-timer::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.wr-timer.urgent::before{background:var(--red-t);animation:pulse 1.4s infinite}
.wr-timer.soon::before{background:var(--y)}
.wr-timer.future::before{background:var(--a)}
.wr-timer-label{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.wr-timer-val{font-family:var(--fm);font-size:28px;font-weight:800;color:var(--t1);line-height:1}
.wr-timer-unit{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--t4);margin-top:4px;text-transform:uppercase}
.wr-timer-date{font-family:var(--fb);font-size:11px;color:var(--t4);margin-top:8px}
.wr-checklist{margin:16px 0}
.wr-team-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--g2);border:1px solid var(--g4);border-radius:10px;margin-bottom:8px;transition:border-color .2s,background .15s,box-shadow .15s}
.wr-team-row:nth-child(even){background:rgba(255,255,255,.02)}
.wr-team-row:hover{border-color:var(--g5);background:rgba(204,0,0,.04);box-shadow:inset 3px 0 0 var(--a)}
.wr-indicators{display:flex;gap:6px;margin-left:auto;flex-shrink:0}
.wr-ind{width:10px;height:10px;border-radius:50%}
.wr-ind.green{background:var(--grn);box-shadow:0 0 6px rgba(23,177,105,.4)}
.wr-ind.yellow{background:var(--y);box-shadow:0 0 6px rgba(245,158,11,.4)}
.wr-ind.red{background:var(--red-t);box-shadow:0 0 6px rgba(239,68,68,.4)}
/* ═══ PULSE FEED ═══ */
.pulse-card{background:var(--g2);border:1px solid var(--g4);border-radius:12px;padding:16px 20px;margin-bottom:12px;border-left:3px solid var(--a);transition:border-color .2s}
.pulse-card:hover{border-color:var(--a)}
.pulse-card.trade{border-left-color:var(--y)}
.pulse-card.record{border-left-color:var(--red-t)}
.pulse-card.exemption{border-left-color:var(--pur)}
.pulse-card.power{border-left-color:var(--blu)}
.pulse-tag{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:8px}
.pulse-tag.trade{background:rgba(245,158,11,.12);color:var(--y)}
.pulse-tag.record{background:rgba(239,68,68,.12);color:var(--red-t)}
.pulse-tag.exemption{background:rgba(139,92,246,.12);color:var(--pur)}
.pulse-tag.power{background:rgba(59,130,246,.12);color:var(--blu)}
.pulse-tag.draft{background:rgba(204,0,0,.12);color:var(--a)}
.pulse-tag.championship{background:rgba(245,158,11,.18);color:var(--y)}
.pulse-headline{font-family:var(--fd);font-size:18px;font-weight:800;color:var(--t1);line-height:1.2;margin-bottom:6px}
.pulse-body{font-family:var(--fb);font-size:13px;color:var(--t3);line-height:1.5}
.pulse-meta{font-family:var(--fm);font-size:10px;color:var(--t4);margin-top:8px;letter-spacing:1px}
/* ═══ CHRONICLE TIMELINE ═══ */
.chronicle{position:relative;overflow-x:auto;overflow-y:hidden;padding:40px 20px 20px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.chronicle-track{display:flex;gap:0;min-width:max-content;position:relative}
.chronicle-year{scroll-snap-align:start;min-width:300px;padding:0 20px;position:relative}
.chronicle-year-label{font-family:var(--fd);font-size:48px;font-weight:900;color:var(--g4);position:sticky;left:20px;margin-bottom:16px;letter-spacing:-2px}
.chronicle-line{position:absolute;top:80px;left:0;right:0;height:2px;background:var(--g4)}
.chronicle-dot{width:12px;height:12px;border-radius:50%;position:absolute;top:75px;z-index:2;cursor:pointer;transition:transform .2s}
.chronicle-dot:hover{transform:scale(1.5)}
.chronicle-dot.champ{background:var(--y);box-shadow:0 0 12px rgba(245,158,11,.5)}
.chronicle-dot.trade{background:var(--a);box-shadow:0 0 8px rgba(204,0,0,.4)}
.chronicle-dot.record{background:var(--red-t);box-shadow:0 0 8px rgba(239,68,68,.4)}
.chronicle-dot.exemption{background:var(--pur);box-shadow:0 0 8px rgba(139,92,246,.4)}
.chronicle-event{background:var(--g2);border:1px solid var(--g4);border-radius:10px;padding:12px 16px;margin-top:100px;margin-bottom:12px;width:260px;transition:border-color .2s,transform .2s}
.chronicle-event:hover{border-color:var(--g5);transform:translateY(-2px)}
.chronicle-event-icon{font-size:24px;margin-bottom:6px}
.chronicle-event-title{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--t1);margin-bottom:4px}
.chronicle-event-body{font-family:var(--fb);font-size:11px;color:var(--t3);line-height:1.4}
.chronicle-event-date{font-family:var(--fm);font-size:9px;color:var(--t4);margin-top:6px;letter-spacing:1px}
.chronicle-nav{display:flex;gap:6px;margin:12px 0;flex-wrap:wrap}
/* ═══ TRADE GRADES ═══ */
.trade-grade{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;font-family:var(--fd);font-size:16px;font-weight:800;flex-shrink:0}
.trade-grade.a{background:rgba(23,177,105,.15);color:var(--grn)}
.trade-grade.b{background:rgba(59,130,246,.15);color:var(--blu)}
.trade-grade.c{background:rgba(245,158,11,.15);color:var(--y)}
.trade-grade.d{background:rgba(239,68,68,.15);color:var(--red-t)}
.trade-grade.f{background:rgba(239,68,68,.25);color:var(--red-t)}
.trade-ktc{font-family:var(--fm);font-size:11px;font-weight:700}
.trade-ktc.pos{color:var(--grn)}
.trade-ktc.neg{color:var(--red-t)}
/* ═══ SCOUTING REPORTS ═══ */
.scout-card{background:var(--g2);border:1px solid var(--g4);border-radius:12px;padding:20px;margin-top:16px}
.scout-narrative{font-family:var(--fb);font-size:14px;color:var(--t2);line-height:1.7;padding:16px;background:var(--g3);border-radius:8px;border-left:3px solid var(--a);margin:12px 0;font-style:italic}
.scout-grades{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:12px 0}
.scout-grade{text-align:center;padding:12px;background:var(--g3);border-radius:8px}
.scout-grade-val{font-family:var(--fd);font-size:24px;font-weight:800}
.scout-grade-label{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-top:4px}
/* ═══ SHARE CARDS ═══ */
.share-btn{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:6px 12px;border-radius:4px;border:1px solid var(--g4);background:var(--g2);color:var(--t3);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.share-btn:hover{border-color:var(--a);color:var(--a);background:rgba(204,0,0,.08)}
.share-modal{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.share-modal.open{opacity:1;pointer-events:auto}
.share-preview{background:var(--g1);border:1px solid var(--g4);border-radius:16px;padding:24px;max-width:500px;width:90%;position:relative}
.share-watermark{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t4);text-align:center;margin-top:16px;padding-top:12px;border-top:1px solid var(--g4)}

/* ═══ CUSTOM SCROLLBAR ═══ */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--g1)}
::-webkit-scrollbar-thumb{background:var(--g5);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--a)}

/* ═══ SECTION SPACING ═══ */
.panel > .bh{margin-top:32px}
.panel > .bh:first-child{margin-top:20px}

/* ═══ CONTRACT BAR UPGRADE ═══ */
.contract-bar,.cb-fill,.kb-fill,.cb-track{min-width:40px}

/* ═══ EMPTY STATE STYLING ═══ */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;color:var(--t4);text-align:center}
.empty-state-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-state-text{font-family:var(--fd);font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4)}

/* ═══ STAT STRIP CHAMPION GOLD BORDER ═══ */
.ss.champ{border-left:2px solid rgba(245,158,11,.4);border-right:2px solid rgba(245,158,11,.4)}
.ss.champ .ss-l{color:var(--y)}

/* ═══ MICRO-POLISH ═══ */
.mu-card:hover{border-color:var(--g6);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.sc-card:hover{border-color:var(--g6);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.trophy-card:hover{border-color:rgba(245,158,11,.3);box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 0 1px rgba(245,158,11,.15)}
/* ═══ BATCH 2-7 ADDITIONS ═══ */
/* Item 10: 2-col trade grid */
.trade-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:16px;align-items:start}
@media(max-width:900px){.trade-grid{grid-template-columns:1fr;gap:12px}}
.trade-grid .trade-card{margin-bottom:0}
/* Item 12: Winner emphasis */
.mu-crown{display:block;font-size:18px;filter:drop-shadow(0 2px 8px rgba(255,204,0,.4));margin-bottom:2px;text-align:center}
.mu-sc.win{font-size:40px;font-weight:900;text-shadow:0 0 20px rgba(23,177,105,.25)}
.mu-sc.lose{font-size:24px;font-weight:700;opacity:.7}
/* Item 15: Nav scroll indicators */
.nav-bar{position:relative}
.nav-bar::before{content:'';position:absolute;top:0;left:0;bottom:0;width:32px;background:linear-gradient(90deg,var(--g2),transparent);pointer-events:none;z-index:2;opacity:0;transition:opacity .2s}
.nav-bar.scrolled-right::before{opacity:1}
.nav-bar.scrolled-end::after{opacity:0}
.nav-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:28px;height:28px;border-radius:50%;background:var(--g3);border:1px solid var(--g5);color:var(--t3);font-size:12px;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .2s;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.nav-arrow.left{left:4px}
.nav-arrow.right{right:4px}
.nav-bar.scrolled-right .nav-arrow.left{opacity:.8;pointer-events:auto}
.nav-bar:not(.scrolled-end) .nav-arrow.right{opacity:.8;pointer-events:auto}
@media(max-width:480px){.nav-arrow{display:none}}
/* Item 9: H2H rotated column headers */
.h2h-hdr.rot{writing-mode:horizontal-tb;transform:none;height:auto;text-align:center;justify-content:center;color:var(--t2);font-size:9px;letter-spacing:1.5px;padding:10px 3px}
.h2h-matrix{padding-top:0}
/* Item 14: Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 24px;min-height:200px}
.empty-state-icon{font-size:48px;opacity:.4;margin-bottom:16px;animation:emptyFloat 3s ease-in-out infinite}
@keyframes emptyFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.empty-state-text{font-family:var(--fd);font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t4)}
.empty-state-sub{font-family:var(--fb);font-size:12px;color:var(--t4);opacity:.6;margin-top:4px}
/* Item 16: Dynasty tier tags */
.dtier{display:inline-block;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle}
.dtier-elite{background:rgba(204,0,0,.10);color:#cc0000}
.dtier-star{background:rgba(245,158,11,.10);color:#ffcc00}
.dtier-starter{background:rgba(59,130,246,.10);color:#3b82f6}
.dtier-depth{background:rgba(255,255,255,.04);color:#999}
.dtier-dart{background:rgba(255,255,255,.02);color:#666}
/* Item 1: Contract pills */
.cpill{display:inline-flex;align-items:center;gap:2px;height:16px;border-radius:4px;padding:0 5px;font-family:var(--fm);font-size:9px;font-weight:700;letter-spacing:.5px;margin-left:4px;vertical-align:middle}
.cpill-4{background:rgba(23,177,105,.12);color:#17b169}
.cpill-23{background:rgba(245,158,11,.12);color:#ffcc00}
.cpill-1{background:rgba(239,68,68,.12);color:#ff4444}
.cpill-0{background:rgba(239,68,68,.20);color:#ff4444;animation:pulse 1.4s infinite}
/* Item 18: Dynasty scatter */
.dynasty-scatter{width:100%;height:320px;border-radius:12px;border:1px solid var(--g4);background:var(--g2);display:block;margin:16px 0}
/* Item 19: Manager cards */
.mgr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
@media(max-width:900px){.mgr-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.mgr-grid{grid-template-columns:1fr}}
.mgr-card{background:var(--g2);border:1px solid var(--g5);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s}
.mgr-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.mgr-hdr{padding:16px;display:flex;align-items:center;gap:12px;position:relative;border-bottom:2px solid var(--g5)}
.mgr-arch{position:absolute;top:10px;right:10px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px}
.mgr-name{font-family:var(--fd);font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;line-height:1}
.mgr-sub{font-family:var(--fm);font-size:10px;color:var(--t3);margin-top:2px}
.mgr-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--g5)}
.mgr-stat{padding:8px 6px;text-align:center;background:var(--g2)}
.mgr-sv{font-family:var(--fd);font-size:16px;font-weight:800;font-variant-numeric:tabular-nums}
.mgr-sl{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-top:2px}
.mgr-badges{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px}
.mgr-sel{border-width:2px!important}
/* ═══ PADDING NORMALIZATION — Standard: 16px 20px | Compact: 12px 16px | Headers: 12px 20px ═══ */
.trade-side{padding:16px 20px}
.trade-hdr{padding:12px 20px}
.mu-top{padding:12px 20px}
.sc-card{padding:16px 20px}
.pk-card{padding:16px 20px}
.narrative{padding:16px 20px}
.trophy-card{padding:16px 20px}
.const-section{padding:16px 20px}
.wr-timer{padding:16px 20px}
.luck-hdr{padding:0 0 8px}
@media(max-width:600px){
  .trade-side{padding:12px 14px}
  .sc-card,.pk-card,.narrative,.trophy-card,.const-section,.wr-timer{padding:12px 14px}
}

      res.innerHTML=ch;
    }
    selA.addEventListener('change',updateCmp);
    selB.addEventListener('change',updateCmp);
    updateCmp();
  },150);

function calcBadges(teamName){
  const badges=[];
  const act=D.activity[teamName];
  if(!act)return badges;
  const total=act.trades+act.moves+act.draft_picks;
  if(act.trades>=5)badges.push({label:'Wheeler-Dealer',bg:'rgba(204,0,0,.12)',color:'var(--a)'});
  if(total<=8)badges.push({label:'Ghost',bg:'rgba(102,102,120,.15)',color:'var(--t4)'});
  if(act.draft_picks>=18)badges.push({label:'Draft Hoarder',bg:'rgba(139,92,246,.12)',color:'var(--pur)'});
  const team=D.teams.find(x=>x.team_name===teamName);
  if(team){
    const ages=team.players.filter(p=>p.age&&p.pos!=='DEF').map(p=>p.age);
    const avg=ages.length?ages.reduce((a,b)=>a+b,0)/ages.length:27;
    if(avg<=25)badges.push({label:'Dynasty Builder',bg:'rgba(59,130,246,.12)',color:'var(--blu)'});
    if(avg>=28.5)badges.push({label:'Win Now',bg:'rgba(245,158,11,.12)',color:'var(--y)'});
  }
  const s=D.standings_2025.find(x=>x.team_name===teamName);
  if(s&&s.fpts>=D.standings_2025.sort((a,b)=>b.fpts-a.fpts)[0].fpts)badges.push({label:'Point Machine',bg:'rgba(204,0,0,.12)',color:'var(--a)'});
  if(D.champions.some(c=>c.champion===teamName))badges.push({label:'Champion',bg:'rgba(245,158,11,.12)',color:'var(--y)'});
  const luck=Object.values(D.luck||{}).find(l=>l.team_name===teamName);
  if(luck&&luck.luck>=7)badges.push({label:'Lucky Charm',bg:'rgba(204,0,0,.12)',color:'var(--a)'});
  if(luck&&luck.luck<=2)badges.push({label:'Snake Bitten',bg:'rgba(239,68,68,.12)',color:'var(--red-t)'});
  return badges;
}

// ═══ TRADES ═══
function renderTrades(){
  const trades=D.unified_trades||[];
  let h='<div class="bh"><div class="bh-tag">Trades</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">'+trades.length+' Trades \u2022 Complete History</span></div></div>';
