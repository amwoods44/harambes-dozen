  if(D.most_traded&&D.most_traded.length){
    h+='<div class="nar-item"><div class="nar-icon">\u{1F504}</div><div class="nar-text">Hot commodities: ';
    D.most_traded.filter(function(m){return m.count>=2}).forEach(function(m,i){h+=(i?', ':'')+'<b>'+m.name+'</b> ('+m.count+'x)'});
    h+='</div></div>';
  }
  if(D.retention_2025){
    h+='<div class="nar-item"><div class="nar-icon">\u{1F4CA}</div><div class="nar-text">Draft retention: <b>'+D.retention_2025.rostered+'/'+D.retention_2025.total+'</b> of the 2025 class still rostered ('+Math.round(D.retention_2025.rostered/D.retention_2025.total*100)+'%)'+(D.retention_2024?'. 2024 class: <b>'+D.retention_2024.rostered+'/'+D.retention_2024.total+'</b> ('+Math.round(D.retention_2024.rostered/D.retention_2024.total*100)+'%)':'')+'.</div></div>';
  }
  h+='</div>';
  // Trade grade helpers
  function ktcVal(players,picks){
    var total=0;
    players.forEach(function(p){var c=D.contracts&&D.contracts[p.nm];if(c&&c.ktc)total+=c.ktc;});
    picks.forEach(function(pk){var r=pk.match(/Rd(\d)/);var rd=r?parseInt(r[1]):3;total+=(rd===1?5000:rd===2?2000:500);});
    return total;
  }
  function gradeLabel(net){return net>3000?'A+':net>1500?'A':net>500?'B':net>-500?'C':net>-1500?'D':'F';}
  function gradeCls(net){return net>500?'a':net>-500?'b':net>-1500?'c':'d';}
  // KTC record per manager
  var ktcRecord={};
  trades.forEach(function(t){
    if(t.sides.length<2)return;
    var a=t.sides[0],b=t.sides[1];
    var aKtc=ktcVal(a.players,a.picks),bKtc=ktcVal(b.players,b.picks);
    var aNet=aKtc-bKtc,bNet=bKtc-aKtc;
    ktcRecord[a.name]=(ktcRecord[a.name]||0)+aNet;
    ktcRecord[b.name]=(ktcRecord[b.name]||0)+bNet;
  });
  // Trade grade leaderboard
  h+='<div class="bh" style="margin-top:4px"><div class="bh-tag">Trade Record</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Net KTC Value Won/Lost Across All Trades</span></div></div>';
  var krArr=Object.entries(ktcRecord).sort(function(a,b){return b[1]-a[1]});
  var maxKR=Math.max.apply(null,krArr.map(function(x){return Math.abs(x[1])}));
  krArr.forEach(function(entry){
    var nm=entry[0],net=entry[1];
    var col=net>0?'var(--grn)':net<0?'var(--red-t)':'var(--t4)';
    var pct=maxKR>0?(Math.abs(net)/maxKR*100):0;
    var teamObj=D.teams.find(function(t){return t.team_name===nm});
    var gl=gradeLabel(net),gc=gradeCls(net);
    h+='<div class="h-row" style="gap:8px">';
    if(teamObj)h+=av(teamObj.roster_id,28);
    h+='<span class="trade-grade '+gc+'" style="margin-right:4px">'+gl+'</span>';
    h+='<span class="h-team" style="flex:1">'+nm+'</span>';
    h+='<div style="flex:1;height:12px;background:var(--g3);border-radius:6px;overflow:hidden;max-width:220px"><div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:6px"></div></div>';
    h+='<span style="font-family:var(--fm);font-size:12px;font-weight:700;color:'+col+';min-width:64px;text-align:right">'+(net>0?'+':'')+net.toLocaleString()+'</span>';
    h+='</div>';
  });
  // Unified trade cards — 2-column grid
  h+='<div class="trade-grid">';
  trades.forEach(function(t,ti){
    const a=t.sides[0],b=t.sides[1];
    const aKtc=ktcVal(a.players,a.picks),bKtc=ktcVal(b.players,b.picks);
    const aNet=aKtc-bKtc,bNet=bKtc-aKtc;
    const aGrade=gradeLabel(aNet),bGrade=gradeLabel(bNet);
    const aGradeCls=gradeCls(aNet),bGradeCls=gradeCls(bNet);
    h+='<div class="trade-card tilt-card">';

    // Header
    h+='<div class="trade-hdr">';
    h+='<span class="trade-hdr-yr">'+t.yr+' \u2022 Wk '+t.wk+'</span>';
    h+='<span style="display:flex;align-items:center;gap:6px"><button class="share-btn trade-share-btn" data-ti="'+ti+'" style="padding:3px 8px">\u{1F4F1} SHARE</button>';
    h+='<span class="trade-hdr-num">#'+(ti+1)+'</span></span></div>';
    
    // Two-column trade view
    h+='<div class="trade-body">';
    
    // Side A
    h+='<div class="trade-side">';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><div class="trade-team">'+a.name+'</div><div class="trade-grade '+aGradeCls+'" title="Trade grade: '+aGrade+'">'+aGrade+'</div></div>';
    h+='<div style="font-family:var(--fm);font-size:10px;margin-bottom:6px" class="trade-ktc '+(aNet>=0?'pos':'neg')+'">'+(aNet>0?'+':'')+aKtc+' KTC</div>';
    h+='<div class="trade-label">RECEIVES</div>';
    a.players.forEach(function(p){
      h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'+pimg(p.id,28)+'<span style="font-family:var(--fb);font-size:12px;font-weight:600;color:var(--t1)">'+p.nm+'</span></div>';
    });
    a.picks.forEach(function(pk){
      const resolved=pk.indexOf('\u2192')>-1;
      const col=resolved?'var(--y)':'var(--t3)';
      h+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:3px"><span style="font-size:12px">\u{1F4E6}</span><span style="font-family:var(--fm);font-size:11px;font-weight:600;color:'+col+'">'+pk+'</span></div>';
    });
    if(!a.players.length&&!a.picks.length)h+='<span style="font-family:var(--fb);font-size:11px;color:var(--t4)">Nothing</span>';
    h+='</div>';
    
    // VS divider
    h+='<div class="trade-divider"><span class="trade-divider-icon">\u{1F504}</span></div>';
    
    // Side B
    h+='<div class="trade-side">';

      h+='<span style="font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:rgba(139,92,246,.15);color:var(--pur)">EXEMPTION</span>';
      h+='<span style="font-family:var(--fb);font-size:12px;color:var(--pur);font-weight:600">'+t.exm.year+' Exemption: <span style="color:var(--t1)">'+t.exm.from+'</span> \u2192 <span style="color:var(--t1)">'+t.exm.to+'</span></span>';

  h+='</div>'; // .trade-grid

    h+='<div class="bh" style="margin-top:20px"><div class="bh-tag">Rivalries</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Head-to-Head Records (2025)</span></div></div>';
    D.rivalries.filter(function(r){return r.total>=2}).forEach(function(r){
      const aName=tn(r.a),bName=tn(r.b);
      const aW=r.a_wins,bW=r.b_wins;
      h+='<div class="h-row" style="gap:10px"><span style="flex:1;font-family:var(--fd);font-size:12px;font-weight:700;color:'+(aW>bW?'var(--a)':'var(--t2)')+'">'+aName+'</span>';
      h+='<span style="font-family:var(--fd);font-size:14px;font-weight:800;color:var(--y);min-width:40px;text-align:center;font-variant-numeric:tabular-nums">'+aW+'-'+bW+'</span>';
      h+='<span style="flex:1;text-align:right;font-family:var(--fd);font-size:12px;font-weight:700;color:'+(bW>aW?'var(--a)':'var(--t2)')+'">'+bName+'</span></div>';
    });
  }
  // Pick capital
  h+='<div class="bh" style="margin-top:20px"><div class="bh-tag">Capital</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Net Draft Pick Balance</span></div></div>';
  const cap={};
  D.pick_trades.forEach(function(p){
    cap[p.current_owner]=cap[p.current_owner]||{g:0,l:0};cap[p.current_owner].g++;
    if(p.original_owner!==p.current_owner){cap[p.original_owner]=cap[p.original_owner]||{g:0,l:0};cap[p.original_owner].l++;}
  });
  Object.entries(cap).sort(function(a,b){return(b[1].g-b[1].l)-(a[1].g-a[1].l)}).forEach(function([nm,c]){
    const net=c.g-c.l;const col=net>0?'var(--a)':net<0?'var(--red-t)':'var(--t4)';
    h+='<div class="h-row"><span class="h-team">'+nm+'</span><span style="font-family:var(--fd);font-size:20px;font-weight:800;color:'+col+';min-width:40px;text-align:right;font-variant-numeric:tabular-nums">'+(net>0?'+':'')+net+'</span></div>';
  });
  // ── CAPITAL INVENTORY GRID ──
  if(D.pick_trades&&D.pick_trades.length){
    h+='<div class="bh" style="margin-top:24px"><div class="bh-tag">Capital Grid</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Future Pick Inventory \u2022 Who Owns What</span></div></div>';
    const seasons=[...new Set(D.pick_trades.map(function(p){return p.season}))].sort();
    const rounds=[...new Set(D.pick_trades.map(function(p){return p.round}))].sort();
    const teamNames=[...new Set(D.pick_trades.map(function(p){return p.current_owner}))];
    h+='<div style="overflow-x:auto"><table class="ap-table"><thead><tr><th>Team</th>';
    seasons.forEach(function(s){rounds.forEach(function(r){h+='<th>'+s+' Rd'+r+'</th>'})});
    h+='<th>Net</th></tr></thead><tbody>';
    teamNames.forEach(function(nm){
      h+='<tr><td style="font-weight:700">'+nm.substring(0,14)+'</td>';
      let net=0;
      seasons.forEach(function(s){
        rounds.forEach(function(r){
          const pick=D.pick_trades.find(function(p){return p.current_owner===nm&&p.season===s&&p.round===r});
          if(pick){
            const isOwn=pick.original_owner===nm;
            h+='<td style="color:'+(isOwn?'var(--a)':'var(--blu)');h+='">'+(!isOwn?'via '+pick.original_owner.substring(0,6):'OWN')+'</td>';
            if(!isOwn)net++;
          }else{
            const lost=D.pick_trades.find(function(p){return p.original_owner===nm&&p.current_owner!==nm&&p.season===s&&p.round===r});
            if(lost){h+='<td style="color:var(--red-t)">TRADED</td>';net--;}
            else{h+='<td style="color:var(--t4)">\u2014</td>';}
          }
        });
      });
      const nCol=net>0?'var(--a)':net<0?'var(--red-t)':'var(--t4)';
      h+='<td style="font-family:var(--fm);font-weight:700;color:'+nCol+'">'+(net>0?'+':'')+net+'</td></tr>';
    });
    h+='</tbody></table></div>';
  }
  // ── TRADE PARTNER MATRIX ──
  h+='<div class="bh" style="margin-top:24px"><div class="bh-tag">Trade Partners</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Who Trades With Who</span></div></div>';
  const tpMap={};
  (D.unified_trades||[]).forEach(function(tr){
    if(tr.sides.length===2){
      const a=tr.sides[0].team,b=tr.sides[1].team;
      const key=[a,b].sort().join('|');
      tpMap[key]=(tpMap[key]||0)+1;
    }
  });
  const tpArr=Object.entries(tpMap).sort(function(a,b){return b[1]-a[1]});
  if(tpArr.length){
    const maxTP=tpArr[0][1];
    tpArr.forEach(function([pair,count]){
      const [a,b]=pair.split('|');
      const pct=(count/maxTP*100).toFixed(0);
      h+='<div class="h-row" style="gap:8px"><span style="font-family:var(--fd);font-size:12px;font-weight:700;color:var(--t1);min-width:200px">'+a.substring(0,14)+' \u2194 '+b.substring(0,14)+'</span><div style="flex:1;height:10px;background:var(--g3);border-radius:5px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--a);border-radius:5px"></div></div><span style="font-family:var(--fm);font-size:12px;font-weight:700;color:var(--a)">'+count+'</span></div>';
    });
  }
  document.getElementById('tab-trades').innerHTML=h;
  setTimeout(function(){
    document.querySelectorAll('.trade-share-btn').forEach(function(btn){
      btn.onclick=function(){
        var ti=parseInt(btn.getAttribute('data-ti'));
        var tr=trades[ti];if(!tr||tr.sides.length<2)return;
        var a=tr.sides[0],b=tr.sides[1];
        var aAssets=a.players.map(function(p){return p.nm}).concat(a.picks).join(', ')||'Nothing';
        var bAssets=b.players.map(function(p){return p.nm}).concat(b.picks).join(', ')||'Nothing';
        var aK=ktcVal(a.players,a.picks),bK=ktcVal(b.players,b.picks);
        showShareCard('Trade #'+(ti+1)+' \u2022 '+tr.yr+' Wk '+tr.wk,
          '<div style="font-family:var(--fd)">'+
          '<div style="padding:8px 0;border-bottom:1px solid #24242e"><b style="color:#fff">'+a.name+'</b> receives: <span style="color:#10B981">'+aAssets+'</span> | Grade: <b>'+gradeLabel(aK-bK)+'</b></div>'+
          '<div style="padding:8px 0"><b style="color:#fff">'+b.name+'</b> receives: <span style="color:#10B981">'+bAssets+'</span> | Grade: <b>'+gradeLabel(bK-aK)+'</b></div>'+
          '</div>');
      };
    });
  },50);
}

// ═══ DRAFT ═══
function renderDraft(){
  let h='<div class="bh"><div class="bh-tag">Draft</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Rookie Draft History</span></div></div>';
  h+='<div class="tab-sub" style="display:flex;gap:4px;margin-bottom:12px">';
  ['2025','2024'].forEach(yr=>{
    h+='<button class="tab-sub-btn'+(selDraft===yr?' active':'')+'" onclick="selDraft=\''+yr+'\';renderDraft()">'+yr+' Draft</button>';
  });
  h+='</div>';
  const picks=D.draft_picks[selDraft]||[];
  if(!picks.length){h+='<div style="text-align:center;padding:40px;color:var(--t4)">No draft data</div>';document.getElementById('tab-draft').innerHTML=h;return;}
  // ── DRAFT BOARD GRID ──
  const maxRd=Math.max(...picks.map(p=>p.rd));
  const posColors={'QB':'var(--red-t)','RB':'var(--a)','WR':'var(--blu)','TE':'var(--y)','DEF':'var(--pur)'};
  h+='<div style="display:flex;gap:10px;margin:12px 0;flex-wrap:wrap"><span style="font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px"><span style="color:var(--red-t)">\u25CF</span> QB</span><span style="font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px"><span style="color:var(--a)">\u25CF</span> RB</span><span style="font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px"><span style="color:var(--blu)">\u25CF</span> WR</span><span style="font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px"><span style="color:var(--y)">\u25CF</span> TE</span></div>';
  h+='<div class="draft-board"><div class="db-grid" style="grid-template-columns:72px repeat(12,1fr)">';
  // Header: pick numbers 1-12
  h+='<div class="db-cell hdr">Round</div>';
  for(let i=1;i<=12;i++){h+='<div class="db-cell hdr">Pick '+i+'</div>';}
  for(let rd=1;rd<=maxRd;rd++){
    h+='<div class="db-cell hdr">Rd '+rd+'</div>';
    const rdPicks=picks.filter(p=>p.rd===rd).sort((a,b)=>a.pk-b.pk);
    for(let slot=0;slot<12;slot++){
      const p=rdPicks[slot];
      if(!p){h+='<div class="db-cell" style="background:var(--g2)"></div>';continue;}
      const bg=posColors[p.pos]||'var(--g5)';
      const hit=D.draft_hits&&D.draft_hits[selDraft]?D.draft_hits[selDraft].find(x=>x.pid===p.pid):null;
      var statusBorder=hit?(hit.status==="starter"?"border:2px solid var(--a)":hit.status==="cut"?"border:2px solid var(--red-t)":""):"";
      var rgbMap={"var(--red-t)":"239,68,68","var(--a)":"16,185,129","var(--blu)":"59,130,246","var(--y)":"245,158,11"};
      var rgb=rgbMap[bg]||"139,92,246";
      h+='<div class="db-cell" style="background:rgba('+rgb+',.15);'+statusBorder+'">';
      h+='<div class="db-name">'+p.nm.split(' ').pop()+'</div>';
      h+='<div class="db-pos" style="color:'+bg+'">'+p.pos+' \u00b7 '+tn(p.rid).substring(0,12)+'</div>';
      h+='</div>';
    }
  }
  h+='</div></div>';
  // ── TRADITIONAL LIST ──
  h+='<div class="bh" style="margin-top:20px"><div class="bh-tag">Pick List</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Detailed View</span></div></div>';
  let curRd=0;
  picks.forEach(p=>{
    if(p.rd!==curRd){curRd=p.rd;h+='<div style="font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:3px;color:var(--a);text-transform:uppercase;margin:16px 0 6px;padding-left:4px;border-left:3px solid var(--a);padding-left:10px">Round '+curRd+'</div>';}
    h+='<div class="pl-row" style="gap:10px">'+pimg(p.pid,36)+'<span style="font-family:var(--fd);font-size:12px;font-weight:800;color:var(--y);min-width:32px;font-variant-numeric:tabular-nums">'+curRd+'.'+String((p.pk-1)%12+1).padStart(2,'0')+'</span><span class="pl-pos pos-'+p.pos+'">'+p.pos+'</span><span class="pl-name" style="font-weight:700">'+p.nm+'</span><span class="pl-nfl">'+p.tm+'</span><span style="font-family:var(--fd);font-size:11px;color:var(--t4)">'+tn(p.rid)+'</span></div>';
  });
  // ── MEMORY LANE ──
  h+='<div class="bh" style="margin-top:24px"><div class="bh-tag">\u{1F4F8} Memory Lane</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">'+selDraft+' Class Results \u2022 Hit Rate Analysis</span></div></div>';
  var hits=D.draft_hits&&D.draft_hits[selDraft]?D.draft_hits[selDraft]:[];
  var hitMap={};
  hits.forEach(function(h2){hitMap[h2.pid]=h2;});
  // Per-team hit rate
  var teamHits={};
  picks.forEach(function(p){
    var nm=tn(p.rid);
    teamHits[nm]=teamHits[nm]||{starters:0,total:0};
    teamHits[nm].total++;
    var hit=hitMap[p.pid];
    if(hit&&hit.status==='starter')teamHits[nm].starters++;
  });
  h+='<div style="display:flex;flex-wrap:wrap;gap:8px;margin:12px 0">';
  Object.entries(teamHits).forEach(function(entry){
    var nm=entry[0],data=entry[1];
    var pct=data.total>0?Math.round(data.starters/data.total*100):0;
    var col=pct>=50?'var(--a)':pct>=25?'var(--y)':'var(--red-t)';
    h+='<div style="padding:8px 12px;background:var(--g2);border:1px solid var(--g4);border-radius:8px;font-family:var(--fd);font-size:11px">';
    h+='<div style="font-weight:700;color:var(--t1);margin-bottom:2px">'+nm.substring(0,14)+'</div>';
    h+='<div style="color:'+col+';font-size:10px">'+data.starters+'/'+data.total+' starters ('+pct+'%)</div>';
    h+='</div>';
  });
  h+='</div>';
  // Best steal and biggest bust
  var starters=hits.filter(function(h2){return h2.status==='starter';}).sort(function(a,b){return b.rd-a.rd||b.pk-a.pk;});
  var cuts=hits.filter(function(h2){return h2.status==='cut';});
  if(starters.length){
    var steal=starters[0];

function renderAge(){

  h+='<div style="display:flex;gap:10px;margin:12px 0"><span class="dbadge up">\u226424 Young</span><span class="dbadge" style="background:rgba(245,158,11,.12);color:var(--y)">25-28 Prime</span><span class="dbadge dn">29+ Vet</span></div>';
  const ageData=D.teams.map(t=>{
    const ps=t.players.filter(p=>p.age&&p.pos!=='DEF');const ages=ps.map(p=>p.age);
    const avg=ages.length?ages.reduce((a,b)=>a+b,0)/ages.length:0;
    const y=ages.filter(a=>a<=24).length,p=ages.filter(a=>a>=25&&a<=28).length,v=ages.filter(a=>a>=29).length,tot=ages.length||1;
    return{name:t.team_name,avg:Math.round(avg*10)/10,yP:(y/tot*100).toFixed(0),pP:(p/tot*100).toFixed(0),vP:(v/tot*100).toFixed(0)};
  }).sort((a,b)=>a.avg-b.avg);

    h+='<div class="age-row"><span class="age-name">'+t.name+'</span><div class="age-track"><div class="age-seg age-y" style="width:'+t.yP+'%"></div><div class="age-seg age-p" style="width:'+t.pP+'%"></div><div class="age-seg age-v" style="width:'+t.vP+'%"></div></div><span class="age-avg" style="color:'+col+'">'+t.avg+'</span></div>';
  });

  h+='<div class="bh" style="margin-top:20px"><div class="bh-tag">Dynasty Scatter</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Age vs Power \u2022 Where Every Team Sits</span></div></div>';
  h+='<canvas class="dynasty-scatter" id="dynasty-scatter"></canvas>';
  h+='<div class="bh" style="margin-top:20px"><div class="bh-tag">Windows</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Championship Window</span></div></div>';
  ageData.forEach(t=>{
    const w=t.avg<=25?['\u{1F7E2} Wide Open','var(--a)']:t.avg<=26.5?['\u{1F535} Building','var(--blu)']:t.avg<=27.5?['\u{1F7E1} Win Now','var(--y)']:['\u{1F534} Closing','var(--red-t)'];
    h+='<div class="h-row"><span class="h-team">'+t.name+'</span><span style="font-family:var(--fd);font-size:12px;font-weight:700;color:'+w[1]+'">'+w[0]+'</span></div>';
  });
  document.getElementById('tab-age').innerHTML=h;
  // Draw dynasty scatter
  setTimeout(function(){
    const canvas=document.getElementById('dynasty-scatter');if(!canvas)return;
    const ctx=canvas.getContext('2d');
    canvas.width=canvas.offsetWidth||600;canvas.height=320;
    const w=canvas.width,ht=320,pad={l:50,r:24,t:28,b:40};
    // Gather age+power data
    const teams=D.teams.map(function(t){
      const ps=t.players.filter(function(p){return p.age&&p.pos!=='DEF'});
      const ages=ps.map(function(p){return p.age});
      const avg=ages.length?ages.reduce(function(a,b){return a+b},0)/ages.length:27;
      const s25=D.standings_2025.find(function(s){return s.roster_id===t.roster_id})||{wins:0,losses:0,fpts:0};
      const wPct=s25.wins/(s25.wins+s25.losses)||0;
      const maxP=Math.max.apply(null,D.standings_2025.map(function(s){return s.fpts}));
      const pPct=s25.fpts/maxP;
      const youth=1-(avg-22)/12;
      const acq=D.pick_trades.filter(function(p){return p.current_owner_roster_id===t.roster_id}).length;
      const pw=Math.round((wPct*40+pPct*30+youth*20+Math.min((2+acq)/4,1)*10)*10)/10;
      return{name:t.team_name.split(' ').pop(),age:Math.round(avg*10)/10,pw:pw,rid:t.roster_id};
    });
    const ages=teams.map(function(t){return t.age});
    const pws=teams.map(function(t){return t.pw});
    const minAge=Math.floor(Math.min.apply(null,ages))-1,maxAge=Math.ceil(Math.max.apply(null,ages))+1;
    const minPw=0,maxPw=Math.ceil(Math.max.apply(null,pws)/10)*10+5;
    const medAge=(Math.min.apply(null,ages)+Math.max.apply(null,ages))/2;
    const medPw=(Math.min.apply(null,pws)+Math.max.apply(null,pws))/2;
    const sx=function(a){return pad.l+(a-minAge)/(maxAge-minAge)*(w-pad.l-pad.r);};
    const sy=function(p){return ht-pad.b-(p-minPw)/(maxPw-minPw)*(ht-pad.t-pad.b);};
    const mx=sx(medAge),my=sy(medPw);
    // Quadrant fills
    var qd=[[0,0,mx-pad.l,my-pad.t,'DYNASTY GOLD','rgba(23,177,105,.06)'],[mx-pad.l,0,w-pad.r-mx,my-pad.t,'WIN NOW','rgba(255,204,0,.04)'],[0,my-pad.t,mx-pad.l,ht-pad.b-my,'REBUILDING','rgba(59,130,246,.04)'],[mx-pad.l,my-pad.t,w-pad.r-mx,ht-pad.b-my,'DANGER ZONE','rgba(255,68,68,.04)']];
    var qlabels=[['rgba(23,177,105,.4)',pad.l+4,pad.t+12],['rgba(255,204,0,.4)',mx+6,pad.t+12],['rgba(59,130,246,.4)',pad.l+4,my+16],['rgba(255,68,68,.4)',mx+6,my+16]];
    qd.forEach(function(q,i){ctx.fillStyle=q[5];ctx.fillRect(pad.l+q[0],pad.t+q[1],q[2],q[3]);ctx.fillStyle=qlabels[i][0];ctx.font='700 9px Oswald';ctx.letterSpacing='2px';ctx.textAlign='left';ctx.fillText(q[4],qlabels[i][1],qlabels[i][2]);});
    // Divider lines
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.setLineDash([4,4]);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(mx,pad.t);ctx.lineTo(mx,ht-pad.b);ctx.stroke();
    ctx.beginPath();ctx.moveTo(pad.l,my);ctx.lineTo(w-pad.r,my);ctx.stroke();
    ctx.setLineDash([]);
    // Axes
    ctx.strokeStyle='#333';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,ht-pad.b);ctx.lineTo(w-pad.r,ht-pad.b);ctx.stroke();
    ctx.fillStyle='#444';ctx.font='600 9px Oswald';ctx.textAlign='center';
    for(var a=Math.ceil(minAge);a<=maxAge;a++){ctx.fillText(a,sx(a),ht-pad.b+14);}
    ctx.fillStyle='#555';ctx.font='600 9px Oswald';ctx.textAlign='center';
    ctx.fillText('AVG ROSTER AGE',w/2,ht-4);
    // Dots
    teams.forEach(function(t){
      var dotCol=t.age<=25?'#17b169':t.age<=26.5?'#3b82f6':t.age<=27.5?'#ffcc00':'#ff4444';
      var x=sx(t.age),y=sy(t.pw);
      ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fillStyle=dotCol;ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='700 10px Oswald';ctx.textAlign='center';ctx.letterSpacing='0';
      ctx.fillText(t.name,x,y-13);
    });
  },120);
}
// ═══ SCORING ═══
function renderScoring(){
  const sd=D.standings_2025.map(function(s){

    const mx=wk.length?Math.max.apply(null,wk):0,mn=wk.length?Math.min.apply(null,wk):0;
    const std=wk.length?Math.sqrt(wk.reduce(function(s,p){return s+Math.pow(p-avg,2)},0)/wk.length).toFixed(1):0;
    return Object.assign({},s,{wk:wk,avg:avg,mx:mx,mn:mn,std:std});
  }).sort(function(a,b){return b.fpts-a.fpts});
  let h='<div class="bh"><div class="bh-tag">Scoring</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">2025 Season \u2022 Heat Map \u2022 Sparklines</span></div></div>';

  h+='<div class="hm-label"></div>';
  for(var w=1;w<=17;w++){h+='<div class="hm-wk">'+w+'</div>';}
  
  // Find global min/max for color scaling

    });

  h+='</div></div>';

  h+='<div style="height:14px;border-radius:4px;background:linear-gradient(90deg,rgba(239,68,68,.4),rgba(245,158,11,.55),rgba(59,130,246,.65),rgba(16,185,129,.85));position:relative">';
  h+='</div>';

  });
  // ═══ DRAFT HIT RATE ═══
  ['2025','2024'].forEach(function(yr){

// ═══ AWARDS ═══
function renderAwards(){
  const sd=D.standings_2025.slice().sort((a,b)=>b.fpts-a.fpts);
  const luckArr=D.luck?Object.values(D.luck).sort((a,b)=>b.luck-a.luck):[];
  const actArr=Object.entries(D.activity||{}).map(([n,a])=>({name:n,...a,total:a.trades+a.moves+a.draft_picks})).sort((a,b)=>b.total-a.total);
  // Compute per-team stats
  const teamStats=D.teams.map(t=>{
    const s=D.standings_2025.find(x=>x.roster_id===t.roster_id)||{wins:0,losses:0,fpts:0};
    const wk=D.weekly_scores[t.roster_id]||[];
    const avg=wk.length?wk.reduce((a,b)=>a+b,0)/wk.length:0;
    const std=wk.length?Math.sqrt(wk.reduce((s,p)=>s+Math.pow(p-avg,2),0)/wk.length):0;
    const ages=t.players.filter(p=>p.age&&p.pos!=='DEF').map(p=>p.age);
    const avgAge=ages.length?ages.reduce((a,b)=>a+b,0)/ages.length:27;
    const high=wk.length?Math.max(...wk):0;
    const low=wk.length?Math.min(...wk):0;
    return{name:t.team_name,rid:t.roster_id,...s,wk,avg,std,avgAge,high,low,players:t.players};
  });
  // Award computations
  const mvp=teamStats.slice().sort((a,b)=>{const sa=(b.wins/(b.wins+b.losses||1))*50+(b.fpts/Math.max(...teamStats.map(t=>t.fpts)))*50;const sb=(a.wins/(a.wins+a.losses||1))*50+(a.fpts/Math.max(...teamStats.map(t=>t.fpts)))*50;return sa-sb})[0];
  const pointMachine=sd[0];
  const consistent=teamStats.slice().sort((a,b)=>a.std-b.std).find(t=>t.wk.length>0);
  const boombust=teamStats.slice().sort((a,b)=>b.std-a.std)[0];
  const youngest=teamStats.slice().sort((a,b)=>a.avgAge-b.avgAge)[0];
  const luckiest=luckArr[0];
  const unluckiest=luckArr.length?luckArr[luckArr.length-1]:null;
  const trader=actArr.find(a=>a.trades>0);
  const ghost=actArr.length?actArr[actArr.length-1]:null;
  const bigWeek=teamStats.slice().sort((a,b)=>b.high-a.high)[0];
  // Draft guru - team with most starters from drafts
  const draftHits=D.draft_hits?Object.values(D.draft_hits).flat():[];
  const drafterCounts={};
  draftHits.filter(h=>h.status==='starter').forEach(h=>{drafterCounts[h.drafter]=(drafterCounts[h.drafter]||0)+1});
  const draftGuru=Object.entries(drafterCounts).sort((a,b)=>b[1]-a[1])[0];
  // Champ check
  const latestChamp=D.champions[D.champions.length-1];
  let h='<div class="bh"><div class="bh-tag">\u{1F3C6} Awards</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Auto-Computed Superlatives \u2022 2025 Season</span></div></div>';
  h+='<div class="narrative"><div class="nar-item"><div class="nar-icon">\u{1F3AF}</div><div class="nar-text">Awards are automatically computed from league data. No voting, no bias \u2014 the numbers decide everything.</div></div></div>';

function toAbbr(n){var w=n.replace(/[^a-zA-Z0-9\s]/g,' ').trim().split(/\s+/).filter(function(s){return s.length>0;});if(!w.length)return n.substring(0,4).toUpperCase();if(w.length===1)return w[0].substring(0,4).toUpperCase();if(w.length===2)return(w[0].substring(0,2)+w[1].substring(0,2)).toUpperCase();return w.slice(0,3).map(function(x){return x[0].toUpperCase();}).join('');}
function renderAnalytics(){
  let h='<div class="bh"><div class="bh-tag">\u{1F4CA} Analytics</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Advanced Metrics \u2022 2025 Season</span></div></div>';
  // ── H2H MATRIX ──
  h+='<div class="bh" style="margin-top:16px"><div class="bh-tag">H2H Matrix</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Head-to-Head Record \u2022 All Matchups</span></div></div>';
  const rids=Object.keys(D.rid_to_name).map(Number).sort((a,b)=>a-b);
  const n=rids.length;
  h+='<div class="h2h-matrix"><div class="h2h-grid" style="grid-template-columns:160px repeat('+n+',1fr)">';
  h+='<div class="h2h-hdr"></div>';
  rids.forEach(r=>{h+='<div class="h2h-hdr rot" title="'+D.rid_to_name[r]+'">'+toAbbr(D.rid_to_name[r])+'</div>'});
  rids.forEach(a=>{
    h+='<div class="h2h-hdr" style="text-align:left">'+D.rid_to_name[a].substring(0,22)+'</div>';
    rids.forEach(b=>{
      if(a===b){h+='<div class="h2h-cell h2h-self">\u2014</div>';return;}
      const key=a+'-'+b;
      const rec=D.h2h[key];
      if(!rec){h+='<div class="h2h-cell h2h-even">0-0</div>';return;}
      const cls=rec.w>rec.l?'h2h-win':rec.w<rec.l?'h2h-lose':'h2h-even';
      h+='<div class="h2h-cell '+cls+'">'+rec.w+'-'+rec.l+'</div>';
    });
  });
  h+='</div></div>';
  // ── ALL-PLAY RECORD ──
  h+='<div class="bh" style="margin-top:24px"><div class="bh-tag">All-Play</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">How Many Teams You\'d Beat Each Week</span></div></div>';
  h+='<div class="narrative"><div class="nar-item"><div class="nar-icon">\u{1F3AF}</div><div class="nar-text">All-play record: for each week, count how many of the other 11 teams your score would have beaten. This removes schedule luck entirely.</div></div></div>';
  const allPlay=rids.map(rid=>{
    const wk=D.weekly_scores[rid]||[];
    let apW=0,apL=0;
    wk.forEach((pts,wi)=>{
      rids.forEach(opp=>{
        if(opp===rid)return;
        const oppWk=D.weekly_scores[opp]||[];
        if(wi<oppWk.length){
          if(pts>oppWk[wi])apW++;
          else if(pts<oppWk[wi])apL++;
        }
      });
    });
    const s=D.standings_2025.find(x=>x.roster_id===rid)||{wins:0,losses:0};
    const apPct=apW+apL>0?(apW/(apW+apL)*100).toFixed(1):'0';
    const luckDiff=s.wins-Math.round(apW/(apW+apL)*(s.wins+s.losses));
    return{rid,name:D.rid_to_name[rid],apW,apL,apPct:parseFloat(apPct),actW:s.wins,actL:s.losses,luckDiff};
  }).sort((a,b)=>b.apPct-a.apPct);
  h+='<div style="overflow-x:auto"><table class="ap-table"><thead><tr><th>#</th><th>Team</th><th>Actual</th><th>All-Play</th><th>AP%</th><th>Luck</th></tr></thead><tbody>';
  allPlay.forEach((t,i)=>{
    const lCls=t.luckDiff>0?'ap-luck-pos':t.luckDiff<0?'ap-luck-neg':'';
    h+='<tr><td>'+(i+1)+'</td><td style="font-weight:700">'+t.name+'</td><td>'+t.actW+'-'+t.actL+'</td><td>'+t.apW+'-'+t.apL+'</td><td style="font-family:var(--fm);font-weight:700;color:var(--a)">'+t.apPct+'%</td><td class="'+lCls+'">'+(t.luckDiff>0?'+':'')+t.luckDiff+'</td></tr>';
  });
  h+='</tbody></table></div>';
  // ── CONSISTENCY SCATTER ──
  h+='<div class="bh" style="margin-top:24px"><div class="bh-tag">Consistency</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Average Points vs Variance</span></div></div>';
  h+='<div class="narrative"><div class="nar-item"><div class="nar-icon">\u{1F4C9}</div><div class="nar-text">Top-right = high scoring + inconsistent (boom/bust). Top-left = low scoring + inconsistent (bad + volatile). Bottom-right = high scoring + consistent (elite). Bottom-left = low + consistent (mediocre but steady).</div></div></div>';
  h+='<canvas class="consistency-chart" id="scatter-chart"></canvas>';
  // ── PYTHAGOREAN WINS ──
  h+='<div class="bh" style="margin-top:24px"><div class="bh-tag">Pythagorean</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Expected Wins Based on Points For/Against</span></div></div>';
  h+='<div class="narrative"><div class="nar-item"><div class="nar-icon">\u{1F4D0}</div><div class="nar-text">Pythagorean expectation: uses PF and PA to calculate "deserved" wins. Teams above expected are overperforming, below are underperforming.</div></div></div>';
  // Calc PA per team from matchups
  const paMap={};
  rids.forEach(r=>{paMap[r]=0});
  Object.values(D.matchup_weeks).forEach(wk=>{
    wk.forEach(g=>{
      paMap[g.team_a.roster_id]=(paMap[g.team_a.roster_id]||0)+g.team_b.points;
      paMap[g.team_b.roster_id]=(paMap[g.team_b.roster_id]||0)+g.team_a.points;
    });
  });
  const pythData=rids.map(rid=>{
    const s=D.standings_2025.find(x=>x.roster_id===rid)||{wins:0,losses:0,fpts:0};
    const pa=paMap[rid]||1;
    const games=s.wins+s.losses||1;
    const exp=2.37;
    const pyth=Math.pow(s.fpts,exp)/(Math.pow(s.fpts,exp)+Math.pow(pa,exp));
    const expWins=Math.round(pyth*games*10)/10;
    const diff=s.wins-expWins;
    return{name:D.rid_to_name[rid],pf:s.fpts,pa:Math.round(pa),actW:s.wins,expW:expWins,diff:Math.round(diff*10)/10};
  }).sort((a,b)=>b.diff-a.diff);
  h+='<div style="overflow-x:auto"><table class="ap-table"><thead><tr><th>#</th><th>Team</th><th>PF</th><th>PA</th><th>Actual W</th><th>Expected W</th><th>Diff</th></tr></thead><tbody>';
  pythData.forEach((t,i)=>{
    const cls=t.diff>0?'ap-luck-pos':t.diff<0?'ap-luck-neg':'';
    h+='<tr><td>'+(i+1)+'</td><td style="font-weight:700">'+t.name+'</td><td>'+t.pf+'</td><td>'+t.pa+'</td><td>'+t.actW+'</td><td style="font-family:var(--fm)">'+t.expW+'</td><td class="'+cls+'">'+(t.diff>0?'+':'')+t.diff+'</td></tr>';
  });
  h+='</tbody></table></div>';
  // ── STRENGTH OF SCHEDULE ──
  h+='<div class="bh" style="margin-top:24px"><div class="bh-tag">SOS</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Strength of Schedule \u2022 Opponent Win %</span></div></div>';
  const sosData=rids.map(rid=>{
    let oppWins=0,oppGames=0;
    Object.values(D.matchup_weeks).forEach(wk=>{
      wk.forEach(g=>{
        let opp=null;
        if(g.team_a.roster_id===rid)opp=g.team_b.roster_id;
        else if(g.team_b.roster_id===rid)opp=g.team_a.roster_id;
        if(opp){
          const os=D.standings_2025.find(x=>x.roster_id===opp);
          if(os){oppWins+=os.wins;oppGames+=os.wins+os.losses;}
        }
      });
    });
    const sos=oppGames>0?(oppWins/oppGames*100).toFixed(1):50;
    return{name:D.rid_to_name[rid],sos:parseFloat(sos),oppWins,oppGames};
  }).sort((a,b)=>b.sos-a.sos);
  sosData.forEach(t=>{
    const col=t.sos>=55?'var(--red-t)':t.sos>=50?'var(--y)':'var(--a)';
    const label=t.sos>=55?'HARD':t.sos>=50?'AVERAGE':'EASY';
    h+='<div class="h-row"><span class="h-rk" style="color:'+col+'">'+label+'</span><span class="h-team">'+t.name+'</span><span style="font-family:var(--fm);font-size:14px;font-weight:700;color:'+col+'">'+t.sos+'%</span></div>';
  });
  document.getElementById('tab-analytics').innerHTML=h;
  // Draw scatter chart
  setTimeout(()=>{
    const cvs=document.getElementById('scatter-chart');
    if(!cvs)return;
    const ctx=cvs.getContext('2d');
    const dpr=window.devicePixelRatio||1;
    const w=cvs.offsetWidth||cvs.parentElement?.offsetWidth||900;
    const ht=cvs.offsetHeight||300;
    cvs.width=w*dpr;cvs.height=ht*dpr;
    ctx.scale(dpr,dpr);
    const pad={t:20,r:20,b:40,l:50};
    const pts=rids.map(rid=>{
      const wk=D.weekly_scores[rid]||[];
      const avg=wk.length?wk.reduce((a,b)=>a+b,0)/wk.length:0;
      const std=wk.length?Math.sqrt(wk.reduce((s,p)=>s+Math.pow(p-avg,2),0)/wk.length):0;
      return{name:D.rid_to_name[rid],avg,std};
    });
    const minA=Math.min(...pts.map(p=>p.avg))-5,maxA=Math.max(...pts.map(p=>p.avg))+5;
    const minS=0,maxS=Math.max(...pts.map(p=>p.std))+5;
    const sx=v=>pad.l+(v-minA)/(maxA-minA)*(w-pad.l-pad.r);
    const sy=v=>ht-pad.b-(v-minS)/(maxS-minS)*(ht-pad.t-pad.b);
    // Grid
    ctx.strokeStyle='#24242e';ctx.lineWidth=1;
    for(let i=0;i<5;i++){const y=pad.t+i*(ht-pad.t-pad.b)/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();}
    // Axes labels
    ctx.fillStyle='#666678';ctx.font='500 10px Inter';ctx.textAlign='center';
    ctx.fillText('Avg Points/Week \u2192',w/2,ht-8);
    ctx.save();ctx.translate(12,ht/2);ctx.rotate(-Math.PI/2);ctx.fillText('Std Deviation \u2192',0,0);ctx.restore();
    // Dots
    const colors=['#10B981','#3b82f6','#F59E0B','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316','#84cc16','#a78bfa','#fb923c','#22d3ee'];
    pts.forEach((p,i)=>{
      const x=sx(p.avg),y=sy(p.std);
      const col=colors[i%colors.length];
      ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
      ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='700 10px Oswald';ctx.textAlign='center';
      ctx.fillText(p.name.substring(0,12),x,y-13);
    });
  },200);
}

function renderRivals(){
  const rivals=D.rivalries||[];
  let h='<div class="bh"><div class="bh-tag">\u{1F93A} Rivals</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">'+rivals.length+' Rivalry Matchups \u2022 Dominance Tracker</span></div></div>';
  if(!rivals.length){h+='<div style="text-align:center;padding:40px;color:var(--t4)">No rivalry data</div>';document.getElementById('tab-rivals').innerHTML=h;return;}
  h+='<div class="narrative"><div class="nar-item"><div class="nar-icon">\u{1F525}</div><div class="nar-text">Rivalries ranked by total games played. The dominance bar shows who owns the series. Rivalries are born in the regular season.</div></div></div>';
  // Sort by total games then dominance
  const sorted=rivals.slice().sort((a,b)=>b.total-a.total||(b.dominance||0)-(a.dominance||0));
  sorted.forEach(r=>{
    const totalG=r.a_wins+r.b_wins;
    const aPct=totalG>0?(r.a_wins/totalG*100):50;
    const bPct=100-aPct;
    const aCol=r.a_wins>r.b_wins?'var(--a)':'var(--g5)';
    const bCol=r.b_wins>r.a_wins?'var(--red-t)':'var(--g5)';
    const isDom=r.dominant&&r.dominated;
    h+='<div class="rival-card">';
    h+='<div class="rival-hdr">';
    h+='<div class="rival-vs">'+r.a+' <span style="color:var(--t4);font-size:12px">vs</span> '+r.b+'</div>';
    h+='<div class="rival-total">'+totalG+' games</div>';
    h+='</div>';
    h+='<div class="rival-bar-track">';
    h+='<div class="rival-bar-a" style="width:'+aPct+'%;background:'+aCol+'">'+r.a_wins+'W</div>';
    h+='<div class="rival-bar-b" style="background:'+bCol+'">'+r.b_wins+'W</div>';
    h+='</div>';
    if(isDom){h+='<div style="margin-top:6px;display:flex;gap:8px;align-items:center"><span class="rival-badge" style="background:rgba(204,0,0,.12);color:var(--a)">\u{1F451} '+r.dominant+' owns this rivalry</span></div>';}
    h+='</div>';
  });
  document.getElementById('tab-rivals').innerHTML=h;
}

// ═══ ANIMATED COUNTERS ═══
function animateCounters(){
  document.querySelectorAll('.count-up').forEach(function(el){
    var target=parseFloat(el.getAttribute('data-target'));
    var suffix=el.getAttribute('data-suffix')||'';
    var decimals=parseInt(el.getAttribute('data-decimals')||'0');
    var duration=800;
    var startTime=null;
    function step(timestamp){
      if(!startTime)startTime=timestamp;
      var progress=Math.min((timestamp-startTime)/duration,1);
      var eased=1-Math.pow(1-progress,3);
      var current=eased*target;
      el.textContent=decimals>0?current.toFixed(decimals):Math.round(current).toLocaleString();
      if(suffix)el.textContent+=suffix;
      if(progress<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

function renderWarRoom(){
  var now=new Date();
  var h='<div class="bh"><div class="bh-tag">War Room</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Offseason Command Center \u2022 2026</span></div></div>';
  // Countdown timers
  h+='<div class="bh" style="margin-top:8px"><div class="bh-tag" style="background:var(--pur);color:white">Deadlines</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Key Offseason Dates</span></div></div>';
  h+='<div class="wr-countdown">';
  var events=[
    {label:'Exemption Deadline',date:'2026-05-26',note:'Memorial Day \u2022 May 26, 2026'},
    {label:'Rookie Draft',date:null,note:'Date TBD \u2022 Post-NFL Draft'},
    {label:'NFL Kickoff',date:'2026-09-10',note:'Season Opener \u2022 Sep 10, 2026'},
  ];
  events.forEach(function(ev){
    var days=null,urgency='future';
    if(ev.date){
      var target=new Date(ev.date);
      var diff=target-now;
      days=Math.floor(diff/864e5);
      urgency=days<14?'urgent':days<60?'soon':'future';
    }
    h+='<div class="wr-timer '+urgency+'">';
    h+='<div class="wr-timer-label">'+ev.label+'</div>';
    if(days!==null){
      h+='<div class="wr-timer-val">'+Math.max(0,days)+'</div>';
      h+='<div class="wr-timer-unit">Days Away</div>';
    }else{
      h+='<div class="wr-timer-val" style="font-size:20px">TBD</div>';
      h+='<div class="wr-timer-unit">Date Not Set</div>';
    }
    h+='<div class="wr-timer-date">'+ev.note+'</div>';
    h+='</div>';
  });
  h+='</div>';
  // Exemption Status Board
  h+='<div class="bh" style="margin-top:8px"><div class="bh-tag">Exemption Status</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">2026 Exemption Ownership</span></div></div>';
  h+='<div class="wr-checklist">';
  var exmH=D.exemption_history||{};
  var used2025=(exmH['2025']||[]).map(function(e){return e.o});
  var ownerCounts={};
  used2025.forEach(function(o){ownerCounts[o]=(ownerCounts[o]||0)+1});
  D.teams.forEach(function(t){
    var used=ownerCounts[t.team_name]||0;
    var indColor=used===0?'green':used===1?'yellow':'red';

    h+='<div style="font-family:var(--fb);font-size:11px;color:var(--t3)">'+label+'</div></div>';
    h+='<div class="wr-indicators"><div class="wr-ind '+indColor+'" title="'+label+'"></div></div>';
    h+='</div>';
  });
  h+='</div>';
  // Expiring Contracts Alert
  h+='<div class="bh" style="margin-top:8px"><div class="bh-tag" style="background:var(--red-t);color:white">Expiring Contracts</div><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">0-Year Deals \u2022 Decision Required</span></div></div>';
  var expiringByTeam=[];

      var c=D.contracts&&D.contracts[p.name];
      if(c&&c.yrs===0)exp.push(p.name);
    });
    if(exp.length)expiringByTeam.push({team:t.team_name,rid:t.roster_id,players:exp});
  });
  expiringByTeam.sort(function(a,b){return b.players.length-a.players.length});
  if(expiringByTeam.length){
    expiringByTeam.forEach(function(row){
      h+='<div class="wr-team-row">';
      h+=av(row.rid,32);
      h+='<div style="min-width:0;flex:1"><div style="font-family:var(--fd);font-size:13px;font-weight:700;color:var(--t1)">'+row.team+'</div>';
      h+='<div style="font-family:var(--fb);font-size:11px;color:var(--t3)">'+row.players.join(', ')+'</div></div>';
      h+='<div style="font-family:var(--fm);font-size:16px;font-weight:800;color:var(--red-t)">'+row.players.length+'</div>';

  var capMap={};
  D.pick_trades.forEach(function(p){
    var cur=p.current_owner,orig=p.original_owner;
    capMap[cur]=capMap[cur]||{gained:0,lost:0};
    capMap[orig]=capMap[orig]||{gained:0,lost:0};
    capMap[cur].gained++;
    if(orig!==cur)capMap[orig].lost++;
  });
  var capArr=Object.entries(capMap).sort(function(a,b){return(b[1].gained-b[1].lost)-(a[1].gained-a[1].lost)});
  capArr.forEach(function(entry){
    var nm=entry[0],c=entry[1];

    h+='<span style="font-family:var(--fm);font-size:11px;color:var(--t4)">-'+c.lost+' traded</span>';
    h+='<span style="font-family:var(--fm);font-size:16px;font-weight:800;color:'+col+';min-width:36px;text-align:right">'+(net>0?'+':'')+net+'</span>';
    h+='</div>';
  });
  document.getElementById('tab-warroom').innerHTML=h;
}

function showShareCard(title,content){
  var modal=document.getElementById('share-modal');
  if(!modal){
    modal=document.createElement('div');
    modal.id='share-modal';
    modal.className='share-modal';
    modal.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;gap:12px;max-width:520px;width:90%"><div class="share-preview" id="share-preview"><div id="share-content"></div><div class="share-watermark">HARAMBE\'S DOZEN \u2022 DYNASTY HQ \u2022 2026</div></div><div style="display:flex;gap:8px"><button class="share-btn" id="share-dl-btn">\uD83D\uDCE5 SAVE IMAGE</button><button class="share-btn" onclick="document.getElementById(\'share-modal\').classList.remove(\'open\')">\u2715 CLOSE</button></div></div>';
    modal.addEventListener('click',function(e){if(e.target===modal)modal.classList.remove('open');});
    document.body.appendChild(modal);
    var dlBtn=document.getElementById('share-dl-btn');
    if(dlBtn)dlBtn.onclick=function(){
      var preview=document.getElementById('share-preview');
      if(!preview)return;
      if(typeof html2canvas==='undefined'){var orig=dlBtn.innerHTML;dlBtn.textContent='\u26A0 Not available';setTimeout(function(){dlBtn.innerHTML=orig;},2000);return;}
      dlBtn.textContent='\u23F3 Generating...';
      html2canvas(preview,{backgroundColor:'#0d0d14',scale:2,useCORS:true,allowTaint:true,logging:false}).then(function(canvas){
        var link=document.createElement('a');
        link.download='harambes-dozen.png';
        link.href=canvas.toDataURL('image/png');
        link.click();
        dlBtn.innerHTML='\uD83D\uDCE5 SAVE IMAGE';
      }).catch(function(){dlBtn.innerHTML='\uD83D\uDCE5 SAVE IMAGE';});
    };
  }
  document.getElementById('share-content').innerHTML='<div style="font-family:var(--fd);font-size:18px;font-weight:800;color:var(--t1);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">'+title+'</div>'+content;
  modal.classList.add('open');
}

(function(){
  const isStandalone = window.matchMedia('(display-mode:standalone)').matches || window.navigator.standalone;
  if (isStandalone) return;
  const dismissed = sessionStorage.getItem('install-dismissed');
  if (dismissed) return;

  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    showBanner('chrome');
  });

  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isSafari = /Safari/.test(navigator.userAgent) && !/Chrome|CriOS|FxiOS/.test(navigator.userAgent);
  if (isIOS && isSafari) {
    setTimeout(() => showBanner('ios'), 2000);
  }

  const shareIconSVG = '<svg class="share-icon-inline" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>';

  function showBanner(type) {
    const banner = document.createElement('div');
    banner.className = 'install-banner';

    if (type === 'ios') {
      banner.innerHTML = '<img class="install-banner-icon" src="/apple-touch-icon.png" alt="App">'
        + '<div class="install-banner-text">'
        + '<div class="install-banner-title">Add Harambe\'s Dozen to Home Screen</div>'
        + '<div class="install-banner-sub">Tap the ' + shareIconSVG + ' <b>Share</b> button above, then <b>\u201cAdd to Home Screen\u201d</b></div>'
        + '</div>'
        + '<button class="install-banner-close" id="pwa-close-btn">&times;</button>'
        + '<div class="share-arrow-container">'
        + '<div class="share-arrow-pulse"></div>'
        + '<svg class="share-arrow-svg" viewBox="0 0 40 80" xmlns="http://www.w3.org/2000/svg">'
        + '<path d="M20 80 L20 15" stroke="var(--a, #cc0000)" stroke-width="3" fill="none"/>'
        + '<path d="M8 28 L20 12 L32 28" stroke="var(--a, #cc0000)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
        + '</svg></div>';
    } else if (type === 'chrome') {
      banner.innerHTML = '<img class="install-banner-icon" src="/apple-touch-icon.png" alt="App">'
        + '<div class="install-banner-text">'
        + '<div class="install-banner-title">Add Harambe\'s Dozen to Home Screen</div>'
        + '<div class="install-banner-sub">Get instant access like a native app</div>'
        + '</div>'
        + '<button class="install-banner-btn" id="pwa-install-btn">Install</button>'
        + '<button class="install-banner-close" id="pwa-close-btn">&times;</button>';
    } else {
      banner.innerHTML = '<img class="install-banner-icon" src="/apple-touch-icon.png" alt="App">'
        + '<div class="install-banner-text">'
        + '<div class="install-banner-title">Add Harambe\'s Dozen to Home Screen</div>'
        + '<div class="install-banner-sub">Tap &#8942; menu then <b>\u201cAdd to Home Screen\u201d</b></div>'
        + '</div>'
        + '<button class="install-banner-close" id="pwa-close-btn">&times;</button>';
    }

    document.body.appendChild(banner);
    document.getElementById('pwa-close-btn').onclick = () => {
      banner.remove();
      sessionStorage.setItem('install-dismissed', '1');
    };
    if (type === 'chrome') {
      document.getElementById('pwa-install-btn').onclick = async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const result = await deferredPrompt.userChoice;
        if (result.outcome === 'accepted') banner.remove();
        deferredPrompt = null;
      };
    }
  }
})();
</script>
