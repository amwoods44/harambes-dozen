  });
  // ── CAPITAL INVENTORY GRID ──
  if(D.pick_trades&&D.pick_trades.length){
    h+='<div class="bh" style="margin-top:24px"><h2 class="bh-tag">Capital Grid</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Future Pick Inventory \u2022 Who Owns What</span></div></div>';
    const seasons=[...new Set(D.pick_trades.map(function(p){return p.season}))].sort();
    const rounds=[...new Set(D.pick_trades.map(function(p){return p.round}))].sort();

        var aAssets=a.players.map(function(p){return p.nm}).concat(a.picks).join(', ')||'Nothing';
        var bAssets=b.players.map(function(p){return p.nm}).concat(b.picks).join(', ')||'Nothing';
        var aK=ktcVal(a.players,a.picks),bK=ktcVal(b.players,b.picks);

          '<div style="padding:8px 0;border-bottom:1px solid #24242e"><b style="color:#fff">'+a.name+'</b> receives: <span style="color:#10B981">'+aAssets+'</span> | Grade: <b>'+gradeLabel(aK-bK)+'</b></div>'+
          '<div style="padding:8px 0"><b style="color:#fff">'+b.name+'</b> receives: <span style="color:#10B981">'+bAssets+'</span> | Grade: <b>'+gradeLabel(bK-aK)+'</b></div>'+
          '</div>');

function renderMatchups(){
  const wks=Object.keys(D.matchup_weeks).map(Number).sort((a,b)=>a-b);
  let h='<div class="bh"><h2 class="bh-tag">Matchups</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">2025 \u2022 Week '+selWk+'</span></div></div>';
  h+='<div class="wk-sel">';
  wks.forEach(w=>{h+='<button class="wk-btn'+(w===selWk?' active':'')+'" onclick="selWk='+w+';renderMatchups()">'+w+'</button>'});
  h+='</div>';
  // Week summary stats bar
  const wkGames=D.matchup_weeks[selWk]||[];
  const wkPts=wkGames.flatMap(g=>[g.team_a.points,g.team_b.points]);
  if(wkPts.length){
    const wkHigh=Math.max(...wkPts),wkLow=Math.min(...wkPts),wkAvg=(wkPts.reduce((a,b)=>a+b,0)/wkPts.length).toFixed(1);
    h+='<div style="padding:var(--sp-3) var(--sp-5);background:var(--g3);border-radius:var(--radius-md);margin-bottom:var(--sp-4);display:flex;justify-content:center;gap:var(--sp-7)">';
    h+='<div style="text-align:center"><div style="font:700 var(--text-2xs)/1 var(--fd);letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-bottom:var(--sp-1)">HIGH</div><div style="font:700 var(--text-base)/1 var(--fd);color:var(--grn)">'+wkHigh+'</div></div>';
    h+='<div style="text-align:center"><div style="font:700 var(--text-2xs)/1 var(--fd);letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-bottom:var(--sp-1)">AVG</div><div style="font:700 var(--text-base)/1 var(--fd);color:var(--t1)">'+wkAvg+'</div></div>';
    h+='<div style="text-align:center"><div style="font:700 var(--text-2xs)/1 var(--fd);letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-bottom:var(--sp-1)">LOW</div><div style="font:700 var(--text-base)/1 var(--fd);color:var(--red-t)">'+wkLow+'</div></div>';
    h+='</div>';
  }
  // Matchup cards — split panel design
  wkGames.forEach(g=>{
    const aW=g.team_a.points>g.team_b.points;
    const diff=Math.abs(g.team_a.points-g.team_b.points).toFixed(2);
    const isClose=diff<5;const isBlowout=diff>40;
    const cA=TC[g.team_a.roster_id],cB=TC[g.team_b.roster_id];
    const pA=cA?cA.p:'#444',pB=cB?cB.p:'#444';
    // Game badge classification
    const badgeClass=isClose?'thriller':isBlowout?'blowout':diff<10?'close':'normal';
    const badgeLabel=isClose?'THRILLER':isBlowout?'BLOWOUT':diff<10?'CLOSE':'';
    h+='<div class="mu-card">';
    // Team color accent bar
    h+='<div class="mu-accent" style="background:linear-gradient(90deg,'+pA+' 0%,'+pA+' 48%,transparent 50%,'+pB+' 52%,'+pB+' 100%)"></div>';
    // Split panel body
    h+='<div class="mu-body">';
    // Left team
    const aWash=aW?'background:linear-gradient(135deg,'+pA+'1e 0%,transparent 70%);border-radius:var(--radius-md);padding:var(--sp-2)':'';
    h+='<div class="mu-team left" style="'+aWash+'">';
    h+='<div class="mu-team-inner">'+av(g.team_a.roster_id,40)+'<div>';
    h+='<div style="display:flex;align-items:center;gap:var(--sp-2)">'+(aW?'<div class="mu-w-badge">W</div>':'')+'<div class="mu-tn">'+tn(g.team_a.roster_id)+'</div></div>';
    h+='<div class="mu-sc '+(aW?'win':'lose')+'"'+(aW?' style="text-shadow:0 0 30px '+pA+'44"':'')+'>'+g.team_a.points+'</div>';
    h+='</div></div></div>';
    // Center divider
    h+='<div class="mu-divider"></div>';
    // Right team
    const bWash=!aW?'background:linear-gradient(135deg,'+pB+'1e 0%,transparent 70%);border-radius:var(--radius-md);padding:var(--sp-2)':'';
    h+='<div class="mu-team right" style="'+bWash+'">';
    h+='<div class="mu-team-inner">'+av(g.team_b.roster_id,40)+'<div>';
    h+='<div style="display:flex;align-items:center;gap:var(--sp-2);justify-content:flex-end">'+(!aW?'<div class="mu-w-badge">W</div>':'')+'<div class="mu-tn">'+tn(g.team_b.roster_id)+'</div></div>';

    h+='</div></div></div>';
    h+='</div>';
    // Footer
    h+='<div class="mu-footer">';
    h+='<div style="display:flex;align-items:center;gap:var(--sp-2)"><span class="mu-margin">'+diff+' pt margin</span>'+(badgeLabel?'<span class="game-badge '+badgeClass+'">'+badgeLabel+'</span>':'')+'</div>';
    h+='<button class="btn-primary mu-share-btn" data-a="'+g.team_a.roster_id+'" data-b="'+g.team_b.roster_id+'" data-ap="'+g.team_a.points+'" data-bp="'+g.team_b.points+'" style="padding:var(--sp-1) var(--sp-3);font-size:10px">\u{1F4E4} SHARE</button>';
    h+='</div>';
    h+='</div>';
  });
  document.getElementById('tab-matchups').innerHTML=h;
  setTimeout(function(){
    document.querySelectorAll('.mu-share-btn').forEach(function(btn){
      btn.onclick=function(e){
        e.stopPropagation();
        var aRid=parseInt(btn.getAttribute('data-a'));
        var bRid=parseInt(btn.getAttribute('data-b'));
        var aPts=parseFloat(btn.getAttribute('data-ap'));
        var bPts=parseFloat(btn.getAttribute('data-bp'));
        var aW=aPts>bPts;
        var aName=tn(aRid),bName=tn(bRid);
        var diff=Math.abs(aPts-bPts).toFixed(2);
        var content='<div style="font-family:var(--fd);display:flex;flex-direction:column;gap:12px">';
        content+='<div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:#1a1a24;border-radius:8px;border-left:3px solid '+(aW?'var(--a)':'var(--red-t)')+'">';
        content+='<span style="font-size:14px;font-weight:800;color:'+(aW?'var(--a)':'var(--t2)')+'">'+aName+(aW?' 👑':'')+'</span>';
        content+='<span style="font-size:20px;font-weight:900;color:'+(aW?'var(--a)':'var(--t3)')+'">'+aPts+'</span></div>';
        content+='<div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:#1a1a24;border-radius:8px;border-left:3px solid '+((!aW)?'var(--a)':'var(--red-t)')+'">';
        content+='<span style="font-size:14px;font-weight:800;color:'+((!aW)?'var(--a)':'var(--t2)')+'">'+bName+((!aW)?' 👑':'')+'</span>';
        content+='<span style="font-size:20px;font-weight:900;color:'+((!aW)?'var(--a)':'var(--t3)')+'">'+bPts+'</span></div>';
        content+='<div style="text-align:center;font-size:11px;color:var(--t4)">Margin: '+diff+' pts | Week '+selWk+' 2025</div>';
        content+='</div>';
        showShareCard('Week '+selWk+' Matchup',content);
      };
    });
  },50);
}

function renderAge(){
  let h='<div class="bh"><h2 class="bh-tag">Age Map</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Dynasty Window Analysis</span></div></div>';
  h+='<div style="display:flex;gap:10px;margin:12px 0"><span class="dbadge up">\u226424 Young</span><span class="dbadge" style="background:rgba(245,158,11,.12);color:var(--y)">25-28 Prime</span><span class="dbadge dn">29+ Vet</span></div>';
  const ageData=D.teams.map(t=>{
    const ps=t.players.filter(p=>p.age&&p.pos!=='DEF');const ages=ps.map(p=>p.age);
    const avg=ages.length?ages.reduce((a,b)=>a+b,0)/ages.length:0;
    const y=ages.filter(a=>a<=24).length,p=ages.filter(a=>a>=25&&a<=28).length,v=ages.filter(a=>a>=29).length,tot=ages.length||1;
    return{name:t.team_name,avg:Math.round(avg*10)/10,yP:(y/tot*100).toFixed(0),pP:(p/tot*100).toFixed(0),vP:(v/tot*100).toFixed(0)};
  }).sort((a,b)=>a.avg-b.avg);
  ageData.forEach(t=>{
    const col=t.avg<=25?'var(--a)':t.avg<=27?'var(--y)':'var(--red-t)';
    h+='<div class="age-row"><span class="age-name">'+t.name+'</span><div class="age-track"><div class="age-seg age-y" style="width:'+t.yP+'%"></div><div class="age-seg age-p" style="width:'+t.pP+'%"></div><div class="age-seg age-v" style="width:'+t.vP+'%"></div></div><span class="age-avg" style="color:'+col+'">'+t.avg+'</span></div>';
  });
  // Item 18: Dynasty scatter plot
  h+='<div class="bh" style="margin-top:20px"><h2 class="bh-tag">Dynasty Scatter</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Age vs Power \u2022 Where Every Team Sits</span></div></div>';
  h+='<canvas class="dynasty-scatter" id="dynasty-scatter"></canvas>';
  h+='<div class="bh" style="margin-top:20px"><h2 class="bh-tag">Windows</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Championship Window</span></div></div>';
  ageData.forEach(t=>{
    const w=t.avg<=25?['\u{1F7E2} Wide Open','var(--a)']:t.avg<=26.5?['\u{1F535} Building','var(--blu)']:t.avg<=27.5?['\u{1F7E1} Win Now','var(--y)']:['\u{1F534} Closing','var(--red-t)'];
    h+='<div class="h-row"><span class="h-team">'+t.name+'</span><span style="font-family:var(--fd);font-size:12px;font-weight:700;color:'+w[1]+'">'+w[0]+'</span></div>';
  });
  document.getElementById('tab-age').innerHTML=h;
  // Draw dynasty scatter
  setTimeout(function(){
    const canvas=document.getElementById('dynasty-scatter');if(!canvas)return;
    const ctx=canvas.getContext('2d');
    canvas.width=canvas.offsetWidth||600;canvas.height=320;
    const w=canvas.width,ht=320,pad={l:50,r:24,t:28,b:40};
    // Gather age+power data
    const teams=D.teams.map(function(t){
      const ps=t.players.filter(function(p){return p.age&&p.pos!=='DEF'});
      const ages=ps.map(function(p){return p.age});
      const avg=ages.length?ages.reduce(function(a,b){return a+b},0)/ages.length:27;
      const s25=CUR_STANDINGS.find(function(s){return s.roster_id===t.roster_id})||{wins:0,losses:0,fpts:0};
      const wPct=s25.wins/(s25.wins+s25.losses)||0;
      const maxP=Math.max.apply(null,CUR_STANDINGS.map(function(s){return s.fpts}));
      const pPct=s25.fpts/maxP;
      const youth=1-(avg-22)/12;
      const acq=D.pick_trades.filter(function(p){return p.current_owner_roster_id===t.roster_id}).length;
      const pw=Math.round((wPct*40+pPct*30+youth*20+Math.min((2+acq)/4,1)*10)*10)/10;
      return{name:t.team_name.split(' ').pop(),age:Math.round(avg*10)/10,pw:pw,rid:t.roster_id};
    });
    const ages=teams.map(function(t){return t.age});
    const pws=teams.map(function(t){return t.pw});
    const minAge=Math.floor(Math.min.apply(null,ages))-1,maxAge=Math.ceil(Math.max.apply(null,ages))+1;
    const minPw=0,maxPw=Math.ceil(Math.max.apply(null,pws)/10)*10+5;
    const medAge=(Math.min.apply(null,ages)+Math.max.apply(null,ages))/2;
    const medPw=(Math.min.apply(null,pws)+Math.max.apply(null,pws))/2;
    const sx=function(a){return pad.l+(a-minAge)/(maxAge-minAge)*(w-pad.l-pad.r);};
    const sy=function(p){return ht-pad.b-(p-minPw)/(maxPw-minPw)*(ht-pad.t-pad.b);};
    const mx=sx(medAge),my=sy(medPw);

    qd.forEach(function(q,i){ctx.fillStyle=q[5];ctx.fillRect(pad.l+q[0],pad.t+q[1],q[2],q[3]);ctx.fillStyle=qlabels[i][0];ctx.font='700 9px Oswald';ctx.letterSpacing='2px';ctx.textAlign='left';ctx.fillText(q[4],qlabels[i][1],qlabels[i][2]);});

    ctx.beginPath();ctx.moveTo(pad.l,my);ctx.lineTo(w-pad.r,my);ctx.stroke();
    ctx.setLineDash([]);
    // Axes
    ctx.strokeStyle='#333';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,ht-pad.b);ctx.lineTo(w-pad.r,ht-pad.b);ctx.stroke();
    ctx.fillStyle='#444';ctx.font='600 9px Oswald';ctx.textAlign='center';
    for(var a=Math.ceil(minAge);a<=maxAge;a++){ctx.fillText(a,sx(a),ht-pad.b+14);}
    ctx.fillStyle='#555';ctx.font='600 9px Oswald';ctx.textAlign='center';
    ctx.fillText('AVG ROSTER AGE',w/2,ht-4);
    // Dots
    teams.forEach(function(t){
      var dotCol=t.age<=25?'#17b169':t.age<=26.5?'#3b82f6':t.age<=27.5?'#ffcc00':'#ff4444';
      var x=sx(t.age),y=sy(t.pw);

      ctx.fillStyle='#fff';ctx.font='700 10px Oswald';ctx.textAlign='center';ctx.letterSpacing='0';
      ctx.fillText(t.name,x,y-13);
    });
  },120);

function renderScoring(){
  const sd=CUR_STANDINGS.map(function(s){
    const wk=D.weekly_scores[s.roster_id]||[];
    const avg=wk.length?(wk.reduce(function(a,b){return a+b},0)/wk.length).toFixed(1):0;
    const mx=wk.length?Math.max.apply(null,wk):0,mn=wk.length?Math.min.apply(null,wk):0;
    const std=wk.length?Math.sqrt(wk.reduce(function(s,p){return s+Math.pow(p-avg,2)},0)/wk.length).toFixed(1):0;
    return Object.assign({},s,{wk:wk,avg:avg,mx:mx,mn:mn,std:std});
  }).sort(function(a,b){return b.fpts-a.fpts});
  let h='<div class="bh"><h2 class="bh-tag">Scoring</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">2025 Season \u2022 Heat Map \u2022 Sparklines</span></div></div>';
  // ═══ HEAT MAP ═══
  h+='<div class="hm-wrap">';
  h+='<div class="hm-grid" style="grid-template-columns:100px repeat(17,1fr);min-width:520px">';
  // Header row
  h+='<div class="hm-label"></div>';
  for(var w=1;w<=17;w++){h+='<div class="hm-wk">'+w+'</div>';}
  
  // Find global min/max for color scaling
  var allPts=[];
  sd.forEach(function(t){t.wk.forEach(function(p){allPts.push(p)})});
  var gMin=Math.min.apply(null,allPts),gMax=Math.max.apply(null,allPts);
  
  sd.forEach(function(t){
    h+='<div class="hm-label">'+t.team_name.substring(0,22)+'</div>';
    t.wk.forEach(function(pts){
      var pct=(pts-gMin)/(gMax-gMin);
      var r,g,b;
      if(pct<0.25){r=239;g=68;b=68;} // red
      else if(pct<0.5){r=245;g=158;b=11;} // yellow
      else if(pct<0.75){r=59;g=130;b=246;} // blue
      else{r=16;g=185;b=129;} // green
      var alpha=0.3+pct*0.6;
      h+='<div class="hm-cell" style="background:rgba('+r+','+g+','+b+','+alpha.toFixed(2)+')" title="'+t.team_name+' Wk: '+pts+'">'+Math.round(pts)+'</div>';
    });
  });
  h+='</div></div>';
  // Item 8: Gradient legend bar

  h+='<div style="height:14px;border-radius:4px;background:linear-gradient(90deg,rgba(239,68,68,.4),rgba(245,158,11,.55),rgba(59,130,246,.65),rgba(16,185,129,.85));position:relative">';
  h+='</div>';

  lgTicks.forEach(v=>h+='<span style="font-family:var(--fm);font-size:10px;color:var(--t4)">'+v+'</span>');

  h+='<div class="bh" style="margin-top:20px"><h2 class="bh-tag">Rankings</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Total Points \u2022 Weekly Sparklines</span></div></div>';
  var lgAvg=sd.reduce(function(s,t){return s+parseFloat(t.avg)},0)/sd.length;

  });
  // ═══ DRAFT HIT RATE ═══
  Object.keys(D.draft_hits||{}).sort().reverse().forEach(function(yr){
    var hits=D.draft_hits[yr];
    if(!hits||!hits.length)return;

      h+='<div class="hit-card '+cls+'">'+pimg(p.pid,44)+'<div class="hit-nm">'+p.nm.split(' ').pop()+'</div><div class="hit-pk">'+p.rd+'.'+String(slot).padStart(2,'0')+'</div></div>';
    });
    h+='</div>';

  // Scoring settings
  h+='<div class="bh" style="margin-top:20px"><h2 class="bh-tag">Settings</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">PPR + Bonus</span></div></div>';
  [['Pass TD','4'],['Pass Yd','0.04/yd'],['INT','-1'],['Rush TD','6'],['Rush Yd','0.1/yd'],['Reception','1 (PPR)'],['Rec TD','6'],['Rec Yd','0.1/yd'],['Fum Lost','-2'],['100 Rush/Rec','+1'],['200 Rush/Rec','+2'],['300/400 Pass','+1/+2']].forEach(function(s){
    h+='<div class="h-row"><span class="h-team" style="font-weight:500;font-family:var(--fb);font-size:12px">'+s[0]+'</span><span style="font-family:var(--fd);font-size:14px;font-weight:700;color:var(--y);font-variant-numeric:tabular-nums">'+s[1]+'</span></div>';

  document.getElementById('tab-scoring').innerHTML=h;

function toAbbr(n){var w=n.replace(/[^a-zA-Z0-9\s]/g,' ').trim().split(/\s+/).filter(function(s){return s.length>0;});if(!w.length)return n.substring(0,4).toUpperCase();if(w.length===1)return w[0].substring(0,4).toUpperCase();if(w.length===2)return(w[0].substring(0,2)+w[1].substring(0,2)).toUpperCase();return w.slice(0,3).map(function(x){return x[0].toUpperCase();}).join('');}
function renderAnalytics(){
  let h='<div class="bh"><h2 class="bh-tag">\u{1F4CA} Analytics</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Advanced Metrics \u2022 2025 Season</span></div></div>';
  // ── H2H MATRIX ──
  h+='<div class="bh" style="margin-top:16px"><h2 class="bh-tag">H2H Matrix</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Head-to-Head Record \u2022 All Matchups</span></div></div>';
  const rids=Object.keys(D.rid_to_name).map(Number).sort((a,b)=>a-b);
  const n=rids.length;
  h+='<div class="h2h-matrix"><div class="h2h-grid" style="grid-template-columns:160px repeat('+n+',1fr)">';
  h+='<div class="h2h-hdr"></div>';
  rids.forEach(r=>{h+='<div class="h2h-hdr rot" title="'+D.rid_to_name[r]+'">'+toAbbr(D.rid_to_name[r])+'</div>'});
  rids.forEach(a=>{
    h+='<div class="h2h-hdr" style="text-align:left">'+D.rid_to_name[a].substring(0,22)+'</div>';
    rids.forEach(b=>{
      if(a===b){h+='<div class="h2h-cell h2h-self">\u2014</div>';return;}
      const key=a+'-'+b;
      const rec=D.h2h[key];
      if(!rec){h+='<div class="h2h-cell h2h-even">0-0</div>';return;}
      const cls=rec.w>rec.l?'h2h-win':rec.w<rec.l?'h2h-lose':'h2h-even';
      h+='<div class="h2h-cell '+cls+'">'+rec.w+'-'+rec.l+'</div>';
    });
  });
  h+='</div></div>';
  // ── ALL-PLAY RECORD ──
  h+='<div class="bh" style="margin-top:24px"><h2 class="bh-tag">All-Play</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">How Many Teams You\'d Beat Each Week</span></div></div>';
  h+='<div class="narrative"><div class="nar-item"><div class="nar-icon">\u{1F3AF}</div><div class="nar-text">All-play record: for each week, count how many of the other 11 teams your score would have beaten. This removes schedule luck entirely.</div></div></div>';
  const allPlay=rids.map(rid=>{
    const wk=D.weekly_scores[rid]||[];
    let apW=0,apL=0;
    wk.forEach((pts,wi)=>{
      rids.forEach(opp=>{
        if(opp===rid)return;
        const oppWk=D.weekly_scores[opp]||[];
        if(wi<oppWk.length){
          if(pts>oppWk[wi])apW++;
          else if(pts<oppWk[wi])apL++;
        }
      });
    });
    const s=CUR_STANDINGS.find(x=>x.roster_id===rid)||{wins:0,losses:0};
    const apPct=apW+apL>0?(apW/(apW+apL)*100).toFixed(1):'0';
    const luckDiff=s.wins-Math.round(apW/(apW+apL)*(s.wins+s.losses));
    return{rid,name:D.rid_to_name[rid],apW,apL,apPct:parseFloat(apPct),actW:s.wins,actL:s.losses,luckDiff};
  }).sort((a,b)=>b.apPct-a.apPct);
  h+='<div style="overflow-x:auto"><table class="ap-table"><thead><tr><th>#</th><th>Team</th><th>Actual</th><th>All-Play</th><th>AP%</th><th>Luck</th></tr></thead><tbody>';
  allPlay.forEach((t,i)=>{
    const lCls=t.luckDiff>0?'ap-luck-pos':t.luckDiff<0?'ap-luck-neg':'';
    h+='<tr><td>'+(i+1)+'</td><td style="font-weight:700">'+t.name+'</td><td>'+t.actW+'-'+t.actL+'</td><td>'+t.apW+'-'+t.apL+'</td><td style="font-family:var(--fm);font-weight:700;color:var(--a)">'+t.apPct+'%</td><td class="'+lCls+'">'+(t.luckDiff>0?'+':'')+t.luckDiff+'</td></tr>';
  });
  h+='</tbody></table></div>';
  // ── CONSISTENCY SCATTER ──
  h+='<div class="bh" style="margin-top:24px"><h2 class="bh-tag">Consistency</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Average Points vs Variance</span></div></div>';
  h+='<div class="narrative"><div class="nar-item"><div class="nar-icon">\u{1F4C9}</div><div class="nar-text">Top-right = high scoring + inconsistent (boom/bust). Top-left = low scoring + inconsistent (bad + volatile). Bottom-right = high scoring + consistent (elite). Bottom-left = low + consistent (mediocre but steady).</div></div></div>';
  h+='<canvas class="consistency-chart" id="scatter-chart"></canvas>';
  // ── PYTHAGOREAN WINS ──
  h+='<div class="bh" style="margin-top:24px"><h2 class="bh-tag">Pythagorean</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Expected Wins Based on Points For/Against</span></div></div>';
  h+='<div class="narrative"><div class="nar-item"><div class="nar-icon">\u{1F4D0}</div><div class="nar-text">Pythagorean expectation: uses PF and PA to calculate "deserved" wins. Teams above expected are overperforming, below are underperforming.</div></div></div>';
  // Calc PA per team from matchups
  const paMap={};
  rids.forEach(r=>{paMap[r]=0});
  Object.values(D.matchup_weeks).forEach(wk=>{
    wk.forEach(g=>{
      paMap[g.team_a.roster_id]=(paMap[g.team_a.roster_id]||0)+g.team_b.points;
      paMap[g.team_b.roster_id]=(paMap[g.team_b.roster_id]||0)+g.team_a.points;
    });
  });
  const pythData=rids.map(rid=>{
    const s=CUR_STANDINGS.find(x=>x.roster_id===rid)||{wins:0,losses:0,fpts:0};
    const pa=paMap[rid]||1;
    const games=s.wins+s.losses||1;
    const exp=2.37;
    const pyth=Math.pow(s.fpts,exp)/(Math.pow(s.fpts,exp)+Math.pow(pa,exp));
    const expWins=Math.round(pyth*games*10)/10;
    const diff=s.wins-expWins;
    return{name:D.rid_to_name[rid],pf:s.fpts,pa:Math.round(pa),actW:s.wins,expW:expWins,diff:Math.round(diff*10)/10};
  }).sort((a,b)=>b.diff-a.diff);
  h+='<div style="overflow-x:auto"><table class="ap-table"><thead><tr><th>#</th><th>Team</th><th>PF</th><th>PA</th><th>Actual W</th><th>Expected W</th><th>Diff</th></tr></thead><tbody>';
  pythData.forEach((t,i)=>{
    const cls=t.diff>0?'ap-luck-pos':t.diff<0?'ap-luck-neg':'';
    h+='<tr><td>'+(i+1)+'</td><td style="font-weight:700">'+t.name+'</td><td>'+t.pf+'</td><td>'+t.pa+'</td><td>'+t.actW+'</td><td style="font-family:var(--fm)">'+t.expW+'</td><td class="'+cls+'">'+(t.diff>0?'+':'')+t.diff+'</td></tr>';
  });
  h+='</tbody></table></div>';
  // ── STRENGTH OF SCHEDULE ──
  h+='<div class="bh" style="margin-top:24px"><h2 class="bh-tag">SOS</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Strength of Schedule \u2022 Opponent Win %</span></div></div>';
  const sosData=rids.map(rid=>{
    let oppWins=0,oppGames=0;
    Object.values(D.matchup_weeks).forEach(wk=>{
      wk.forEach(g=>{
        let opp=null;
        if(g.team_a.roster_id===rid)opp=g.team_b.roster_id;
        else if(g.team_b.roster_id===rid)opp=g.team_a.roster_id;
        if(opp){
          const os=CUR_STANDINGS.find(x=>x.roster_id===opp);
          if(os){oppWins+=os.wins;oppGames+=os.wins+os.losses;}
        }
      });
    });
    const sos=oppGames>0?(oppWins/oppGames*100).toFixed(1):50;
    return{name:D.rid_to_name[rid],sos:parseFloat(sos),oppWins,oppGames};
  }).sort((a,b)=>b.sos-a.sos);
  sosData.forEach(t=>{
    const col=t.sos>=55?'var(--red-t)':t.sos>=50?'var(--y)':'var(--a)';
    const label=t.sos>=55?'HARD':t.sos>=50?'AVERAGE':'EASY';
    h+='<div class="h-row"><span class="h-rk" style="color:'+col+'">'+label+'</span><span class="h-team">'+t.name+'</span><span style="font-family:var(--fm);font-size:14px;font-weight:700;color:'+col+'">'+t.sos+'%</span></div>';
  });
  document.getElementById('tab-analytics').innerHTML=h;
  // Draw scatter chart
  setTimeout(()=>{
    const cvs=document.getElementById('scatter-chart');
    if(!cvs)return;
    const ctx=cvs.getContext('2d');
    const dpr=window.devicePixelRatio||1;
    const w=cvs.offsetWidth||cvs.parentElement?.offsetWidth||900;
    const ht=cvs.offsetHeight||300;
    cvs.width=w*dpr;cvs.height=ht*dpr;
    ctx.scale(dpr,dpr);
    const pad={t:20,r:20,b:40,l:50};
    const pts=rids.map(rid=>{
      const wk=D.weekly_scores[rid]||[];
      const avg=wk.length?wk.reduce((a,b)=>a+b,0)/wk.length:0;
      const std=wk.length?Math.sqrt(wk.reduce((s,p)=>s+Math.pow(p-avg,2),0)/wk.length):0;
      return{name:D.rid_to_name[rid],avg,std};
    });
    const minA=Math.min(...pts.map(p=>p.avg))-5,maxA=Math.max(...pts.map(p=>p.avg))+5;
    const minS=0,maxS=Math.max(...pts.map(p=>p.std))+5;
    const sx=v=>pad.l+(v-minA)/(maxA-minA)*(w-pad.l-pad.r);
    const sy=v=>ht-pad.b-(v-minS)/(maxS-minS)*(ht-pad.t-pad.b);
    // Grid
    ctx.strokeStyle='#24242e';ctx.lineWidth=1;
    for(let i=0;i<5;i++){const y=pad.t+i*(ht-pad.t-pad.b)/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();}
    // Axes labels
    ctx.fillStyle='#666678';ctx.font='500 10px Inter';ctx.textAlign='center';
    ctx.fillText('Avg Points/Week \u2192',w/2,ht-8);
    ctx.save();ctx.translate(12,ht/2);ctx.rotate(-Math.PI/2);ctx.fillText('Std Deviation \u2192',0,0);ctx.restore();
    // Dots
    const colors=['#10B981','#3b82f6','#F59E0B','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316','#84cc16','#a78bfa','#fb923c','#22d3ee'];
    pts.forEach((p,i)=>{
      const x=sx(p.avg),y=sy(p.std);
      const col=colors[i%colors.length];
      ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
      ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='700 10px Oswald';ctx.textAlign='center';
      ctx.fillText(p.name.substring(0,12),x,y-13);
    });
  },200);
}

function renderMoves(){

  // Stats bar
  const waivers=moves.filter(m=>m.tp==='waiver').length;
  const fas=moves.filter(m=>m.tp==='free_agent').length;
  const comms=moves.filter(m=>m.tp==='commissioner').length;
  h+='<div class="narrative">';
  h+='<div class="nar-item"><div class="nar-icon">\u{1F4CA}</div><div class="nar-text"><b>'+waivers+'</b> waiver claims \u00b7 <b>'+fas+'</b> free agent adds \u00b7 <b>'+comms+'</b> commissioner moves</div></div>';

  const topMover=Object.entries(moverCounts).sort((a,b)=>b[1]-a[1])[0];
  if(topMover)h+='<div class="nar-item"><div class="nar-icon">\u{1F3C3}</div><div class="nar-text"><b>'+topMover[0]+'</b> most active on waivers with <b>'+topMover[1]+'</b> transactions</div></div>';
  h+='</div>';
  // Group by year/week
  const grouped={};
  moves.forEach(m=>{const key=m.yr+' Wk'+m.wk;if(!grouped[key])grouped[key]=[];grouped[key].push(m);});
  h+='<div class="move-feed">';
  Object.entries(grouped).sort((a,b)=>{
    const [aY,aW]=a[0].split(' Wk').map(Number);const [bY,bW]=b[0].split(' Wk').map(Number);
    return bY-aY||bW-aW;
  }).forEach(([key,ms])=>{
    h+='<div style="font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:2px;color:var(--a);text-transform:uppercase;margin-top:8px;padding-left:4px;border-left:3px solid var(--a);padding-left:10px">'+key+'</div>';
    ms.forEach(m=>{
      h+='<div class="move-card">';
      h+='<div class="move-wk"><span class="move-type '+m.tp+'">'+m.tp.replace('_',' ')+'</span></div>';
      h+='<div class="move-body"><div class="move-team">'+av(m.rid,28)+' '+D.rid_to_name[m.rid]+'</div><div class="move-detail">';
      if(m.add)h+='<span class="move-add">\u2795 '+m.add+'</span>';
      if(m.drop)h+='<span class="move-drop">\u274C '+m.drop+'</span>';
      h+='</div></div></div>';
    });
  });
  h+='</div>';
  document.getElementById('tab-moves').innerHTML=h;
}

function renderRivals(){
  const rivals=D.rivalries||[];
  let h='<div class="bh"><h2 class="bh-tag">\u{1F93A} Rivals</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">'+rivals.length+' Rivalry Matchups \u2022 Dominance Tracker</span></div></div>';

  h+='<div class="narrative"><div class="nar-item"><div class="nar-icon">\u{1F525}</div><div class="nar-text">Rivalries ranked by total games played. The dominance bar shows who owns the series. Rivalries are born in the regular season.</div></div></div>';
  // Sort by total games then dominance
  const sorted=rivals.slice().sort((a,b)=>b.total-a.total||(b.dominance||0)-(a.dominance||0));
  sorted.forEach(r=>{
    const totalG=r.a_wins+r.b_wins;
    const aPct=totalG>0?(r.a_wins/totalG*100):50;
    const bPct=100-aPct;
    const aCol=r.a_wins>r.b_wins?'var(--a)':'var(--g5)';
    const bCol=r.b_wins>r.a_wins?'var(--red-t)':'var(--g5)';
    const isDom=r.dominant&&r.dominated;
    h+='<div class="rival-card">';
    h+='<div class="rival-hdr">';
    h+='<div class="rival-vs">'+r.a+' <span style="color:var(--t4);font-size:12px">vs</span> '+r.b+'</div>';
    h+='<div class="rival-total">'+totalG+' games</div>';
    h+='</div>';
    h+='<div class="rival-bar-track">';
    h+='<div class="rival-bar-a" style="width:'+aPct+'%;background:'+aCol+'">'+r.a_wins+'W</div>';
    h+='<div class="rival-bar-b" style="background:'+bCol+'">'+r.b_wins+'W</div>';
    h+='</div>';
    if(isDom){h+='<div style="margin-top:6px;display:flex;gap:8px;align-items:center"><span class="rival-badge" style="background:rgba(204,0,0,.12);color:var(--a)">\u{1F451} '+r.dominant+' owns this rivalry</span></div>';}
    h+='</div>';
  });
  document.getElementById('tab-rivals').innerHTML=h;
}

  var teamContracts={};

    var tc={name:t.team_name,rid:t.roster_id,contracted:[],uncontracted:[],tagged:0,expiring:0,totalKtc:0};

// ═══ ANIMATED COUNTERS ═══
function animateCounters(){
  document.querySelectorAll('.count-up').forEach(function(el){
    var target=parseFloat(el.getAttribute('data-target'));
    var suffix=el.getAttribute('data-suffix')||'';
    var decimals=parseInt(el.getAttribute('data-decimals')||'0');
    var duration=800;
    var startTime=null;
    function step(timestamp){
      if(!startTime)startTime=timestamp;
      var progress=Math.min((timestamp-startTime)/duration,1);
      var eased=1-Math.pow(1-progress,3);
      var current=eased*target;
      el.textContent=decimals>0?current.toFixed(decimals):Math.round(current).toLocaleString();
      if(suffix)el.textContent+=suffix;
      if(progress<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

function openPP(playerId) {

    const p = t.players.find(p => p.id === String(playerId));
    if (p) { player = p; ownerTeam = t; }
  });
  if (!player) return;

  const con = D.contracts ? (D.contracts[player.name] || D.contracts['_id_'+player.id]) : null;
  const acqIcon = player.acq === 'draft' ? '\uD83C\uDFB0' : player.acq === 'trade' ? '\uD83D\uDD04' : player.acq === 'waiver' ? '\uD83D\uDCE5' : player.acq === 'free_agent' ? '\uD83C\uDF10' : '\u2795';

  );

  const exmH = D.exemption_history || {};

  let draftInfo = null;

  });

  // Owner avatar

  let contractHTML = '';

  const ktcRnk = con ? con.rnk : 0;
  const tierLbl = ktcRnk ? (ktcRnk <= 24 ? 'ELITE' : ktcRnk <= 60 ? 'STARTER' : ktcRnk <= 120 ? 'DEPTH' : 'FRINGE') : '';
  const tierCol = ktcRnk ? (ktcRnk <= 24 ? 'var(--a)' : ktcRnk <= 60 ? 'var(--y)' : ktcRnk <= 120 ? 'var(--t3)' : 'var(--t4)') : 'var(--t4)';
  if (con && con.contracted) {
    const yrColor = con.yrs >= 4 ? 'var(--grn)' : con.yrs >= 2 ? 'var(--y)' : 'var(--red-t)';
    const yrlbl = con.yrs <= 0 ? 'EXPIRING' : con.yrs + ' YR' + (con.yrs !== 1 ? 'S' : '');
    contractHTML = `<div class="pp-section">
      <div class="pp-section-title">Contract & Value</div>
      <div class="pp-contract-block">
        <div>
          <div class="pp-ktc-lbl">KTC Value</div>
          <div class="pp-ktc">${ktcVal ? ktcVal.toLocaleString() : '\u2014'}</div>
        </div>
        <div>
          <div class="pp-ktc-lbl">Dynasty Rank</div>
          <div class="pp-ktc" style="font-size:22px;color:var(--t2)">${ktcRnk ? '#' + Math.round(ktcRnk) : '\u2014'}</div>
        </div>
        <div class="pp-contract-pills">
          <span style="font-family:var(--fd);font-size:14px;font-weight:800;padding:6px 14px;border-radius:6px;background:${yrColor}22;color:${yrColor};border:1px solid ${yrColor}55">${yrlbl}</span>
          ${tierLbl ? '<span style="font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:1px;padding:4px 8px;border-radius:4px;background:' + tierCol + '22;color:' + tierCol + ';border:1px solid ' + tierCol + '44">' + tierLbl + '</span>' : ''}
          ${con.tag ? '<span style="font-family:var(--fd);font-size:11px;font-weight:700;padding:4px 8px;border-radius:4px;background:rgba(245,158,11,.15);color:var(--y)">\uD83C\uDFF7\uFE0F ' + con.tag.toUpperCase() + '</span>' : ''}
          ${con.exm ? '<span style="font-family:var(--fd);font-size:11px;font-weight:700;padding:4px 8px;border-radius:4px;background:rgba(139,92,246,.15);color:var(--pur)">\uD83D\uDD12 EXEMPT \u2022 ' + con.exm + '</span>' : ''}
        </div>
      </div>
    </div>`;
  } else {
    // Uncontracted or not in sheet — still show KTC value if available
    contractHTML = `<div class="pp-section">
      <div class="pp-section-title">Contract & Value</div>
      <div class="pp-contract-block">
        <div>
          <div class="pp-ktc-lbl">KTC Value</div>
          <div class="pp-ktc">${ktcVal ? ktcVal.toLocaleString() : '\u2014'}</div>
        </div>
        <div>
          <div class="pp-ktc-lbl">Dynasty Rank</div>
          <div class="pp-ktc" style="font-size:22px;color:var(--t2)">${ktcRnk ? '#' + Math.round(ktcRnk) : '\u2014'}</div>
        </div>
        <div class="pp-contract-pills">
          <span style="font-family:var(--fd);font-size:14px;font-weight:800;padding:6px 14px;border-radius:6px;background:var(--g4);color:var(--t3)">NO CONTRACT</span>
          ${tierLbl ? '<span style="font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:1px;padding:4px 8px;border-radius:4px;background:' + tierCol + '22;color:' + tierCol + ';border:1px solid ' + tierCol + '44">' + tierLbl + '</span>' : ''}
        </div>
      </div>
    </div>`;
  }

  // Trade history section
  let tradesHTML = '';
  if (trades.length > 0) {
    const tradeItems = trades.map(t => {
      const mySide = t.sides.find(s => s.players.some(p => String(p.id) === String(playerId)));
      const otherSide = t.sides.find(s => !s.players.some(p => String(p.id) === String(playerId)));
      const myAssets = [
        ...mySide.players.map(p => '<div class="pp-trade-asset highlight">👤 ' + p.nm + '</div>'),
        ...mySide.picks.map(pk => '<div class="pp-trade-asset">📦 ' + pk + '</div>'),
      ].join('');
      const otherAssets = otherSide ? [
        ...otherSide.players.map(p => '<div class="pp-trade-asset">👤 ' + p.nm + '</div>'),
        ...otherSide.picks.map(pk => '<div class="pp-trade-asset">📦 ' + pk + '</div>'),
      ].join('') : '';
      return `<div class="pp-trade-card">
        <div class="pp-trade-hdr">
          <span class="pp-trade-yr">${t.yr} · WK ${t.wk}</span>
          <span style="font-family:var(--fd);font-size:10px;color:var(--t4)">${mySide.name} ↔ ${otherSide ? otherSide.name : '?'}</span>
        </div>
        <div class="pp-trade-body">
          <div class="pp-trade-side">
            <div class="pp-trade-side-lbl">${mySide.name} receives</div>
            ${myAssets || '<div class="pp-trade-asset" style="color:var(--t4)">—</div>'}
          </div>
          <div class="pp-trade-sep">⇄</div>
          <div class="pp-trade-side">
            <div class="pp-trade-side-lbl">${otherSide ? otherSide.name : '?'} receives</div>
            ${otherAssets || '<div class="pp-trade-asset" style="color:var(--t4)">—</div>'}
          </div>
        </div>
      </div>`;
    }).join('');
    tradesHTML = `<div class="pp-section">
      <div class="pp-section-title">Trade History (${trades.length})</div>
      ${tradeItems}
    </div>`;
  } else {
    tradesHTML = `<div class="pp-section">
      <div class="pp-section-title">Trade History</div>
      <div class="pp-empty">Never traded — original roster or undrafted</div>
    </div>`;
  }

  const teamLogoUrl = player.team && player.team !== 'FA' ? TL(player.team) : '';
  const teamLogoEl = teamLogoUrl ? `<div class="pp-team-badge"><img src="${teamLogoUrl}" alt="${player.team}" onerror="this.remove()"></div>` : '';

  const ppPanel = document.getElementById('pp-panel');
  ppPanel.style.borderTop = `3px solid ${posColor}`;

  document.getElementById('pp-content').innerHTML = `
    <div class="pp-hero" style="background:linear-gradient(135deg,${posColor}20 0%,${posColor}08 40%,transparent 70%)">
      <div class="pp-hero-top">
        <div class="pp-img-wrap">
          <img class="pp-img" src="${PIF(player.id)}" onerror="this.src='${PI(player.id)}'" alt="${player.name}">
          ${teamLogoEl}
        </div>
        <div class="pp-info">
          <div class="pp-name">${player.name}</div>
          <div class="pp-meta">
            <span class="pp-pos-badge" style="background:${posColor}22;color:${posColor};border:1px solid ${posColor}44">${player.pos}</span>
            ${player.number ? '<span class="pp-num">#' + player.number + '</span>' : ''}
            ${player.team ? '<span class="pp-team-name">' + player.team + '</span>' : '<span class="pp-team-name" style="color:var(--t4)">Free Agent</span>'}
            ${player.is_starter ? '<span style="font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px;color:var(--grn)">⭐ STARTER</span>' : ''}
          </div>
          ${ownerTeam ? `<div class="pp-owner-row">
            ${ownerAv}
            <div>
              <div class="pp-owner-lbl">Current Owner</div>
              <div class="pp-owner-name">${ownerTeam.team_name}</div>
            </div>
          </div>` : ''}
        </div>
      </div>
    </div>
    <div class="pp-body">
      <div class="pp-section">
        <div class="pp-section-title">Player Info</div>
        <div class="pp-bio-grid">
          ${player.age ? `<div class="pp-bio-item"><div class="pp-bio-lbl">Age</div><div class="pp-bio-val">${player.age}</div></div>` : ''}
          ${player.years_exp !== undefined ? `<div class="pp-bio-item"><div class="pp-bio-lbl">Experience</div><div class="pp-bio-val">${player.years_exp === 0 ? 'Rookie' : player.years_exp + ' yrs'}</div></div>` : ''}
          ${player.college ? `<div class="pp-bio-item"><div class="pp-bio-lbl">College</div><div class="pp-bio-val" style="font-size:13px">${player.college}</div></div>` : ''}
          ${player.number ? `<div class="pp-bio-item"><div class="pp-bio-lbl">Jersey</div><div class="pp-bio-val">#${player.number}</div></div>` : ''}
        </div>
      </div>
      ${contractHTML}
      ${playerExms.length ? `<div class="pp-section">
        <div class="pp-section-title">Exemption History</div>
        ${playerExms.map(e => {
          const isTraded = e.from && e.from !== e.o;
          return `<div class="pp-acq-row" style="flex-wrap:wrap;gap:8px">
            <span style="font-family:var(--fd);font-size:13px;font-weight:800;color:var(--pur);min-width:36px">${e.year}</span>
            <span style="font-family:var(--fb);font-size:13px;color:var(--t2);flex:1">${e.o} used exemption${isTraded ? ' <span style="color:var(--blu)">(traded from ' + e.from + ')</span>' : ''}</span>
            <span style="font-family:var(--fm);font-size:12px;font-weight:700;color:var(--a)">${e.had !== null ? e.had + 'yr' : '\u2014'} \u2192 ${e.new_yrs}yr</span>
            ${e.note ? '<div style="width:100%;font-family:var(--fb);font-size:11px;color:var(--t4);font-style:italic;padding-left:44px">' + e.note + '</div>' : ''}
          </div>`;
        }).join('')}
      </div>` : ''}
      <div class="pp-section">
        <div class="pp-section-title">Acquisition</div>
        <div class="pp-acq-row">
          <span class="pp-acq-icon">${acqIcon}</span>
          <div class="pp-acq-detail">
            <div>${acqText}</div>
            ${draftInfo ? '<div style="font-family:var(--fd);font-size:11px;color:var(--t4);margin-top:4px">Drafted ' + draftInfo.year + ' \u2022 Rd' + draftInfo.round + ' Pick ' + draftInfo.pick + '</div>' : ''}
          </div>
        </div>
      </div>
      ${tradesHTML}
    </div>
  `;

  document.getElementById('pp-overlay').classList.add('open');
  document.getElementById('pp-panel').scrollTop = 0;
}

function closePP() {
  document.getElementById('pp-overlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePP(); });
// Delegated click handler for all pp-trigger elements
document.addEventListener('click', e => {
  const el = e.target.closest('.pp-trigger[data-pid]');
  if (el) { e.stopPropagation(); openPP(el.dataset.pid); }
});
// ═══ END PLAYER PROFILE MODAL ═══

</script>

<div class="pp-overlay" id="pp-overlay">
  <div class="pp-backdrop" onclick="closePP()"></div>
  <div class="pp-panel" id="pp-panel">
    <button class="pp-close" onclick="closePP()" aria-label="Close">✕</button>
    <div id="pp-content"></div>
  </div>
</div>

</body>
</html>
