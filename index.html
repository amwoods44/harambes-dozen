/* ═══ GM DASHBOARD ═══ */
.gm-select{display:flex;gap:var(--sp-2);flex-wrap:wrap;margin:var(--sp-3) 0}
.gm-btn{font-family:var(--fd);font-size:var(--text-sm);font-weight:700;padding:var(--sp-2) var(--sp-4);border-radius:var(--radius-md);border:1px solid var(--g4);background:var(--g2);color:var(--t3);cursor:pointer;min-height:44px}
.gm-btn:hover,.gm-btn.active{background:var(--a);color:#000;border-color:var(--a)}
.gm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:var(--sp-5);margin:var(--sp-4) 0}
.gm-card{background:var(--g2);border:1px solid var(--g4);border-radius:var(--radius-lg);padding:0;overflow:hidden;box-shadow:var(--shadow-md);cursor:pointer}
.gm-card:hover{border-color:var(--g5);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.gm-card-title{font-family:var(--fd);font-size:var(--text-xs);font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--a);padding:var(--sp-4) var(--sp-5);border-bottom:1px solid var(--g3);display:flex;align-items:center;gap:var(--sp-2)}
.gm-stat-row{display:flex;justify-content:space-between;padding:var(--sp-2) var(--sp-5);border-bottom:1px solid var(--g3);border-radius:0}
.gm-stat-row:last-child{border-bottom:none}
.gm-stat-row:nth-child(even){background:rgba(255,255,255,.02)}
.gm-stat-row:hover{background:rgba(204,0,0,.04);box-shadow:inset 3px 0 0 var(--a)}
.gm-stat-label{font-family:var(--fb);font-size:var(--text-sm);color:var(--t3)}
.gm-stat-val{font-family:var(--fm);font-size:var(--text-base);font-weight:700;color:var(--t1)}
/* ═══ RIVALS TAB ═══ */
.rival-card{background:var(--g2);border:1px solid var(--g5);border-radius:10px;padding:16px;margin-bottom:12px;transition:border-color .2s,box-shadow .2s}
.rival-card:hover{border-color:var(--g6);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.rival-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rival-vs{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--t1)}
.rival-total{font-family:var(--fm);font-size:12px;color:var(--t4)}
.rival-bar-track{height:28px;background:var(--g3);border-radius:6px;overflow:hidden;display:flex;position:relative}
.rival-bar-a{height:100%;display:flex;align-items:center;justify-content:flex-start;padding-left:8px;font-family:var(--fd);font-size:12px;font-weight:700;color:#fff;transition:width .6s}
.rival-bar-b{height:100%;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-family:var(--fd);font-size:12px;font-weight:700;color:#fff;flex:1}
.rival-badge{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:2px 8px;border-radius:3px}
/* ═══ PLAYOFF BRACKET ═══ */
.bracket-wrap{margin:16px 0}
.bracket-yr-sel{display:flex;gap:4px;margin-bottom:12px}
.bracket-yr-btn{font-family:var(--fd);font-size:12px;font-weight:700;padding:6px 16px;border-radius:4px;border:1px solid var(--g4);background:var(--g2);color:var(--t3);cursor:pointer;transition:all .2s}
.bracket-yr-btn:hover,.bracket-yr-btn.active{background:var(--a);color:#000;border-color:var(--a)}
/* ═══ SUB-TAB BUTTONS ═══ */
.tab-sub{display:flex;gap:6px;flex-wrap:wrap}
.tab-sub-btn{font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:1px;padding:8px 18px;border-radius:6px;border:1px solid var(--g4);background:var(--g2);color:var(--t3);cursor:pointer;transition:all .2s cubic-bezier(.22,1,.36,1);text-transform:uppercase}
.tab-sub-btn:hover:not(.active){border-color:var(--a);color:var(--t1)}
.tab-sub-btn.active{background:var(--a);color:#000;border-color:var(--a);box-shadow:0 0 12px rgba(204,0,0,.25)}
.tab-sub-btn:active{transform:scale(.94)}
.bracket-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--sp-3);margin:var(--sp-3) 0}
.bracket-slot{background:var(--g2);border:1px solid var(--g4);border-radius:var(--radius-md);padding:var(--sp-3) var(--sp-4);display:flex;justify-content:space-between;align-items:center;gap:var(--sp-3)}
.bracket-slot.winner{border-color:var(--y);background:linear-gradient(90deg,rgba(255,204,0,.06),transparent)}
.bracket-slot.loser{opacity:.5}
.bracket-slot .b-seed{font-family:var(--fm);font-size:var(--text-xs);color:var(--t4);min-width:20px}
.bracket-slot .b-name{font-family:var(--fd);font-size:var(--text-sm);font-weight:600;color:var(--t1);flex:1}
.bracket-slot .b-pts{font-family:var(--fm);font-size:var(--text-sm);font-weight:700;color:var(--y)}
.bracket-round{font-family:var(--fd);font-size:var(--text-2xs);font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t4);text-align:center;margin-bottom:var(--sp-2)}
.bracket-round.champ-round{color:var(--y)}
/* ═══ RACE CHART ═══ */
.race-canvas{width:100%;height:280px;background:var(--g2);border-radius:8px;border:1px solid var(--g4);margin:16px 0}
/* ═══ COMPARISON TOOL ═══ */
.cmp-wrap{margin:16px 0}
.cmp-selects{display:flex;gap:12px;margin-bottom:16px;align-items:center}
.cmp-sel{font-family:var(--fd);font-size:13px;font-weight:700;padding:8px 12px;border-radius:6px;border:1px solid var(--g4);background:var(--g2);color:var(--t1);cursor:pointer;flex:1;max-width:260px}
.cmp-vs{font-family:var(--fd);font-size:14px;font-weight:800;color:var(--t4);padding:0 4px}
.cmp-grid{display:grid;grid-template-columns:1fr 60px 1fr;gap:8px}
.cmp-row{display:contents}
.cmp-val{font-family:var(--fm);font-size:14px;font-weight:700;padding:8px;border-radius:6px}
.cmp-val.left{text-align:right;background:var(--g2)}
.cmp-val.right{text-align:left;background:var(--g2)}
.cmp-val.better{color:var(--a)}
.cmp-label{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t4);display:flex;align-items:center;justify-content:center;padding:8px 4px}
/* ═══ RADAR CHART ═══ */
.radar-canvas{width:100%;max-width:400px;height:300px;margin:16px auto}
/* ═══ DRAFT BOARD GRID ═══ */
.draft-board{overflow-x:auto;margin:var(--sp-4) 0}
.db-grid{display:grid;gap:3px;min-width:780px}
.db-cell{padding:var(--sp-2);font-family:var(--fb);font-size:var(--text-2xs);text-align:center;border-radius:var(--radius-sm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative}
.db-cell:hover{outline:2px solid var(--y);z-index:2;box-shadow:var(--shadow-md)}
.db-cell.hdr{background:var(--g3);font-family:var(--fd);font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);font-size:var(--text-xs)}
.db-cell .db-name{font-weight:700;color:var(--t1);font-size:var(--text-sm)}
.db-cell .db-pos{font-family:var(--fd);font-size:var(--text-2xs);font-weight:700;letter-spacing:1px}
/* ═══ MANAGER BADGES ═══ */
.badge-row{display:flex;gap:var(--sp-1);flex-wrap:wrap;margin-top:var(--sp-1)}
.mgr-badge{font-family:var(--fd);font-size:var(--text-xs);font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:var(--sp-1) var(--sp-3);border-radius:var(--radius-sm);white-space:nowrap}
/* ═══ NEW TAB RESPONSIVE ═══ */
@media(max-width:768px){
  .award-grid{grid-template-columns:1fr}
  .gm-grid{grid-template-columns:1fr}
  .bracket-grid{grid-template-columns:1fr}
  .cmp-selects{flex-direction:column}
  .cmp-sel{max-width:100%}
  .cmp-grid{grid-template-columns:1fr 50px 1fr}
  .h2h-grid{font-size:10px}
  .h2h-hdr{font-size:9px;padding:4px 2px}
  .h2h-cell{font-size:10px;padding:4px 1px;min-height:28px}
}
@media(max-width:480px){
  .award-emoji{font-size:36px}
  .award-winner{font-size:18px}
  .move-card{padding:10px 12px}
  .gm-btn{font-size:10px;padding:6px 10px}
  .rival-vs{font-size:14px}
}
/* ═══ ANIMATIONS & TRANSITIONS ═══ */
.panel{display:none;padding-bottom:32px}
.panel.active{display:block}
.panel.wipe-in{animation:wipeIn .4s ease-out}
.stagger>*{opacity:0;transform:translateY(10px);animation:staggerIn .4s ease forwards}
@keyframes staggerIn{to{opacity:1;transform:translateY(0)}}
.stagger>*:nth-child(1){animation-delay:.03s}.stagger>*:nth-child(2){animation-delay:.06s}.stagger>*:nth-child(3){animation-delay:.09s}.stagger>*:nth-child(4){animation-delay:.12s}.stagger>*:nth-child(5){animation-delay:.15s}.stagger>*:nth-child(6){animation-delay:.18s}.stagger>*:nth-child(7){animation-delay:.21s}.stagger>*:nth-child(8){animation-delay:.24s}.stagger>*:nth-child(9){animation-delay:.27s}.stagger>*:nth-child(10){animation-delay:.3s}.stagger>*:nth-child(11){animation-delay:.33s}.stagger>*:nth-child(12){animation-delay:.36s}
.count-up{display:inline-block}
.tilt-card{transition:transform .2s ease;transform-style:preserve-3d}
.tilt-card:hover{transform:perspective(800px) rotateX(2deg) rotateY(-2deg) scale(1.01)}
.hero-parallax{transition:transform .3s ease}
/* ═══ CONSTITUTION ═══ */
.const-section{margin:20px 0;padding:20px;background:var(--g2);border:1px solid var(--g4);border-radius:12px;border-left:3px solid var(--a)}
.const-num{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--a);margin-bottom:8px}
.const-title{font-family:var(--fd);font-size:18px;font-weight:800;color:var(--t1);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.const-body{font-family:var(--fb);font-size:13px;color:var(--t2);line-height:1.7}
.const-body b{color:var(--t1)}
.const-body .const-highlight{color:var(--a);font-weight:700}
.const-list{list-style:none;padding:0;margin:8px 0}
.const-list li{padding:6px 10px;border-bottom:1px solid var(--g3);display:flex;justify-content:space-between;transition:background .15s,box-shadow .15s;border-radius:3px}
.const-list li:last-child{border-bottom:none}
.const-list li:nth-child(even){background:rgba(255,255,255,.02)}
.const-list li:hover{background:rgba(204,0,0,.04);box-shadow:inset 3px 0 0 var(--a)}
.const-list .cl-label{color:var(--t3);font-size:12px}
.const-list .cl-value{font-family:var(--fm);font-weight:700;color:var(--t1);font-size:13px}
/* ═══ WAR ROOM ═══ */
.wr-countdown{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin:16px 0}
.wr-timer{background:var(--g2);border:1px solid var(--g4);border-radius:12px;padding:20px;text-align:center;position:relative;overflow:hidden}
.wr-timer::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.wr-timer.urgent::before{background:var(--red-t);animation:pulse 1.4s infinite}
.wr-timer.soon::before{background:var(--y)}
.wr-timer.future::before{background:var(--a)}
.wr-timer-label{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.wr-timer-val{font-family:var(--fm);font-size:28px;font-weight:800;color:var(--t1);line-height:1}
.wr-timer-unit{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--t4);margin-top:4px;text-transform:uppercase}
.wr-timer-date{font-family:var(--fb);font-size:11px;color:var(--t4);margin-top:8px}
.wr-checklist{margin:16px 0}
.wr-team-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--g2);border:1px solid var(--g4);border-radius:10px;margin-bottom:8px;transition:border-color .2s,background .15s,box-shadow .15s}
.wr-team-row:nth-child(even){background:rgba(255,255,255,.02)}
.wr-team-row:hover{border-color:var(--g5);background:rgba(204,0,0,.04);box-shadow:inset 3px 0 0 var(--a)}
.wr-indicators{display:flex;gap:6px;margin-left:auto;flex-shrink:0}
.wr-ind{width:10px;height:10px;border-radius:50%}
.wr-ind.green{background:var(--grn);box-shadow:0 0 6px rgba(23,177,105,.4)}
.wr-ind.yellow{background:var(--y);box-shadow:0 0 6px rgba(245,158,11,.4)}
.wr-ind.red{background:var(--red-t);box-shadow:0 0 6px rgba(239,68,68,.4)}
/* ═══ PULSE FEED ═══ */
.pulse-card{background:var(--g2);border:1px solid var(--g4);border-radius:12px;padding:16px 20px;margin-bottom:12px;border-left:3px solid var(--a);transition:border-color .2s}
.pulse-card:hover{border-color:var(--a)}
.pulse-card.trade{border-left-color:var(--y)}
.pulse-card.record{border-left-color:var(--red-t)}
.pulse-card.exemption{border-left-color:var(--pur)}
.pulse-card.power{border-left-color:var(--blu)}
.pulse-tag{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:8px}
.pulse-tag.trade{background:rgba(245,158,11,.12);color:var(--y)}
.pulse-tag.record{background:rgba(239,68,68,.12);color:var(--red-t)}
.pulse-tag.exemption{background:rgba(139,92,246,.12);color:var(--pur)}
.pulse-tag.power{background:rgba(59,130,246,.12);color:var(--blu)}
.pulse-tag.draft{background:rgba(204,0,0,.12);color:var(--a)}
.pulse-tag.championship{background:rgba(245,158,11,.18);color:var(--y)}
.pulse-headline{font-family:var(--fd);font-size:18px;font-weight:800;color:var(--t1);line-height:1.2;margin-bottom:6px}
.pulse-body{font-family:var(--fb);font-size:13px;color:var(--t3);line-height:1.5}
.pulse-meta{font-family:var(--fm);font-size:10px;color:var(--t4);margin-top:8px;letter-spacing:1px}
/* ═══ CHRONICLE TIMELINE ═══ */
.chronicle{position:relative;overflow-x:auto;overflow-y:hidden;padding:40px 20px 20px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.chronicle-track{display:flex;gap:0;min-width:max-content;position:relative}
.chronicle-year{scroll-snap-align:start;min-width:300px;padding:0 20px;position:relative}
.chronicle-year-label{font-family:var(--fd);font-size:48px;font-weight:900;color:var(--g4);position:sticky;left:20px;margin-bottom:16px;letter-spacing:-2px}
.chronicle-line{position:absolute;top:80px;left:0;right:0;height:2px;background:var(--g4)}
.chronicle-dot{width:12px;height:12px;border-radius:50%;position:absolute;top:75px;z-index:2;cursor:pointer;transition:transform .2s}
.chronicle-dot:hover{transform:scale(1.5)}
.chronicle-dot.champ{background:var(--y);box-shadow:0 0 12px rgba(245,158,11,.5)}
.chronicle-dot.trade{background:var(--a);box-shadow:0 0 8px rgba(204,0,0,.4)}
.chronicle-dot.record{background:var(--red-t);box-shadow:0 0 8px rgba(239,68,68,.4)}
.chronicle-dot.exemption{background:var(--pur);box-shadow:0 0 8px rgba(139,92,246,.4)}
.chronicle-event{background:var(--g2);border:1px solid var(--g4);border-radius:10px;padding:12px 16px;margin-top:100px;margin-bottom:12px;width:260px;transition:border-color .2s,transform .2s}
.chronicle-event:hover{border-color:var(--g5);transform:translateY(-2px)}
.chronicle-event-icon{font-size:24px;margin-bottom:6px}
.chronicle-event-title{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--t1);margin-bottom:4px}
.chronicle-event-body{font-family:var(--fb);font-size:11px;color:var(--t3);line-height:1.4}
.chronicle-event-date{font-family:var(--fm);font-size:10px;color:var(--t4);margin-top:6px;letter-spacing:1px}
.chronicle-nav{display:flex;gap:6px;margin:12px 0;flex-wrap:wrap}
/* ═══ TRADE GRADES ═══ */
.trade-grade{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:var(--radius-full);font-family:var(--fd);font-size:var(--text-md);font-weight:800;flex-shrink:0;color:#fff}
.trade-grade.a{background:linear-gradient(135deg,#17b169,#0d7a47);box-shadow:0 0 12px rgba(23,177,105,.3)}
.trade-grade.b{background:linear-gradient(135deg,#3b82f6,#2563eb)}
.trade-grade.c{background:linear-gradient(135deg,#d4a017,#b8860b)}
.trade-grade.d{background:linear-gradient(135deg,#f59e0b,#d97706)}
.trade-grade.f{background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 0 12px rgba(239,68,68,.3)}
.trade-ktc{font-family:var(--fm);font-size:11px;font-weight:700}
.trade-ktc.pos{color:var(--grn)}
.trade-ktc.neg{color:var(--red-t)}
/* ═══ SCOUTING REPORTS ═══ */
.scout-card{background:var(--g2);border:1px solid var(--g4);border-radius:12px;padding:20px;margin-top:16px}
.scout-narrative{font-family:var(--fb);font-size:14px;color:var(--t2);line-height:1.7;padding:16px;background:var(--g3);border-radius:8px;border-left:3px solid var(--a);margin:12px 0;font-style:italic}
.scout-grades{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:12px 0}
.scout-grade{text-align:center;padding:12px;background:var(--g3);border-radius:8px}
.scout-grade-val{font-family:var(--fd);font-size:24px;font-weight:800}
.scout-grade-label{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-top:4px}
/* ═══ SHARE CARDS ═══ */
.share-btn{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:6px 12px;border-radius:4px;border:1px solid var(--g4);background:var(--g2);color:var(--t3);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.share-btn:hover{border-color:var(--a);color:var(--a);background:rgba(204,0,0,.08)}
.share-modal{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.share-modal.open{opacity:1;pointer-events:auto}
.share-preview{background:var(--g1);border:1px solid var(--g4);border-radius:16px;padding:24px;max-width:500px;width:90%;position:relative}
.share-watermark{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t4);text-align:center;margin-top:16px;padding-top:12px;border-top:1px solid var(--g4)}

/* ═══ CUSTOM SCROLLBAR ═══ */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--g1)}
::-webkit-scrollbar-thumb{background:var(--g5);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--a)}

/* ═══ SECTION SPACING ═══ */
.panel > .bh{margin-top:32px}
.panel > .bh:first-child{margin-top:20px}

/* ═══ CONTRACT BAR UPGRADE ═══ */
.contract-bar,.cb-fill,.kb-fill,.cb-track{min-width:40px}

/* ═══ EMPTY STATE STYLING ═══ */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;color:var(--t4);text-align:center}
.empty-state-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-state-text{font-family:var(--fd);font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4)}

/* ═══ STAT STRIP CHAMPION GOLD BORDER ═══ */
.ss.champ{border-left:2px solid rgba(245,158,11,.4);border-right:2px solid rgba(245,158,11,.4)}
.ss.champ .ss-l{color:var(--y)}

/* ═══ MICRO-POLISH ═══ */
.mu-card:hover{border-color:var(--g6);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.sc-card:hover{border-color:var(--g6);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.trophy-card:hover{border-color:rgba(245,158,11,.3);box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 0 1px rgba(245,158,11,.15)}
/* ═══ BATCH 2-7 ADDITIONS ═══ */
/* Item 10: 2-col trade grid */
.trade-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:16px;align-items:start}
@media(max-width:900px){.trade-grid{grid-template-columns:1fr;gap:12px}}
.trade-grid .trade-card{margin-bottom:0}
/* Item 12: Winner emphasis — now handled by .mu-sc.win/.lose in matchup card section */
/* Item 15: Nav scroll indicators — position:sticky from line 150 already establishes containing block */
.nav-bar::before{content:'';position:absolute;top:0;left:0;bottom:0;width:32px;background:linear-gradient(90deg,rgba(26,20,16,.95),transparent);pointer-events:none;z-index:2;opacity:0;transition:opacity .2s}
.nav-bar.scrolled-right::before{opacity:1}
.nav-bar.scrolled-end::after{opacity:0}
.nav-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:28px;height:28px;border-radius:50%;background:var(--g3);border:1px solid var(--g5);color:var(--t3);font-size:12px;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .2s;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.nav-arrow.left{left:4px}
.nav-arrow.right{right:4px}
.nav-bar.scrolled-right .nav-arrow.left{opacity:.8;pointer-events:auto}
.nav-bar:not(.scrolled-end) .nav-arrow.right{opacity:.8;pointer-events:auto}
@media(max-width:480px){.nav-arrow{display:none}}
/* Item 9: H2H rotated column headers */
.h2h-hdr.rot{writing-mode:horizontal-tb;transform:none;height:auto;text-align:center;justify-content:center;color:var(--t2);font-size:10px;letter-spacing:1.5px;padding:10px 3px}
.h2h-matrix{padding-top:0}
/* Item 14: Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 24px;min-height:200px}
.empty-state-icon{font-size:48px;opacity:.4;margin-bottom:16px;animation:emptyFloat 3s ease-in-out infinite}
@keyframes emptyFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.empty-state-text{font-family:var(--fd);font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t4)}
.empty-state-sub{font-family:var(--fb);font-size:12px;color:var(--t4);opacity:.6;margin-top:4px}
/* Item 16: Dynasty tier tags */
.dtier{display:inline-block;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle}
.dtier-elite{background:rgba(204,0,0,.10);color:#cc0000}
.dtier-star{background:rgba(245,158,11,.10);color:#ffcc00}
.dtier-starter{background:rgba(59,130,246,.10);color:#3b82f6}
.dtier-depth{background:rgba(255,255,255,.04);color:#999}
.dtier-dart{background:rgba(255,255,255,.02);color:#666}
/* Item 1: Contract pills */
.cpill{display:inline-flex;align-items:center;gap:2px;height:16px;border-radius:4px;padding:0 5px;font-family:var(--fm);font-size:10px;font-weight:700;letter-spacing:.5px;margin-left:4px;vertical-align:middle}
.cpill-4{background:rgba(23,177,105,.12);color:#17b169}
.cpill-23{background:rgba(245,158,11,.12);color:#ffcc00}
.cpill-1{background:rgba(239,68,68,.12);color:#ff4444}
.cpill-0{background:rgba(239,68,68,.20);color:#ff4444;animation:pulse 1.4s infinite}
/* Item 18: Dynasty scatter */
.dynasty-scatter{width:100%;height:320px;border-radius:12px;border:1px solid var(--g4);background:var(--g2);display:block;margin:16px 0}
/* Item 19: Manager cards */
.mgr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-4);margin-top:var(--sp-4)}
@media(max-width:900px){.mgr-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.mgr-grid{grid-template-columns:1fr}}
.mgr-card{background:var(--g2);border:1px solid var(--g4);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;box-shadow:var(--shadow-md)}
.mgr-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--g5)}
.mgr-hdr{padding:var(--sp-4);display:flex;align-items:center;gap:var(--sp-3);position:relative;border-bottom:1px solid var(--g3)}
.mgr-arch{position:absolute;top:var(--sp-3);right:var(--sp-3);font-family:var(--fd);font-size:var(--text-xs);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:var(--sp-1) var(--sp-3);border-radius:var(--radius-sm)}
.mgr-name{font-family:var(--fd);font-size:var(--text-lg);font-weight:800;text-transform:uppercase;letter-spacing:.5px;line-height:1}
.mgr-sub{font-family:var(--fm);font-size:var(--text-2xs);color:var(--t3);margin-top:2px}
.mgr-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--g4)}
.mgr-stat{padding:var(--sp-2) var(--sp-2);text-align:center;background:var(--g2)}
.mgr-sv{font-family:var(--fd);font-size:var(--text-md);font-weight:800;font-variant-numeric:tabular-nums}
.mgr-sl{font-family:var(--fd);font-size:var(--text-2xs);font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-top:2px}
.mgr-badges{display:flex;flex-wrap:wrap;gap:var(--sp-1);padding:var(--sp-2) var(--sp-3);border-top:1px solid var(--g3)}
.mgr-sel{border-width:2px!important}
/* ═══ PADDING NORMALIZATION — Standard: 16px 20px | Compact: 12px 16px | Headers: 12px 20px ═══ */
.trade-side{padding:16px 20px}
.trade-hdr{padding:12px 20px}
/* .mu-top replaced by .mu-body */
.sc-card{padding:16px 20px}
.pk-card{padding:16px 20px}
.narrative{padding:16px 20px}
.trophy-card{padding:16px 20px}
.const-section{padding:16px 20px}
.wr-timer{padding:16px 20px}
.luck-hdr{padding:0 0 8px}
@media(max-width:600px){
  .trade-side{padding:12px 14px}
  .sc-card,.pk-card,.narrative,.trophy-card,.const-section,.wr-timer{padding:12px 14px}
}
/* ═══ SPACING + ELEVATION PASS ═══ */
/* Page depth: warm gradient — base color matches new warm --g1/#0e0c0b */
body{background:linear-gradient(180deg,#1a1410 0%,#120e0c 30%,#0e0906 100%)}
/* Panel breathing room */
.panel.active{padding-top:20px;padding-bottom:64px}
/* Section headers: 60px luxury gap above each, 8px at panel top */
.panel>.bh{margin-top:60px}
.panel>.bh:first-child,.panel>*:first-child .bh{margin-top:8px}
/* Smooth transitions cover box-shadow on these cards */
.trade-card,.luck-card,.mu-card,.sc-card,.award-card,.gm-card,.rival-card,.move-card,.pk-card{transition:all .25s cubic-bezier(.22,1,.36,1)}
/* Resting elevation — every card lifts slightly off the dark page */
.pcard{box-shadow:0 2px 14px rgba(0,0,0,.4),0 1px 4px rgba(0,0,0,.2)}
.trade-card,.luck-card,.mu-card,.sc-card,.award-card,.gm-card,.rival-card,.pulse-card,.narrative,.move-card{box-shadow:0 2px 14px rgba(0,0,0,.38)}
.pk-card,.const-section,.wr-timer,.scout-card,.mgr-card{box-shadow:0 2px 14px rgba(0,0,0,.38)}
/* Trophy: featured depth + gold glow */
.trophy-card{box-shadow:0 4px 28px rgba(0,0,0,.55),0 0 56px rgba(245,158,11,.05)}
/* Hover: deeper lift + stronger shadow on all card types */
.pcard:hover{box-shadow:0 10px 44px rgba(0,0,0,.65),0 4px 12px rgba(0,0,0,.3);transform:translateY(-2px)}
.trade-card:hover,.luck-card:hover,.award-card:hover,.gm-card:hover,.rival-card:hover,.move-card:hover{box-shadow:0 8px 36px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.25);transform:translateY(-2px)}
.mu-card:hover,.sc-card:hover{box-shadow:0 8px 36px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.25);transform:translateY(-2px);border-color:var(--g5)}
.pk-card:hover{box-shadow:0 8px 36px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.25);transform:translateY(-2px);border-color:var(--g6)}
.mgr-card:hover{box-shadow:0 10px 44px rgba(0,0,0,.5),0 4px 12px rgba(0,0,0,.25)}
/* List + grid gaps: more air between cards */
.plist{gap:12px}
.award-grid{gap:20px}
.gm-grid{gap:20px}
.move-feed{gap:12px}
.pk-grid{gap:12px}
/* Individual card bottom margins */
.sc-card{margin-bottom:12px}
.mu-card{margin-bottom:12px}
.luck-card{margin-bottom:12px}
/* Table / matrix sections: more vertical breathing */
.h2h-matrix,.hm-wrap,.cmp-wrap{margin:24px 0}
/* Rafters: more room below ceiling */
/* rafters responsive handled by flex-wrap in .rafters-row */

/* ═══ GLOBAL CARD & BUTTON SYSTEM ═══ */
.card-base{background:var(--g2);border:1px solid var(--g4);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm)}
.card-interactive{cursor:pointer}
.card-interactive:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--g5)}
.card-interactive:active{transform:translateY(0);box-shadow:var(--shadow-sm)}
.card-featured{border-color:var(--yd)!important;box-shadow:var(--shadow-md),var(--shadow-glow-gold)!important}
.btn-primary{padding:var(--sp-2) var(--sp-4);border-radius:var(--radius-md);background:var(--g3);border:1px solid var(--g5);color:var(--t3);font:600 var(--text-xs) var(--fd);letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:var(--sp-2);min-height:36px}
.btn-primary:hover{background:var(--g4);color:var(--t1);border-color:var(--g6)}
.btn-accent{padding:var(--sp-2) var(--sp-4);border-radius:var(--radius-md);background:var(--a);border:1px solid var(--a);color:var(--t1);font:700 var(--text-sm) var(--fd);letter-spacing:1px;cursor:pointer;min-height:44px;min-width:44px;display:grid;place-items:center;box-shadow:var(--shadow-glow-red)}
.btn-ghost{padding:var(--sp-2) var(--sp-4);border-radius:var(--radius-md);background:transparent;border:1px solid var(--g4);color:var(--t4);font:600 var(--text-sm) var(--fd);letter-spacing:1px;cursor:pointer;min-height:44px;min-width:44px;display:grid;place-items:center}
.btn-ghost:hover{background:var(--g3);color:var(--t2);border-color:var(--g5)}
/* Game classification badges */
.game-badge{font:700 var(--text-2xs)/1 var(--fd);padding:var(--sp-1) var(--sp-2);border-radius:var(--radius-sm);letter-spacing:1px;text-transform:uppercase;display:inline-block}
.game-badge.thriller{background:rgba(255,204,0,.12);color:var(--y);border:1px solid rgba(255,204,0,.25)}
.game-badge.blowout{background:var(--red-bg);color:var(--red-t);border:1px solid rgba(255,68,68,.25)}
.game-badge.close{background:rgba(59,130,246,.12);color:var(--blu);border:1px solid rgba(59,130,246,.25)}
.game-badge.normal{background:var(--g3);color:var(--t3);border:1px solid var(--g4)}
/* Trade grade circles — larger, gradient-filled */
.grade-circle{width:40px;height:40px;border-radius:var(--radius-full);display:grid;place-items:center;font:800 var(--text-md)/1 var(--fd);color:#fff;flex-shrink:0}
.grade-circle.ga{background:linear-gradient(135deg,#17b169,#0d7a47);box-shadow:0 0 12px rgba(23,177,105,.3)}
.grade-circle.gb{background:linear-gradient(135deg,#3b82f6,#2563eb)}
.grade-circle.gc{background:linear-gradient(135deg,#d4a017,#b8860b)}
.grade-circle.gd{background:linear-gradient(135deg,#f59e0b,#d97706)}
.grade-circle.gf{background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 0 12px rgba(239,68,68,.3)}

/* ═══ PLAYER PROFILE MODAL ═══ */
.pp-overlay{position:fixed;inset:0;z-index:2000;pointer-events:none;display:flex;justify-content:center;align-items:center;padding:20px}
.pp-overlay.open{pointer-events:auto}
.pp-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0);backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);transition:background .35s,backdrop-filter .35s,-webkit-backdrop-filter .35s;cursor:pointer}
.pp-overlay.open .pp-backdrop{background:rgba(0,0,0,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.pp-panel{position:relative;width:min(720px,96vw);max-height:90vh;background:var(--g2);border:1px solid rgba(255,255,255,.07);border-radius:22px;overflow-y:auto;overflow-x:hidden;transform:scale(.93) translateY(28px);opacity:0;transition:transform .32s cubic-bezier(.22,1,.36,1),opacity .25s ease;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--g5) transparent;box-shadow:0 48px 120px rgba(0,0,0,.95),0 0 0 1px rgba(255,255,255,.04),inset 0 1px 0 rgba(255,255,255,.06)}
.pp-overlay.open .pp-panel{transform:scale(1) translateY(0);opacity:1}
.pp-close{position:absolute;top:14px;right:14px;z-index:10;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.65);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);line-height:1}
.pp-close:hover{background:rgba(255,255,255,.12);color:var(--t1);border-color:rgba(255,255,255,.25)}
.pp-hero{position:relative;overflow:hidden;border-bottom:1px solid rgba(255,255,255,.06)}
.pp-hero-top{display:flex;gap:24px;align-items:flex-end;padding:32px 28px 26px;position:relative;z-index:1}
.pp-img-wrap{position:relative;flex-shrink:0}
.pp-img{width:130px;height:130px;border-radius:18px;object-fit:cover;object-position:top;background:var(--g3);border:2px solid rgba(255,255,255,.1);box-shadow:0 12px 40px rgba(0,0,0,.7)}
.pp-team-badge{position:absolute;top:-10px;right:-10px;width:36px;height:36px;border-radius:50%;background:rgba(10,10,14,.9);border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;padding:5px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.pp-team-badge img{width:100%;height:100%;object-fit:contain}
.pp-info{flex:1;min-width:0;padding-bottom:2px}
.pp-name{font-family:var(--fd);font-size:clamp(22px,3.5vw,32px);font-weight:800;color:var(--t1);line-height:1;letter-spacing:-.5px;margin-bottom:10px}
.pp-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pp-pos-badge{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:1.5px;padding:4px 10px;border-radius:6px}
.pp-num{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--t2)}
.pp-team-name{font-family:var(--fd);font-size:14px;color:var(--t3);font-weight:600}
.pp-owner-row{display:flex;align-items:center;gap:10px;margin-top:16px;padding:11px 14px;background:rgba(255,255,255,.05);border-radius:10px;border:1px solid rgba(255,255,255,.07);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.pp-owner-lbl{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-bottom:2px}
.pp-owner-name{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--t1)}
.pp-body{padding:22px 28px 32px;flex:1;display:flex;flex-direction:column;gap:22px}
.pp-section{display:flex;flex-direction:column;gap:10px}
.pp-section-title{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t4);padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.05)}
.pp-bio-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.pp-bio-item{background:var(--g3);border-radius:10px;padding:14px 14px 12px;border:1px solid var(--g5)}
.pp-bio-lbl{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-bottom:5px}
.pp-bio-val{font-family:var(--fd);font-size:16px;font-weight:700;color:var(--t1)}
.pp-contract-block{background:var(--g3);border-radius:12px;padding:18px 20px;border:1px solid var(--g5);display:flex;gap:20px;flex-wrap:wrap;align-items:center}
.pp-ktc{font-family:var(--fd);font-size:32px;font-weight:800;color:var(--a);letter-spacing:-1px}
.pp-ktc-lbl{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-bottom:2px}
.pp-contract-pills{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.pp-acq-row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--g3);border-radius:10px;border:1px solid var(--g5)}
.pp-acq-icon{font-size:22px;flex-shrink:0}
.pp-acq-detail{font-family:var(--fb);font-size:14px;color:var(--t2)}
.pp-trade-card{background:var(--g3);border-radius:12px;border:1px solid var(--g5);overflow:hidden;margin-bottom:6px}
.pp-trade-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(0,0,0,.25)}
.pp-trade-yr{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:2px;color:var(--t2)}
.pp-trade-body{display:grid;grid-template-columns:1fr auto 1fr;gap:0}
.pp-trade-side{padding:14px 16px}
.pp-trade-side-lbl{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-bottom:8px}
.pp-trade-asset{font-family:var(--fb);font-size:12px;color:var(--t2);margin:3px 0}
.pp-trade-asset.highlight{color:var(--y);font-weight:600}
.pp-trade-sep{display:flex;align-items:center;justify-content:center;padding:14px 8px;color:var(--t4);font-size:20px}
.pp-empty{font-family:var(--fb);font-size:13px;color:var(--t4);text-align:center;padding:28px;font-style:italic}
.pp-trigger{cursor:pointer}
.pp-trigger:hover{opacity:.8}

/* ═══ PHASE 3: MATCHUP CARD SCORE SIZES ═══ */
.mu-sc.win{font-size:clamp(28px,4vw,36px);color:var(--t1)}
.mu-sc.lose{font-size:clamp(22px,3vw,28px);color:var(--t3);opacity:.6}

/* ═══ PHASE 4: TROPHY BANNER PRESTIGE ═══ */
/* (banner prestige styles moved into .rafters-scene system) */

/* ═══ PHASE 5: BRACKET CONNECTING LINES ═══ */
.bracket-grid{position:relative}
.bracket-col{display:flex;flex-direction:column;gap:var(--sp-3)}
.bracket-connector{display:flex;align-items:center;justify-content:center;padding:0 var(--sp-2);flex-shrink:0}
.bracket-connector-line{width:24px;height:2px;background:linear-gradient(90deg,var(--g5),var(--g6));border-radius:1px}
.bracket-slot{position:relative}
.bracket-slot.winner{border-color:var(--y);background:linear-gradient(90deg,rgba(255,204,0,.06),transparent)}
.bracket-slot.loser{opacity:.5}

/* ═══ PHASE 6: POWER SCORE GAUGE ═══ */
.pw-gauge{width:68px;height:68px;border-radius:50%;background:conic-gradient(var(--pw-color,var(--a)) var(--pw-pct,50%),var(--g4) var(--pw-pct,50%));display:grid;place-items:center;position:relative;flex-shrink:0}
.pw-gauge::before{content:'';position:absolute;inset:5px;border-radius:50%;background:var(--g2)}
.pw-gauge .pnv{position:relative;z-index:1;font-size:clamp(18px,2vw,24px)}

/* ═══ PHASE 7: DRAFT BOARD CROSSHAIR ═══ */
.db-grid.crosshair-active .db-cell:not(.db-cell-highlight):not(.hdr){opacity:.45}
.db-grid.crosshair-active .db-cell.db-cell-highlight{opacity:1;background-color:rgba(255,204,0,.06)}
.db-grid.crosshair-active .db-cell:hover{opacity:1;outline:2px solid var(--y);z-index:3}
.db-cell{transition:opacity .1s,outline .1s}

/* ═══ PHASE 8: TRADE CARD REINFORCEMENT ═══ */
.trade-grade{min-width:40px;min-height:40px}
.trade-side{padding:var(--sp-5) var(--sp-5)}

/* ═══ PHASE 9: SEMANTIC HEADING RESET ═══ */
h2.bh-tag{margin:0;font-size:inherit;font-weight:inherit;line-height:inherit;font-family:inherit;color:inherit;text-transform:inherit;letter-spacing:inherit}

/* ═══ DRAFT PICK HISTORY TOOLTIP ═══ */
.draft-hist-tip{display:none;position:fixed;z-index:9999;background:rgba(12,12,20,.95);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;min-width:170px;max-width:220px;box-shadow:0 12px 40px rgba(0,0,0,.8);pointer-events:none}

// ═══ FETCH UTILITIES ═══
async function fetchJSON(url,retries=2){
  for(let i=0;i<=retries;i++){
    try{
      const r=await fetch(url);
      if(!r.ok)throw new Error(r.status);
      return await r.json();
    }catch(e){
      if(i===retries)throw e;
      await new Promise(ok=>setTimeout(ok,1000*(i+1)));
    }
  }
}

async function fetchAll(urls,concurrency=8){
  const results=[];
  for(let i=0;i<urls.length;i+=concurrency){
    const batch=urls.slice(i,i+concurrency).map(u=>fetchJSON(u).catch(()=>null));
    results.push(...await Promise.all(batch));
  }
  return results;
}

async function fetchCSV(url){
  for(let i=0;i<2;i++){
    try{
      const r=await fetch(url);
      const txt=await r.text();
      if(txt.trim().startsWith('<'))throw new Error('HTML response');
      return txt;
    }catch(e){
      if(i===1)throw e;
      await new Promise(ok=>setTimeout(ok,1000));
    }
  }
}

// ═══ CACHE HELPERS ═══
const cache={
  get(key){
    try{
      const raw=localStorage.getItem(key);
      if(!raw)return null;
      const{data,ts,ttl}=JSON.parse(raw);
      if(ttl&&Date.now()-ts>ttl)return null;
      return data;
    }catch(e){return null}
  },
  set(key,data,ttl=0){
    try{localStorage.setItem(key,JSON.stringify({data,ts:Date.now(),ttl}))}catch(e){}
  },
  has(key){return this.get(key)!==null}
};

// ═══ LEAGUE DISCOVERY ═══
async function discoverLeague(){
  const state=await fetchJSON(`${CFG.sleeperBase}/state/nfl`);
  const season=state.season;
  const leagues=await fetchJSON(`${CFG.sleeperBase}/user/${CFG.userId}/leagues/nfl/${season}`);
  const league=leagues.find(l=>l.name===CFG.leagueName);
  if(!league)throw new Error('League not found for season '+season);
  const chain=[{id:league.league_id,season}];
  let prev=league.previous_league_id;
  while(prev&&prev!=='0'){
    const lg=await fetchJSON(`${CFG.sleeperBase}/league/${prev}`);
    chain.unshift({id:lg.league_id,season:lg.season});
    prev=lg.previous_league_id;
  }
  return{current:league,chain,state};
}

// ═══ TIER 1+2: CURRENT SEASON DATA ═══
async function fetchCurrentSeason(leagueId){
  const[league,rosters,users,picks,winnersBracket]=await Promise.all([
    fetchJSON(`${CFG.sleeperBase}/league/${leagueId}`),
    fetchJSON(`${CFG.sleeperBase}/league/${leagueId}/rosters`),
    fetchJSON(`${CFG.sleeperBase}/league/${leagueId}/users`),
    fetchJSON(`${CFG.sleeperBase}/league/${leagueId}/traded_picks`),
    fetchJSON(`${CFG.sleeperBase}/league/${leagueId}/winners_bracket`).catch(()=>[])
  ]);
  const maxWeek=rosters.reduce((mx,r)=>{
    const s=r.settings||{};return Math.max(mx,(s.wins||0)+(s.losses||0)+(s.ties||0));
  },0);
  const playoffStart=league.settings?.playoff_week_start||15;
  const weekNums=Array.from({length:maxWeek},(_,i)=>i+1);
  const matchupUrls=weekNums.map(w=>`${CFG.sleeperBase}/league/${leagueId}/matchups/${w}`);
  const txnUrls=weekNums.map(w=>`${CFG.sleeperBase}/league/${leagueId}/transactions/${w}`);
  const[matchups,txns]=await Promise.all([fetchAll(matchupUrls),fetchAll(txnUrls)]);
  const draftsArr=await fetchJSON(`${CFG.sleeperBase}/league/${leagueId}/drafts`).catch(()=>[]);
  let draftPicks=[];
  if(draftsArr.length){
    draftPicks=await fetchJSON(`${CFG.sleeperBase}/draft/${draftsArr[0].draft_id}/picks`).catch(()=>[]);
  }
  return{league,rosters,users,picks,winnersBracket,
    matchups:Object.fromEntries(weekNums.map((w,i)=>[w,matchups[i]||[]])),
    transactions:Object.fromEntries(weekNums.map((w,i)=>[w,txns[i]||[]])),
    draftPicks,playoffStart,weekNums};
}

// ═══ PLAYER DATABASE ═══
async function fetchPlayerDB(allPlayerIds){
  const cached=cache.get('hd_players');
  if(cached)return cached;
  const raw=await fetchJSON(`${CFG.sleeperBase}/players/nfl`);
  const db={};
  const keep=new Set(allPlayerIds);
  for(const[id,p]of Object.entries(raw)){
    if(keep.has(id)||p.active){
      db[id]={
        id,fn:p.full_name||`${p.first_name||''} ${p.last_name||''}`.trim(),
        pos:p.position,tm:p.team,age:p.age,yrs:p.years_exp,
        col:p.college,num:p.number,inj:p.injury_status,st:p.status
      };
    }
  }
  cache.set('hd_players',db,24*60*60*1000);
  return db;
}

// ═══ DYNASTY VALUES (FantasyCalc) ═══
async function fetchDynastyValues(){
  const cached=cache.get('hd_ktc');
  if(cached)return cached;
  try{
    const arr=await fetchJSON(CFG.ktcUrl);
    const map={};
    (arr||[]).forEach(p=>{
      const sid=p.player&&p.player.sleeperId;
      if(sid)map[sid]={val:p.value||0,rnk:p.overallRank||0,tier:p.maybeTier||0};
    });
    cache.set('hd_ktc',map,12*60*60*1000);
    return map;
  }catch(e){
    return cached||{};
  }
}

// ═══ GOOGLE SHEET (CONTRACTS) ═══
async function fetchContracts(ktcMap){
  try{
    const csv=await fetchCSV(CFG.sheetCsvUrl);
    return parseContractCSV(csv,ktcMap||{});
  }catch(e){
    const cached=cache.get('hd_contracts');
    return cached||{contracts:{},exemptions:{}};
  }
}

function parseContractCSV(csv,ktcMap){
  const rows=csv.split('\n').map(r=>{
    const cells=[];let cur='',inQ=false;
    for(const ch of r){
      if(ch==='"'){inQ=!inQ}
      else if(ch===','&&!inQ){cells.push(cur.trim());cur=''}
      else{cur+=ch}
    }
    cells.push(cur.trim());
    return cells;
  });
  if(rows.length<2)return{contracts:{},exemptions:{}};
  const hdr=rows[0].map(h=>h.toLowerCase().replace(/[^\w]/g,''));
  const nameIdx=hdr.findIndex(h=>h.includes('player')||h.includes('name'));
  const idIdx=hdr.findIndex(h=>h.includes('sleeper')||h.includes('id'));
  const yrsIdx=hdr.findIndex(h=>h.includes('contract')||h.includes('years'));
  const tagIdx=hdr.findIndex(h=>h.includes('tag'));
  const exIdx=hdr.findIndex(h=>h.includes('exemp'));
  const noteIdx=hdr.findIndex(h=>h.includes('note'));
  const contracts={};
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    if(!r[nameIdx])continue;
    const name=r[nameIdx];
    const sid=r[idIdx]||null;
    const ktcEntry=sid&&ktcMap[sid]?ktcMap[sid]:{};
    // Parse contract years: empty/blank = uncontracted (null), number = years remaining
    const rawYrs=(r[yrsIdx]||'').trim();
    const parsedYrs=rawYrs===''?null:parseInt(rawYrs)||0;
    // Parse tag: "true"/"Franchise"/"Transition" all count, "None"/empty = null
    const rawTag=(r[tagIdx]||'').trim().toLowerCase();
    const tag=rawTag===''||rawTag==='none'?null:rawTag==='true'?'Franchise':r[tagIdx].trim();
    // Parse exemption: year strings ("2024","2025") or type strings, "None"/empty = null
    const rawExm=(r[exIdx]||'').trim().toLowerCase();
    const exm=rawExm===''||rawExm==='none'?null:r[exIdx].trim();
    contracts[name]={
      sleeperId:sid,
      yrs:parsedYrs,
      contracted:parsedYrs!==null,
      tag,
      exm,
      note:r[noteIdx]||'',
      ktc:ktcEntry.val||0,
      rnk:ktcEntry.rnk||0,
      tier:ktcEntry.tier||0
    };
    if(sid)contracts['_id_'+sid]=contracts[name];
  }
  cache.set('hd_contracts',{contracts,exemptions:{}},2*60*60*1000);
  return{contracts,exemptions:{}};
}

// ═══ TIER 3: HISTORICAL SEASONS ═══
async function fetchHistoricalSeason(leagueId,season){
  const cacheKey=`hd_history_v2_${season}`;
  const cached=cache.get(cacheKey);
  if(cached)return cached;
  const[league,rosters,users,picks,winnersBracket]=await Promise.all([
    fetchJSON(`${CFG.sleeperBase}/league/${leagueId}`),
    fetchJSON(`${CFG.sleeperBase}/league/${leagueId}/rosters`),
    fetchJSON(`${CFG.sleeperBase}/league/${leagueId}/users`),
    fetchJSON(`${CFG.sleeperBase}/league/${leagueId}/traded_picks`).catch(()=>[]),
    fetchJSON(`${CFG.sleeperBase}/league/${leagueId}/winners_bracket`).catch(()=>[])
  ]);
  const maxWeek=rosters.reduce((mx,r)=>{
    const s=r.settings||{};return Math.max(mx,(s.wins||0)+(s.losses||0)+(s.ties||0));
  },0);
  const playoffStart=league.settings?.playoff_week_start||15;
  const totalWeeks=Math.max(maxWeek,playoffStart+2);
  const weekNums=Array.from({length:totalWeeks},(_,i)=>i+1);
  const matchupUrls=weekNums.map(w=>`${CFG.sleeperBase}/league/${leagueId}/matchups/${w}`);
  const txnUrls=weekNums.map(w=>`${CFG.sleeperBase}/league/${leagueId}/transactions/${w}`);
  const[matchups,txns]=await Promise.all([fetchAll(matchupUrls),fetchAll(txnUrls)]);
  const draftsArr=await fetchJSON(`${CFG.sleeperBase}/league/${leagueId}/drafts`).catch(()=>[]);
  let draftPicks=[];
  if(draftsArr.length){
    draftPicks=await fetchJSON(`${CFG.sleeperBase}/draft/${draftsArr[0].draft_id}/picks`).catch(()=>[]);
  }
  const result={
    season,league,rosters,users,picks,draftPicks,winnersBracket,
    matchups:Object.fromEntries(weekNums.map((w,i)=>[w,matchups[i]||[]])),
    transactions:Object.fromEntries(weekNums.map((w,i)=>[w,txns[i]||[]])),
    playoffStart,weekNums
  };
  cache.set(cacheKey,result,7*24*60*60*1000);
  return result;
}

// ═══ COMPUTE RECORDS ═══
function computeRecords(matchupWeeks){
  const _et={roster_id:0,points:0,name:'—'};
  let biggestBlowout={diff:0,week:'-',winner:_et,loser:_et};
  let closestGame={diff:Infinity,week:'-',winner:_et,loser:_et};
  let highestScore={pts:0,roster_id:0,week:'-'};
  let lowestScore={pts:Infinity,roster_id:0,week:'-'};
  Object.entries(matchupWeeks).forEach(([wk,games])=>{
    const week=parseInt(wk);
    (games||[]).forEach(g=>{
      const a=g.team_a,b=g.team_b;
      const diff=parseFloat(Math.abs(a.points-b.points).toFixed(2));
      const winner=a.points>=b.points?a:b;
      const loser=a.points<b.points?a:b;
      if(diff>biggestBlowout.diff)biggestBlowout={diff,week,winner,loser};
      if(diff<closestGame.diff)closestGame={diff,week,winner,loser};
      if(a.points>highestScore.pts)highestScore={pts:a.points,roster_id:a.roster_id,week};
      if(b.points>highestScore.pts)highestScore={pts:b.points,roster_id:b.roster_id,week};
      if(a.points>0&&a.points<lowestScore.pts)lowestScore={pts:a.points,roster_id:a.roster_id,week};
      if(b.points>0&&b.points<lowestScore.pts)lowestScore={pts:b.points,roster_id:b.roster_id,week};
    });
  });
  if(closestGame.diff===Infinity)closestGame.diff=0;
  if(lowestScore.pts===Infinity)lowestScore.pts=0;
  return{biggest_blowout:biggestBlowout,closest_game:closestGame,highest_score:highestScore,lowest_score:lowestScore};
}

// ═══ FIND ACQUISITION ═══
function findAcquisition(playerId,rosterId,transactions,draftPicks,season,playerDB){
  // Check draft picks first (if found in draft, that's the origin but transaction may override)
  const draft=draftPicks.find(pk=>pk.player_id===playerId&&pk.roster_id===rosterId);
  // Walk transactions newest-first
  const allTxns=[];
  Object.entries(transactions).forEach(([wk,txns])=>{(txns||[]).forEach(t=>{allTxns.push({...t,week:parseInt(wk)});});});
  allTxns.sort((a,b)=>b.status_updated-a.status_updated||b.week-a.week);
  for(const txn of allTxns){
    if(!txn.adds||!txn.adds[playerId])continue;
    if(txn.adds[playerId]!==rosterId)continue;
    const type=txn.type==='waiver'?'waiver':txn.type==='free_agent'?'free_agent':'commissioner';
    const wk=txn.week;
    const pDB=playerDB[playerId];
    const nm=pDB?pDB.fn:playerId;
    return{type,detail:`${season} Wk${wk} ${type.replace('_',' ')}: ${nm}`};
  }
  if(draft){
    const rd=draft.round||'?',pk=draft.pick_no||'?';
    const pDB=playerDB[playerId];
    const nm=pDB?pDB.fn:playerId;
    return{type:'draft',detail:`${season} Rd${rd} Pick${pk}: ${nm}`};
  }
  return null;
}

// ═══ BUILD CURRENT SEASON DATA ═══
function buildCurrentSeasonData(cur,playerDB,contractData,state){
  const d={};
  const{league,rosters,users,picks,matchups,transactions,draftPicks,winnersBracket,playoffStart,weekNums}=cur;
  const currentSeason=state.season;

  // ── League info ──
  const ls=league.settings||{};
  d.league={
    name:league.name,
    season:league.season,
    status:league.status,
    num_teams:league.total_rosters||12,
    type:ls.type||0,
    scoring:ls.trade_review_type||'',
    roster_spots:ls.roster_positions?ls.roster_positions.length:0,
    starters:league.roster_positions?league.roster_positions.filter(p=>p!=='BN'&&p!=='IR').length:9,
    playoff_teams:ls.playoff_teams||6
  };

  // ── User map ──
  const userMap={};
  (users||[]).forEach(u=>{userMap[u.user_id]={name:u.metadata&&u.metadata.team_name?u.metadata.team_name:u.display_name,display_name:u.display_name,avatar:u.avatar};});

  // ── rid_to_name ──
  d.rid_to_name={};
  (rosters||[]).forEach(r=>{
    const u=userMap[r.owner_id]||{name:'Team '+r.roster_id,display_name:'Team '+r.roster_id};
    d.rid_to_name[r.roster_id]=u.name;
  });

  // ── Teams ──
  d.teams=(rosters||[]).map(r=>{
    const u=userMap[r.owner_id]||{name:'Team '+r.roster_id,display_name:'Team '+r.roster_id,avatar:null};
    const teamName=u.name;
    const displayName=u.display_name;
    let avatarSrc=null;
    if(CFG.avatarOverrides&&CFG.avatarOverrides[r.roster_id]){
      avatarSrc=CFG.avatarOverrides[r.roster_id];
    }else if(u.avatar){
      avatarSrc=`https://sleepercdn.com/avatars/thumbs/${u.avatar}`;
    }
    const starterIds=new Set(r.starters||[]);
    const reserveIds=new Set(r.reserve||[]);
    const allPlayerIds=[...(r.players||[])];
    const players=allPlayerIds.map(pid=>{
      const p=playerDB[pid]||{};
      const isDefTeam=/^[A-Z]{2,3}$/.test(pid);
      return{
        id:pid,
        name:isDefTeam?pid+' D/ST':(p.fn||pid),
        pos:isDefTeam?'DEF':(p.pos||''),
        team:isDefTeam?pid:(p.tm||''),
        age:p.age||null,
        years_exp:p.yrs||null,
        college:p.col||'',
        number:p.num||'',
        is_starter:starterIds.has(pid),
        is_reserve:reserveIds.has(pid)
      };
    });
    return{
      roster_id:r.roster_id,
      owner_id:r.owner_id,
      team_name:teamName,
      display_name:displayName,
      avatar:avatarSrc,
      players,
      num_players:allPlayerIds.length,
      waiver_pos:r.settings&&r.settings.waiver_position!=null?r.settings.waiver_position:null
    };
  });

  // ── Contracts ──
  d.contracts=contractData.contracts||{};
  d.exemption_history=contractData.exemptions||{};

  // ── Traded picks ──
  d.pick_trades=(picks||[]).map(pk=>{
    const origRid=pk.roster_id_origin;
    const curRid=pk.roster_id;
    const prevRid=pk.previous_owner_id;
    return{
      season:pk.season,
      round:pk.round,
      original_owner:d.rid_to_name[origRid]||'?',
      original_roster_id:origRid,
      current_owner:d.rid_to_name[curRid]||'?',
      current_owner_roster_id:curRid,
      previous_owner:d.rid_to_name[prevRid]||null
    };
  });

  // ── Standings for current season ──
  const standingsKey='standings_'+currentSeason;
  d[standingsKey]=(rosters||[]).map(r=>{
    const s=r.settings||{};
    const fptsWhole=s.fpts||0;
    const fptsDec=s.fpts_decimal||0;
    const fpts=parseFloat(fptsWhole+'.'+String(fptsDec).padStart(2,'0'))||0;
    const fptsAWhole=s.fpts_against||0;
    const fptsADec=s.fpts_against_decimal||0;
    const fpts_against=parseFloat(fptsAWhole+'.'+String(fptsADec).padStart(2,'0'))||0;
    return{
      roster_id:r.roster_id,
      owner_id:r.owner_id,
      team_name:d.rid_to_name[r.roster_id]||'?',
      display_name:(userMap[r.owner_id]||{}).display_name||'',
      wins:s.wins||0,
      losses:s.losses||0,
      ties:s.ties||0,
      fpts,
      fpts_against,
      total_moves:s.total_moves||0
    };
  }).sort((a,b)=>b.wins-a.wins||b.fpts-a.fpts);

  // ── Weekly scores & matchup weeks ──
  // weekly_scores keyed by roster_id → array of weekly totals
  const weeklyScores={};
  d.teams.forEach(t=>{weeklyScores[t.roster_id]=[];});
  const matchupWeeks={};
  weekNums.forEach(wk=>{
    const wkData=matchups[wk]||[];
    if(!wkData.length)return;
    // Group by matchup_id
    const byMatchup={};
    wkData.forEach(e=>{
      const mid=e.matchup_id;
      if(!mid)return;
      if(!byMatchup[mid])byMatchup[mid]=[];
      byMatchup[mid].push(e);
    });
    const games=[];
    Object.values(byMatchup).forEach(pair=>{
      if(pair.length<2)return;
      const[ea,eb]=pair;
      const aRid=ea.roster_id,bRid=eb.roster_id;
      const aPts=parseFloat(ea.points)||0,bPts=parseFloat(eb.points)||0;
      games.push({
        team_a:{roster_id:aRid,points:aPts,name:d.rid_to_name[aRid]||'?'},
        team_b:{roster_id:bRid,points:bPts,name:d.rid_to_name[bRid]||'?'},
        diff:parseFloat(Math.abs(aPts-bPts).toFixed(2)),
        winner:aPts>=bPts?{roster_id:aRid,points:aPts}:{roster_id:bRid,points:bPts},
        loser:aPts<bPts?{roster_id:aRid,points:aPts}:{roster_id:bRid,points:bPts}
      });
      // Accumulate weekly scores (push in week order)
      if(weeklyScores[aRid])weeklyScores[aRid].push(aPts);
      if(weeklyScores[bRid])weeklyScores[bRid].push(bPts);
    });
    if(games.length)matchupWeeks[wk]=games;
  });
  d.weekly_scores=weeklyScores;
  d.matchup_weeks=matchupWeeks;

  // ── Records ──
  d.records=computeRecords(matchupWeeks);

  // ── Heat map meta ──
  d.heat_map_meta=Object.entries(matchupWeeks).map(([wk,games])=>{
    const pts=games.flatMap(g=>[g.team_a.points,g.team_b.points]).filter(p=>p>0);
    return{week:parseInt(wk),avg:pts.length?(pts.reduce((a,b)=>a+b,0)/pts.length):0,max:pts.length?Math.max(...pts):0,min:pts.length?Math.min(...pts):0};
  }).sort((a,b)=>a.week-b.week);

  // ── Draft picks ──
  d.draft_picks={};
  if(draftPicks&&draftPicks.length){
    d.draft_picks[currentSeason]=(draftPicks||[]).map(pk=>{
      const pid=pk.player_id;
      const p=playerDB[pid]||{};
      const meta=pk.metadata||{};
      const draftTm=meta.team||p.tm||'';
      return{round:pk.round,pick_no:pk.pick_no,roster_id:pk.roster_id,player_id:pid,pid,nm:p.fn||pid,name:p.fn||pid,pos:meta.position||p.pos||'',tm:draftTm,team:draftTm,rd:pk.round,pk:pk.pick_no,rid:pk.roster_id};
    });
  }

  // ── Moves & Trades from transactions ──
  d.moves=[];
  d.trades=[];
  Object.entries(transactions).forEach(([wk,txns])=>{
    (txns||[]).forEach(txn=>{
      const week=parseInt(wk);
      if(txn.type==='waiver'||txn.type==='free_agent'||txn.type==='commissioner'){
        const adds=txn.adds||{};const drops=txn.drops||{};
        const addRids=[...new Set(Object.values(adds).map(Number))];
        addRids.forEach(rid=>{
          const addedPids=Object.keys(adds).filter(pid=>adds[pid]===rid);
          const droppedPids=Object.keys(drops).filter(pid=>drops[pid]===rid);
          const addName=addedPids.map(pid=>(playerDB[pid]||{}).fn||pid).join(', ');
          const dropName=droppedPids.map(pid=>(playerDB[pid]||{}).fn||pid).join(', ');
          d.moves.push({yr:currentSeason,wk:week,tp:txn.type,rid,add:addName||null,aid:addedPids[0]||null,drop:dropName||null,did:droppedPids[0]||null});
        });
      }else if(txn.type==='trade'&&txn.status==='complete'){
        const adds=txn.adds||{};const drops=txn.drops||{};
        const rids=[...new Set([...Object.values(adds),...Object.values(drops)].map(Number))];
        const tradedPicks=(txn.draft_picks||[]).map(pk=>`${pk.season} Rd${pk.round} (${d.rid_to_name[pk.roster_id_origin]||'?'})`);
        d.trades.push({yr:currentSeason,wk:week,s:currentSeason,rids,adds,drops,draft_picks:tradedPicks,txn_id:txn.transaction_id});
      }
    });
  });

  // ── Acquisition tracking ──
  d.teams.forEach(team=>{
    team.players.forEach(player=>{
      const acqResult=findAcquisition(player.id,team.roster_id,transactions,draftPicks||[],currentSeason,playerDB);
      player.acq=acqResult?acqResult.type:null;
      player.acq_detail=acqResult?acqResult.detail:null;
    });
  });

  // ── Cross-season fields (empty until mergeHistoricalData) ──
  d.champions=[];
  // Populate current season champion from winners_bracket if available
  if(winnersBracket&&winnersBracket.length){
    const maxRound=Math.max(...winnersBracket.map(m=>m.r||0));
    const champMatch=winnersBracket.find(m=>m.r===maxRound&&m.p===1);
    if(champMatch&&champMatch.w&&champMatch.l){
      d.champions.push({year:String(currentSeason),champion:d.rid_to_name[champMatch.w]||'?',runner_up:d.rid_to_name[champMatch.l]||'?',champ_rid:champMatch.w,runner_up_rid:champMatch.l,week:maxRound});
    }
  }
  d.unified_trades=[];
  d.rivalries=[];
  d.luck={};
  d.franchise=[];
  d.activity={};
  d.alltime_standings=[];
  d.most_traded=[];
  d.h2h={};

  // ── Pre-draft fallback aliases ──
  if(league.status==='pre_draft'){
    d.standings_2025=d[standingsKey]||[];
    d.standings_2024=d.standings_2024||[];
    d.standings_2023=d.standings_2023||[];
  }

  return d;
}

// ═══ MERGE HISTORICAL DATA ═══
function mergeHistoricalData(d,historicalSeasons,playerDB){
  // Build rid_to_name helper that may need updating per season
  function ridToNameForSeason(rosters,users){
    const uMap={};
    (users||[]).forEach(u=>{uMap[u.user_id]=u.metadata&&u.metadata.team_name?u.metadata.team_name:u.display_name;});
    const map={};
    (rosters||[]).forEach(r=>{map[r.roster_id]=uMap[r.owner_id]||'Team '+r.roster_id;});
    return map;
  }

  // ── Process each historical season ──
  historicalSeasons.forEach(hs=>{
    const{season,league,rosters,users,matchups,transactions,draftPicks,picks,winnersBracket,weekNums,playoffStart}=hs;
    const rtn=ridToNameForSeason(rosters,users);
    const sk='standings_'+season;

    // Standings for this year
    const standings=(rosters||[]).map(r=>{
      const s=r.settings||{};
      const fptsWhole=s.fpts||0,fptsDec=s.fpts_decimal||0;
      const fpts=parseFloat(fptsWhole+'.'+String(fptsDec).padStart(2,'0'))||0;
      const fptsAWhole=s.fpts_against||0,fptsADec=s.fpts_against_decimal||0;
      const fpts_against=parseFloat(fptsAWhole+'.'+String(fptsADec).padStart(2,'0'))||0;
      return{roster_id:r.roster_id,owner_id:r.owner_id,team_name:rtn[r.roster_id]||'?',wins:s.wins||0,losses:s.losses||0,ties:s.ties||0,fpts,fpts_against,total_moves:s.total_moves||0};
    }).sort((a,b)=>b.wins-a.wins||b.fpts-a.fpts);
    d[sk]=standings;

    // standings_2024_full alias with rank
    if(season==='2024'||season===2024){
      d.standings_2024_full=standings.map((s,i)=>({...s,rank:i+1}));
      d.standings_2024=d.standings_2024||standings;
    }
    if(season==='2023'||season===2023){
      d.standings_2023=d.standings_2023||standings;
    }

    // Build matchup weeks for this season
    const hsMatchupWeeks={};
    const hsWeeklyScores={};
    (weekNums||[]).forEach(wk=>{
      const wkData=matchups[wk]||[];
      if(!wkData.length)return;
      const byMatchup={};
      wkData.forEach(e=>{const mid=e.matchup_id;if(!mid)return;if(!byMatchup[mid])byMatchup[mid]=[];byMatchup[mid].push(e);});
      const games=[];
      Object.values(byMatchup).forEach(pair=>{
        if(pair.length<2)return;
        const[ea,eb]=pair;
        const aRid=ea.roster_id,bRid=eb.roster_id;
        const aPts=parseFloat(ea.points)||0,bPts=parseFloat(eb.points)||0;
        games.push({
          team_a:{roster_id:aRid,points:aPts,name:rtn[aRid]||'?'},
          team_b:{roster_id:bRid,points:bPts,name:rtn[bRid]||'?'},
          diff:parseFloat(Math.abs(aPts-bPts).toFixed(2)),
          winner:aPts>=bPts?{roster_id:aRid,points:aPts}:{roster_id:bRid,points:bPts},
          loser:aPts<bPts?{roster_id:aRid,points:aPts}:{roster_id:bRid,points:bPts}
        });
        if(!hsWeeklyScores[aRid])hsWeeklyScores[aRid]=[];
        if(!hsWeeklyScores[bRid])hsWeeklyScores[bRid]=[];
        hsWeeklyScores[aRid].push(aPts);
        hsWeeklyScores[bRid].push(bPts);
      });
      if(games.length)hsMatchupWeeks[wk]=games;
    });

    // H2H — regular season only (pre-playoff weeks)
    const pStart=playoffStart||15;
    Object.entries(hsMatchupWeeks).forEach(([wk,games])=>{
      if(parseInt(wk)>=pStart)return;
      games.forEach(g=>{
        const aRid=g.team_a.roster_id,bRid=g.team_b.roster_id;
        const winner=g.winner.roster_id;
        const[lo,hi]=aRid<bRid?[aRid,bRid]:[bRid,aRid];
        const key=lo+'-'+hi;
        if(!d.h2h[key])d.h2h[key]={w:0,l:0,total:0};
        if(winner===lo){d.h2h[key].w++;d.h2h[key].total++;}
        else{d.h2h[key].l++;d.h2h[key].total++;}
        // Also store both directions
        const keyAB=aRid+'-'+bRid;
        const keyBA=bRid+'-'+aRid;
        if(!d.h2h[keyAB])d.h2h[keyAB]={w:0,l:0,total:0};
        if(!d.h2h[keyBA])d.h2h[keyBA]={w:0,l:0,total:0};
        if(winner===aRid){d.h2h[keyAB].w++;d.h2h[keyAB].total++;d.h2h[keyBA].l++;d.h2h[keyBA].total++;}
        else{d.h2h[keyAB].l++;d.h2h[keyAB].total++;d.h2h[keyBA].w++;d.h2h[keyBA].total++;}
      });
    });

    // Historical trades
    Object.entries(transactions).forEach(([wk,txns])=>{
      (txns||[]).forEach(txn=>{
        const week=parseInt(wk);
        if(txn.type==='waiver'||txn.type==='free_agent'||txn.type==='commissioner'){
          const adds=txn.adds||{};const drops=txn.drops||{};
          const addRids=[...new Set(Object.values(adds).map(Number))];
          addRids.forEach(rid=>{
            const addedPids=Object.keys(adds).filter(pid=>adds[pid]===rid);
            const droppedPids=Object.keys(drops).filter(pid=>drops[pid]===rid);
            const addName=addedPids.map(pid=>(playerDB[pid]||{}).fn||pid).join(', ');
            const dropName=droppedPids.map(pid=>(playerDB[pid]||{}).fn||pid).join(', ');
            d.moves.push({yr:season,wk:week,tp:txn.type,rid,add:addName||null,aid:addedPids[0]||null,drop:dropName||null,did:droppedPids[0]||null});
          });
        }else if(txn.type==='trade'&&txn.status==='complete'){
          const adds=txn.adds||{};const drops=txn.drops||{};
          const rids=[...new Set([...Object.values(adds),...Object.values(drops)].map(Number))];
          const tradedPicks=(txn.draft_picks||[]).map(pk=>`${pk.season} Rd${pk.round} (${rtn[pk.roster_id_origin]||'?'})`);
          d.trades.push({yr:season,wk:week,s:season,rids,adds,drops,draft_picks:tradedPicks,txn_id:txn.transaction_id});
        }
      });
    });

    // Historical draft picks
    if(draftPicks&&draftPicks.length){
      const seasonStr=String(season);
      if(!d.draft_picks[seasonStr])d.draft_picks[seasonStr]=[];
      draftPicks.forEach(pk=>{
        const pid=pk.player_id;
        const p=playerDB[pid]||{};
        const meta=pk.metadata||{};
        const draftTm=meta.team||p.tm||'';
        d.draft_picks[seasonStr].push({round:pk.round,pick_no:pk.pick_no,roster_id:pk.roster_id,player_id:pid,pid,nm:p.fn||pid,name:p.fn||pid,pos:meta.position||p.pos||'',tm:draftTm,team:draftTm,rd:pk.round,pk:pk.pick_no,rid:pk.roster_id});
      });
    }

    // Champions — use winners_bracket (p=1 in highest round = championship game)
    if(winnersBracket&&winnersBracket.length){
      const maxRound=Math.max(...winnersBracket.map(m=>m.r||0));
      const champMatch=winnersBracket.find(m=>m.r===maxRound&&m.p===1);
      if(champMatch&&champMatch.w&&champMatch.l){
        d.champions.push({year:String(season),champion:rtn[champMatch.w]||'?',runner_up:rtn[champMatch.l]||'?',champ_rid:champMatch.w,runner_up_rid:champMatch.l,week:maxRound});
      }
    }
  });

  // ── Recompute records across all seasons ──
  // Merge all matchup weeks from current + historical
  const allMatchupWeeks={...d.matchup_weeks};
  historicalSeasons.forEach(hs=>{
    const rtn=ridToNameForSeason(hs.rosters,hs.users);
    (hs.weekNums||[]).forEach(wk=>{
      const wkData=hs.matchups[wk]||[];
      if(!wkData.length)return;
      const byMatchup={};
      wkData.forEach(e=>{const mid=e.matchup_id;if(!mid)return;if(!byMatchup[mid])byMatchup[mid]=[];byMatchup[mid].push(e);});
      const games=[];
      Object.values(byMatchup).forEach(pair=>{
        if(pair.length<2)return;
        const[ea,eb]=pair;
        const aRid=ea.roster_id,bRid=eb.roster_id;
        const aPts=parseFloat(ea.points)||0,bPts=parseFloat(eb.points)||0;
        games.push({
          team_a:{roster_id:aRid,points:aPts,name:rtn[aRid]||'?'},
          team_b:{roster_id:bRid,points:bPts,name:rtn[bRid]||'?'},
          diff:parseFloat(Math.abs(aPts-bPts).toFixed(2)),
          winner:aPts>=bPts?{roster_id:aRid,points:aPts}:{roster_id:bRid,points:bPts},
          loser:aPts<bPts?{roster_id:aRid,points:aPts}:{roster_id:bRid,points:bPts}
        });
      });
      if(games.length)allMatchupWeeks['hist_'+hs.season+'_'+wk]=games;
    });
  });
  d.records=computeRecords(allMatchupWeeks);

  // ── Franchise all-time aggregates ──
  const franchiseMap={};
  const allStandingsKeys=Object.keys(d).filter(k=>/^standings_\d{4}$/.test(k)&&k!=='standings_2024_full');
  allStandingsKeys.forEach(sk=>{
    (d[sk]||[]).forEach(s=>{
      const rid=s.roster_id;
      if(!franchiseMap[rid])franchiseMap[rid]={roster_id:rid,name:s.team_name,total_wins:0,total_losses:0,total_pts:0,championships:0};
      franchiseMap[rid].total_wins+=s.wins;
      franchiseMap[rid].total_losses+=s.losses;
      franchiseMap[rid].total_pts+=s.fpts;
    });
  });
  d.champions.forEach(c=>{
    const rid=c.champ_rid;
    if(franchiseMap[rid])franchiseMap[rid].championships++;
  });
  d.franchise=Object.values(franchiseMap).map(f=>{
    const total=f.total_wins+f.total_losses||1;
    return{...f,win_pct:f.total_wins/total,total_pts:Math.round(f.total_pts)};
  }).sort((a,b)=>b.win_pct-a.win_pct);
  d.alltime_standings=d.franchise.map(f=>({name:f.name,w:f.total_wins,l:f.total_losses,pct:f.win_pct,pf:Math.round(f.total_pts),pa:0,mgr:f.name}));

  // ── Luck — most recent completed season ──
  const completedSeason=historicalSeasons.length?historicalSeasons[historicalSeasons.length-1]:null;
  if(completedSeason){
    const rtn=ridToNameForSeason(completedSeason.rosters,completedSeason.users);
    const pStart=completedSeason.playoffStart||15;
    // weekly scores per roster for regular season
    const luckWeeklyScores={};
    (completedSeason.weekNums||[]).filter(w=>w<pStart).forEach(wk=>{
      const wkData=completedSeason.matchups[wk]||[];
      const byMatchup={};
      wkData.forEach(e=>{const mid=e.matchup_id;if(!mid)return;if(!byMatchup[mid])byMatchup[mid]=[];byMatchup[mid].push(e);});
      Object.values(byMatchup).forEach(pair=>{
        if(pair.length<2)return;
        const[ea,eb]=pair;
        const aRid=ea.roster_id,bRid=eb.roster_id;
        const aPts=parseFloat(ea.points)||0,bPts=parseFloat(eb.points)||0;
        if(!luckWeeklyScores[aRid])luckWeeklyScores[aRid]=[];
        if(!luckWeeklyScores[bRid])luckWeeklyScores[bRid]=[];
        luckWeeklyScores[aRid].push(aPts);
        luckWeeklyScores[bRid].push(bPts);
      });
    });
    const rids=Object.keys(luckWeeklyScores).map(Number);
    const numWeeks=(completedSeason.weekNums||[]).filter(w=>w<pStart).length;
    d.luck={};
    rids.forEach(rid=>{
      const myScores=luckWeeklyScores[rid]||[];
      let allPlayWins=0;
      myScores.forEach((pts,wi)=>{
        rids.forEach(opp=>{
          if(opp===rid)return;
          const oppScores=luckWeeklyScores[opp]||[];
          if(wi<oppScores.length&&pts>oppScores[wi])allPlayWins++;
        });
      });
      const expectedWins=rids.length>1?allPlayWins/(rids.length-1):0;
      const sk='standings_'+completedSeason.season;
      const st=(d[sk]||[]).find(s=>s.roster_id===rid)||{wins:0,losses:0};
      const actualWins=st.wins;
      const luck=Math.round(actualWins-expectedWins);
      d.luck[rid]={roster_id:rid,team_name:rtn[rid]||'?',actual_wins:actualWins,expected_wins:Math.round(expectedWins*10)/10,luck};
    });
  }

  // ── Rivalries — all roster pairs across all seasons ──
  const rivalryMap={};
  Object.keys(d.h2h).forEach(key=>{
    const parts=key.split('-');
    if(parts.length!==2)return;
    const[aRid,bRid]=[parseInt(parts[0]),parseInt(parts[1])];
    if(isNaN(aRid)||isNaN(bRid))return;
    // Only process canonical keys (lower id first) for the rivals tab
    if(aRid>=bRid)return;
    const rec=d.h2h[key]||{w:0,l:0};
    const revKey=bRid+'-'+aRid;
    const revRec=d.h2h[revKey]||{w:0,l:0};
    const total=rec.total||rec.w+rec.l;
    const aWins=rec.w,bWins=revRec.w||rec.l;
    const aName=d.rid_to_name[aRid]||'Team '+aRid;
    const bName=d.rid_to_name[bRid]||'Team '+bRid;
    const dom=aWins>bWins?aWins/total:bWins/total;
    rivalryMap[key]={
      a:aName,b:bName,
      a_rid:aRid,b_rid:bRid,
      a_wins:aWins,b_wins:bWins,
      total,
      dominance:Math.round(dom*100),
      dominant:aWins>bWins?aName:bWins>aWins?bName:null,
      dominated:aWins>bWins?bName:bWins>aWins?aName:null
    };
  });
  d.rivalries=Object.values(rivalryMap).sort((a,b)=>b.total-a.total);

  // ── Activity per team ──
  const activityMap={};
  d.teams.forEach(t=>{activityMap[t.team_name]={trades:0,moves:0,draft_picks:0,total_players_traded:0};});
  d.moves.forEach(m=>{
    const nm=d.rid_to_name[m.rid];
    if(nm&&activityMap[nm]){activityMap[nm].moves++;}
  });
  d.trades.forEach(tr=>{
    tr.rids.forEach(rid=>{
      const nm=d.rid_to_name[rid];
      if(nm&&activityMap[nm]){activityMap[nm].trades++;}
    });
    // count players traded per team
    const adds=tr.adds||{};
    Object.entries(adds).forEach(([pid,rid])=>{
      const nm=d.rid_to_name[rid];
      if(nm&&activityMap[nm])activityMap[nm].total_players_traded++;
    });
  });

      const adds=tr.adds||{};

      const players=receivedPids.map(pid=>{const p=playerDB[pid]||{};return{id:pid,nm:p.fn||pid};});

    d.draft_hits[yr]=(picks||[]).map(pk=>{
      const pid=pk.pid||pk.player_id;

  });

  // ── Retention ──
  Object.keys(d.draft_picks).forEach(yr=>{
    const picks=d.draft_picks[yr]||[];
    const total=picks.length;

  if(!d.standings_2023)d.standings_2023=[];

  // Sort champions by year ascending
  d.champions.sort((a,b)=>parseInt(a.year)-parseInt(b.year));

  return d;
}

async function loadHistory(disc,playerDB){
  const historical=disc.chain.filter(c=>c.id!==disc.current.league_id).reverse();
  for(const entry of historical){
    try{
      const hs=await fetchHistoricalSeason(entry.id,entry.season);
      mergeHistoricalData(D,[hs],playerDB);
      renderTrophies();renderRivals();renderPulse();renderChronicle();
      buildStats();buildTicker();renderPower();renderAnalytics();renderTrades();selDraft=null;renderDraft();
    }catch(e){
      console.warn('Failed to load season',entry.season,e);
    }
  }
}

function renderPower(){
  const teams=D.teams.map(t=>{
    const s25=CUR_STANDINGS.find(s=>s.roster_id===t.roster_id)||{wins:0,losses:0,fpts:0};
    const ages=t.players.filter(p=>p.age&&p.pos!=='DEF').map(p=>p.age);
    const avgAge=ages.length?ages.reduce((a,b)=>a+b,0)/ages.length:27;
    const wPct=s25.wins/(s25.wins+s25.losses)||0;
    const maxP=Math.max(...CUR_STANDINGS.map(s=>s.fpts));
    const pPct=s25.fpts/maxP;
    const youth=1-(avgAge-22)/12;
    const acq=D.pick_trades.filter(p=>p.current_owner_roster_id===t.roster_id).length;

  // ── H2H COMPARISON ──
  h+='<div class="bh" style="margin-top:24px"><h2 class="bh-tag">Compare</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Head-to-Head Team Comparison</span></div></div>';
  h+='<div class="cmp-wrap">';
  h+='<div class="cmp-selects"><select class="cmp-sel" id="cmp-a">';

  h+='</select><span class="cmp-vs">VS</span><select class="cmp-sel" id="cmp-b">';
  teams.forEach((t,i)=>{h+='<option value="'+t.roster_id+'"'+(i===1?' selected':'')+'>'+t.team_name+'</option>'});
  h+='</select></div>';

    const cvs=document.getElementById('race-chart');

    ctx.scale(dpr,dpr);
    const w=cvs.offsetWidth,ht=cvs.offsetHeight;
    const top6=teams.slice(0,6);
    const barH=(ht-20)/6-6;
    const barColors=['#10B981','#3b82f6','#F59E0B','#ef4444','#8b5cf6','#ec4899'];
    top6.forEach((t,i)=>{
      const y=10+i*(barH+6);
      const barW=(t.pw/mx)*(w-140);

      const a=teams.find(t=>t.roster_id==selA.value);

      const bS=CUR_STANDINGS.find(x=>x.roster_id===b.roster_id)||{wins:0,losses:0,fpts:0};
      const metrics=[
        ['Power',a.pw,b.pw],
        ['Wins',aS.wins,bS.wins],
        ['Points',aS.fpts,bS.fpts],
        ['Avg Age',a.avgAge,b.avgAge,'lower'],
        ['Roster Size',a.players.length,b.players.length],
      ];
      let ch='<div class="cmp-grid">';
      metrics.forEach(([label,aV,bV,mode])=>{
        const aB=mode==='lower'?aV<bV:aV>bV;
        const bB=mode==='lower'?bV<aV:bV>aV;
        ch+='<div class="cmp-val left'+(aB?' better':'')+'">'+aV+'</div>';
        ch+='<div class="cmp-label">'+label+'</div>';
        ch+='<div class="cmp-val right'+(bB?' better':'')+'">'+bV+'</div>';
      });
      // H2H record
      const h2hKey=a.roster_id+'-'+b.roster_id;
      const h2hRec=D.h2h[h2hKey];
      if(h2hRec){
        ch+='<div class="cmp-val left'+(h2hRec.w>h2hRec.l?' better':'')+'">'+h2hRec.w+'W</div>';
        ch+='<div class="cmp-label">H2H</div>';
        ch+='<div class="cmp-val right'+(h2hRec.l>h2hRec.w?' better':'')+'">'+h2hRec.l+'W</div>';
      }
      ch+='</div>';
      res.innerHTML=ch;
    }
    selA.addEventListener('change',updateCmp);
    selB.addEventListener('change',updateCmp);
    updateCmp();
  },150);
}

function calcBadges(teamName){
  const badges=[];
  const act=D.activity[teamName];
  if(!act)return badges;
  const total=act.trades+act.moves+act.draft_picks;
  if(act.trades>=5)badges.push({label:'Wheeler-Dealer',bg:'rgba(204,0,0,.12)',color:'var(--a)'});
  if(total<=8)badges.push({label:'Ghost',bg:'rgba(102,102,120,.15)',color:'var(--t4)'});
  if(act.draft_picks>=18)badges.push({label:'Draft Hoarder',bg:'rgba(139,92,246,.12)',color:'var(--pur)'});
  const team=D.teams.find(x=>x.team_name===teamName);
  if(team){
    const ages=team.players.filter(p=>p.age&&p.pos!=='DEF').map(p=>p.age);
    const avg=ages.length?ages.reduce((a,b)=>a+b,0)/ages.length:27;
    if(avg<=25)badges.push({label:'Dynasty Builder',bg:'rgba(59,130,246,.12)',color:'var(--blu)'});
    if(avg>=28.5)badges.push({label:'Win Now',bg:'rgba(245,158,11,.12)',color:'var(--y)'});
  }
  const s=CUR_STANDINGS.find(x=>x.team_name===teamName);
  if(s&&s.fpts>=CUR_STANDINGS.slice().sort((a,b)=>b.fpts-a.fpts)[0].fpts)badges.push({label:'Point Machine',bg:'rgba(204,0,0,.12)',color:'var(--a)'});
  if(D.champions.some(c=>c.champion===teamName))badges.push({label:'Champion',bg:'rgba(245,158,11,.12)',color:'var(--y)'});
  const luck=Object.values(D.luck||{}).find(l=>l.team_name===teamName);
  if(luck&&luck.luck>=7)badges.push({label:'Lucky Charm',bg:'rgba(204,0,0,.12)',color:'var(--a)'});
  if(luck&&luck.luck<=2)badges.push({label:'Snake Bitten',bg:'rgba(239,68,68,.12)',color:'var(--red-t)'});
  return badges;
}

// ═══ TRADES ═══
function renderTrades(){
  const trades=D.unified_trades||[];
  let h='<div class="bh"><h2 class="bh-tag">Trades</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">'+trades.length+' Trades \u2022 Complete History</span></div></div>';
  // Insights bar
  h+='<div class="narrative">';
  if(D.most_traded&&D.most_traded.length){
    h+='<div class="nar-item"><div class="nar-icon">\u{1F504}</div><div class="nar-text">Hot commodities: ';
    D.most_traded.filter(function(m){return m.count>=2}).forEach(function(m,i){h+=(i?', ':'')+'<b>'+m.name+'</b> ('+m.count+'x)'});
    h+='</div></div>';
  }
  var retYears=Object.keys(D).filter(function(k){return/^retention_\d{4}$/.test(k)}).map(function(k){return k.replace('retention_','')}).sort().reverse();
  if(retYears.length){
    var retText=retYears.slice(0,3).map(function(yr){var r=D['retention_'+yr];return'<b>'+r.rostered+'/'+r.total+'</b> of '+yr+' class ('+Math.round(r.rostered/r.total*100)+'%)'}).join('. ');
    h+='<div class="nar-item"><div class="nar-icon">\u{1F4CA}</div><div class="nar-text">Draft retention: '+retText+'.</div></div>';
  }
  h+='</div>';
  // Trade grade helpers
  function ktcVal(players,picks){
    var total=0;
    players.forEach(function(p){
      var c=D.contracts&&D.contracts[p.nm];
      if(!c||!c.ktc)return;
      // Contract-adjusted value: fewer years = less control = less value
      var mult=!c.contracted?0.5:c.yrs<=1?0.6:c.yrs<=2?0.85:1;
      total+=Math.round(c.ktc*mult);
    });
    picks.forEach(function(pk){var r=pk.match(/Rd(\d)/);var rd=r?parseInt(r[1]):3;total+=(rd===1?5000:rd===2?2000:500);});
    return total;
  }
  function gradeLabel(net){return net>3000?'A+':net>1500?'A':net>500?'B':net>-500?'C':net>-1500?'D':'F';}
  function gradeCls(net){return net>500?'a':net>-500?'b':net>-1500?'c':'d';}
  // KTC record per manager
  var ktcRecord={};
  trades.forEach(function(t){
    if(t.sides.length<2)return;
    var a=t.sides[0],b=t.sides[1];
    var aKtc=ktcVal(a.players,a.picks),bKtc=ktcVal(b.players,b.picks);
    var aNet=aKtc-bKtc,bNet=bKtc-aKtc;
    ktcRecord[a.name]=(ktcRecord[a.name]||0)+aNet;
    ktcRecord[b.name]=(ktcRecord[b.name]||0)+bNet;
  });
  // Trade grade leaderboard
  h+='<div class="bh" style="margin-top:4px"><h2 class="bh-tag">Trade Record</h2><div class="bh-acc"></div><div class="bh-line"><span class="bh-sub">Net KTC Value Won/Lost Across All Trades</span></div></div>';
  var krArr=Object.entries(ktcRecord).sort(function(a,b){return b[1]-a[1]});
  var maxKR=Math.max.apply(null,krArr.map(function(x){return Math.abs(x[1])}));
  krArr.forEach(function(entry){
    var nm=entry[0],net=entry[1];
    var col=net>0?'var(--grn)':net<0?'var(--red-t)':'var(--t4)';
    var pct=maxKR>0?(Math.abs(net)/maxKR*100):0;
    var teamObj=D.teams.find(function(t){return t.team_name===nm});
    var gl=gradeLabel(net),gc=gradeCls(net);
    h+='<div class="h-row" style="gap:8px">';
    if(teamObj)h+=av(teamObj.roster_id,28);
    h+='<span class="trade-grade '+gc+'" style="margin-right:4px">'+gl+'</span>';
    h+='<span class="h-team" style="flex:1">'+nm+'</span>';
    h+='<div style="flex:1;height:12px;background:var(--g3);border-radius:6px;overflow:hidden;max-width:220px"><div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:6px"></div></div>';
    h+='<span style="font-family:var(--fm);font-size:12px;font-weight:700;color:'+col+';min-width:64px;text-align:right">'+(net>0?'+':'')+net.toLocaleString()+'</span>';
    h+='</div>';
  });
  // Unified trade cards — 2-column grid
  h+='<div class="trade-grid">';
  trades.forEach(function(t,ti){

  h+='</div>'; // .trade-grid

  if(D.rivalries&&D.rivalries.length){

    if(p.original_owner!==p.current_owner){cap[p.original_owner]=cap[p.original_owner]||{g:0,l:0};cap[p.original_owner].l++;}
  });
  Object.entries(cap).sort(function(a,b){return(b[1].g-b[1].l)-(a[1].g-a[1].l)}).forEach(function([nm,c]){
    const net=c.g-c.l;const col=net>0?'var(--a)':net<0?'var(--red-t)':'var(--t4)';
